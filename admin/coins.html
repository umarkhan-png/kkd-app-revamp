<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>KKD Admin · Krishi Coins</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="assets/admin.css">
</head>
<body>
<div class="admin">
  <aside class="sidebar" id="side"></aside>
  <div class="main">
    <header class="topbar" id="top"></header>
    <div class="work">

      <div class="flex items-center justify-between" style="margin-bottom:20px">
        <div>
          <h2 style="font-size:21px;font-weight:800;margin:0 0 3px">Krishi Coins</h2>
          <p class="muted" style="margin:0;font-size:13.5px">Set how farmers earn and redeem Krishi Coins.</p>
        </div>
        <button class="btn btn-primary" onclick="openStep()"><i class="fa-solid fa-plus"></i> New step</button>
      </div>

      <!-- Settings -->
      <div class="card" style="margin-bottom:16px">
        <div class="card-head"><h3>Settings</h3><span class="sub">Conversion & redemption rules</span></div>
        <div id="settings"></div>
      </div>

      <!-- Earning rules -->
      <div class="card" style="margin-bottom:16px">
        <div class="card-head"><h3>Earning rules</h3><span class="sub">Coins awarded per action</span></div>
        <div id="rules"></div>
      </div>

      <!-- Home earn-steps widget -->
      <div class="card">
        <div class="card-head">
          <h3>Home earn-steps widget</h3>
          <span class="sub">The 5-step "Earn Krishi Coins" card on Home</span>
          <button class="btn btn-soft btn-sm" style="margin-left:auto" onclick="openStep()"><i class="fa-solid fa-plus"></i> New step</button>
        </div>
        <div id="steps"></div>
      </div>

    </div>
  </div>
</div>

<!-- Drawer: new / edit earn-step -->
<div class="scrim" id="stepScrim" onclick="AdminShell.close('step')"></div>
<aside class="drawer" id="step">
  <div class="drawer-head">
    <h3 id="stepTitle">New step</h3>
    <button class="x-btn" onclick="AdminShell.close('step')"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="drawer-body">
    <div class="field"><label>Step label</label><input class="input" id="stLabel" placeholder="e.g. Complete your profile"/></div>
    <div class="field"><label>Coins awarded</label><input class="input" type="number" min="0" id="stCoins" placeholder="20"/></div>
    <div class="field flex items-center justify-between" style="padding:12px 14px;background:var(--slate-50);border-radius:10px;border:1px solid var(--slate-200)">
      <div><label style="margin:0">Marked done (preview)</label><div class="hint" style="margin-top:2px">How the step looks once completed</div></div>
      <label class="switch"><input type="checkbox" id="stDone"><span class="track"></span></label>
    </div>
  </div>
  <div class="drawer-foot">
    <button class="btn btn-ghost" onclick="AdminShell.close('step')">Cancel</button>
    <button class="btn btn-primary" onclick="saveStep()"><i class="fa-solid fa-check"></i> Save step</button>
  </div>
</aside>

<script src="assets/data.js"></script>
<script src="assets/shell.js"></script>
<script src="assets/validate.js"></script>
<script>
  AdminShell.mount({ active:'coins', title:'Krishi Coins', crumb:'Offers & Rewards', controls:'Coin earning + the Home "Earn Krishi Coins" widget', preview:'home.html' });
  let data = KKD.load();

  /* ---------- Settings ---------- */
  const SETTINGS = [
    { key:'ratePerCoin',   label:'₹ per coin',           sub:'How much 1 Krishi Coin is worth at redemption', prefix:'₹', min:0, step:'0.5' },
    { key:'redeemCapPct',  label:'Redeem cap',           sub:'Max % of an order that coins can pay for',       suffix:'%', min:0, max:100 },
    { key:'prepaidEarnPct',label:'Coins on prepaid',     sub:'Coins earned as % of a prepaid order value',     suffix:'%', min:0, max:100 },
    { key:'expiryDays',    label:'Expiry',               sub:'Days until earned coins expire · 0 = never',     suffix:'days', min:0 },
  ];
  function renderSettings(){
    document.getElementById('settings').innerHTML = SETTINGS.map(s=>`
      <div class="lrow">
        <div class="iconbox ic-green"><i class="fa-solid fa-coins"></i></div>
        <div>
          <div class="l-main">${s.label}</div>
          <div class="l-sub">${s.sub}</div>
        </div>
        <div class="l-right">
          ${s.prefix?`<span class="muted" style="font-weight:700">${s.prefix}</span>`:''}
          <input class="input" type="number" style="width:110px;height:36px" value="${data.coinSettings[s.key]}"
                 min="${s.min!=null?s.min:''}" ${s.max!=null?`max="${s.max}"`:''} step="${s.step||'1'}"
                 onchange="setSetting('${s.key}',this.value)">
          ${s.suffix?`<span class="muted" style="font-weight:700">${s.suffix}</span>`:''}
        </div>
      </div>`).join('');
  }
  function setSetting(key,val){
    data.coinSettings[key] = parseFloat(val)||0;
    KKD.save(data); AdminShell.saved('Coin settings updated');
  }

  /* ---------- Earning rules ---------- */
  function renderRules(){
    document.getElementById('rules').innerHTML = data.coinRules.map(r=>`
      <div class="lrow">
        <div class="iconbox ic-amber"><i class="fa-solid fa-bolt"></i></div>
        <div>
          <div class="l-main">${esc(r.label)}</div>
          <div class="l-sub">action · ${esc(r.action)}</div>
        </div>
        <div class="l-right">
          <input class="input" type="number" min="0" style="width:90px;height:36px" value="${r.coins}"
                 onchange="setRuleCoins('${r.id}',this.value)">
          <span class="muted" style="font-weight:700;font-size:12px">coins</span>
          <label class="switch"><input type="checkbox" ${r.active?'checked':''} onchange="toggleRule('${r.id}',this.checked)"><span class="track"></span></label>
        </div>
      </div>`).join('') || '<div class="empty"><i class="fa-solid fa-bolt"></i><div>No earning rules yet.</div></div>';
  }
  function setRuleCoins(id,val){ data.coinRules.find(r=>r.id===id).coins = parseInt(val,10)||0; KKD.save(data); AdminShell.saved('Rule updated'); }
  function toggleRule(id,on){ data.coinRules.find(r=>r.id===id).active = on; KKD.save(data); AdminShell.saved(on?'Rule activated':'Rule paused'); }

  /* ---------- Home earn-steps ---------- */
  function renderSteps(){
    document.getElementById('steps').innerHTML = data.earnSteps.map(s=>`
      <div class="lrow">
        <div class="iconbox ${s.done?'ic-green':'ic-slate'}"><i class="fa-solid fa-${s.done?'circle-check':'circle'}"></i></div>
        <div>
          <div class="l-main">${esc(s.label)}</div>
          <div class="l-sub">+${s.coins} coins ${s.done?'· marked done':''}</div>
        </div>
        <div class="l-right">
          <label class="switch" title="Done (preview)"><input type="checkbox" ${s.done?'checked':''} onchange="toggleStep('${s.id}',this.checked)"><span class="track"></span></label>
          <button class="btn btn-ghost btn-sm" onclick="openStep('${s.id}')"><i class="fa-solid fa-pen"></i></button>
          <button class="btn btn-danger btn-sm" onclick="delStep('${s.id}')"><i class="fa-solid fa-trash"></i></button>
        </div>
      </div>`).join('') || '<div class="empty"><i class="fa-solid fa-list-check"></i><div>No steps yet — add one.</div></div>';
  }
  function toggleStep(id,on){ data.earnSteps.find(s=>s.id===id).done = on; KKD.save(data); renderSteps(); AdminShell.saved('Step updated'); }
  function delStep(id){ data.earnSteps = data.earnSteps.filter(s=>s.id!==id); KKD.save(data); renderSteps(); AdminShell.saved('Step removed'); }

  let stepEditId = null;
  function openStep(id){
    stepEditId = id || null;
    const s = id ? data.earnSteps.find(x=>x.id===id) : null;
    document.getElementById('stepTitle').textContent = id ? 'Edit step' : 'New step';
    document.getElementById('stLabel').value = s? s.label : '';
    document.getElementById('stCoins').value = s? s.coins : '';
    document.getElementById('stDone').checked = s? !!s.done : false;
    AdminShell.open('step');
  }
  function saveStep(){
    const rec = {
      label: document.getElementById('stLabel').value.trim() || 'Untitled step',
      coins: parseInt(document.getElementById('stCoins').value,10) || 0,
      done: document.getElementById('stDone').checked,
    };
    if(stepEditId){ Object.assign(data.earnSteps.find(s=>s.id===stepEditId), rec); }
    else { rec.id = 'es'+Date.now(); data.earnSteps.push(rec); }
    KKD.save(data); AdminShell.close('step'); renderSteps(); AdminShell.saved(stepEditId?'Step updated':'Step added');
  }

  renderSettings(); renderRules(); renderSteps();
</script>
</body></html>
