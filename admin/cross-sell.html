<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>KKD Admin · Cross-sell & Bundles</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="assets/admin.css">
</head>
<body>
<div class="admin">
  <aside class="sidebar" id="side"></aside>
  <div class="main">
    <header class="topbar" id="top"></header>
    <div class="work">

      <div class="flex items-center justify-between" style="margin-bottom:20px">
        <div>
          <h2 style="font-size:21px;font-weight:800;margin:0 0 3px">Cross-sell &amp; Bundles</h2>
          <p class="muted" style="margin:0;font-size:13.5px">Recommend add-on products and bundles.</p>
        </div>
        <button class="btn btn-primary" onclick="openRule()"><i class="fa-solid fa-plus"></i> New rule</button>
      </div>

      <div class="card">
        <div class="tbl-wrap">
          <table class="tbl">
            <thead><tr>
              <th>Trigger</th><th>Label</th><th>Products</th><th>Saves</th><th>Active</th><th style="text-align:right">Actions</th>
            </tr></thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Drawer: new / edit rule -->
<div class="scrim" id="xsDrawerScrim" onclick="AdminShell.close('xsDrawer')"></div>
<aside class="drawer" id="xsDrawer">
  <div class="drawer-head">
    <h3 id="xsDrawerTitle">New rule</h3>
    <button class="x-btn" onclick="AdminShell.close('xsDrawer')"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="drawer-body">
    <div class="field"><label>Trigger</label>
      <select class="select" id="xsTrigger">
        <option value="In cart">In cart</option>
        <option value="Buy together">Buy together</option>
        <option value="Cart special">Cart special</option>
      </select>
      <div class="hint">When this recommendation appears.</div>
    </div>
    <div class="field"><label>Label</label><input class="input" id="xsLabel" placeholder="e.g. Special deal"/></div>
    <div class="field"><label>Products</label>
      <div id="xsProducts" style="border:1px solid var(--slate-200);border-radius:10px;max-height:240px;overflow-y:auto"></div>
      <div class="hint">Products recommended by this rule.</div>
    </div>
    <div class="field"><label>Save amount (₹)</label><input class="input" type="number" id="xsSave" min="0" placeholder="0"/></div>
    <div class="field flex items-center justify-between" style="padding:12px 14px;background:var(--slate-50);border-radius:10px;border:1px solid var(--slate-200)">
      <div><label style="margin:0">Active</label><div class="hint" style="margin-top:2px">Show this rule in the app</div></div>
      <label class="switch"><input type="checkbox" id="xsActive" checked><span class="track"></span></label>
    </div>
  </div>
  <div class="drawer-foot">
    <button class="btn btn-ghost" onclick="AdminShell.close('xsDrawer')">Cancel</button>
    <button class="btn btn-primary" onclick="saveRule()"><i class="fa-solid fa-check"></i> Save to draft</button>
  </div>
</aside>

<script src="assets/data.js"></script>
<script src="assets/shell.js"></script>
<script>
  AdminShell.mount({ active:'crosssell', title:'Cross-sell & Bundles', crumb:'Merchandising', controls:'Cross-sell cards in cart + related on PDP', preview:'cart.html' });
  let data = KKD.load();

  function pname(id){ const p = data.products.find(x=>x.id===id); return p? p.name : id; }

  function renderRows(){
    document.getElementById('rows').innerHTML = data.crossSell.map(r=>`
      <tr>
        <td><span class="tag tag-green">${esc(r.trigger)}</span></td>
        <td><span class="cell-main">${esc(r.label)}</span></td>
        <td style="max-width:340px"><div class="flex gap-2" style="flex-wrap:wrap">${r.products.map(id=>`<span class="tag">${esc(pname(id))}</span>`).join('') || '<span class="muted" style="font-size:11.5px">—</span>'}</div></td>
        <td class="cell-main">₹${r.save}</td>
        <td><label class="switch"><input type="checkbox" ${r.active?'checked':''} onchange="toggle('${r.id}',this.checked)"><span class="track"></span></label></td>
        <td style="text-align:right;white-space:nowrap">
          <button class="btn btn-ghost btn-sm" onclick="openRule('${r.id}')"><i class="fa-solid fa-pen"></i></button>
          <button class="btn btn-danger btn-sm" onclick="delRule('${r.id}')"><i class="fa-solid fa-trash"></i></button>
        </td>
      </tr>`).join('') || `<tr><td colspan="6"><div class="empty"><i class="fa-solid fa-layer-group"></i><div>No cross-sell rules yet.</div></div></td></tr>`;
  }

  function toggle(id,on){ const r=data.crossSell.find(x=>x.id===id); if(!r)return; r.active=on; KKD.save(data); AdminShell.saved(on?'Rule enabled':'Rule disabled'); }

  let editId = null;
  function openRule(id){
    editId = id || null;
    const r = id ? data.crossSell.find(x=>x.id===id) : null;
    document.getElementById('xsDrawerTitle').textContent = id ? 'Edit rule' : 'New rule';
    document.getElementById('xsTrigger').value = r? r.trigger : 'In cart';
    document.getElementById('xsLabel').value = r? r.label : '';
    document.getElementById('xsSave').value = r? r.save : 0;
    document.getElementById('xsActive').checked = r? r.active : true;
    const sel = r? r.products : [];
    document.getElementById('xsProducts').innerHTML = data.products.map(p=>`
      <label class="lrow" style="cursor:pointer">
        <input type="checkbox" value="${p.id}" ${sel.includes(p.id)?'checked':''} style="width:16px;height:16px;accent-color:var(--green)">
        <div style="min-width:0"><div class="l-main">${esc(p.name)}</div><div class="l-sub">${esc(p.sku)}</div></div>
      </label>`).join('');
    AdminShell.open('xsDrawer');
  }
  function saveRule(){
    const products = [...document.querySelectorAll('#xsProducts input:checked')].map(c=>c.value);
    const rec = {
      trigger: document.getElementById('xsTrigger').value,
      label: document.getElementById('xsLabel').value.trim() || 'Untitled rule',
      products,
      save: parseInt(document.getElementById('xsSave').value,10) || 0,
      active: document.getElementById('xsActive').checked,
    };
    if(editId){ Object.assign(data.crossSell.find(x=>x.id===editId), rec); }
    else { rec.id = 'xs'+Date.now(); data.crossSell.unshift(rec); }
    KKD.save(data); AdminShell.close('xsDrawer'); renderRows(); AdminShell.saved(editId?'Rule updated':'Rule added to draft');
  }
  function delRule(id){ data.crossSell = data.crossSell.filter(r=>r.id!==id); KKD.save(data); renderRows(); AdminShell.saved('Rule removed'); }

  renderRows();
</script>
</body></html>
