<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>KKD Admin · Experts & Ask-AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="assets/admin.css">
</head>
<body>
<div class="admin">
  <aside class="sidebar" id="side"></aside>
  <div class="main">
    <header class="topbar" id="top"></header>
    <div class="work">

      <div class="flex items-center justify-between" style="margin-bottom:20px">
        <div>
          <h2 style="font-size:21px;font-weight:800;margin:0 0 3px">Experts &amp; Ask-AI</h2>
        </div>
        <button class="btn btn-primary" id="newExpertBtn" onclick="openExpert()"><i class="fa-solid fa-plus"></i> New expert</button>
      </div>

      <!-- Tabs -->
      <div class="tabs" id="tabs"></div>

      <!-- Experts tab -->
      <div id="expertsTab">
        <div class="grid-cards" style="grid-template-columns:repeat(2,1fr)" id="expGrid"></div>
      </div>

      <!-- Ask-AI tab -->
      <div id="askTab" style="display:none">
        <div class="card" style="max-width:680px">
          <div class="card-head"><h3>Ask-AI assistant</h3><span class="sub">The chat persona shown on Doctor Call &amp; help screens</span></div>
          <div style="padding:20px">
            <div class="field"><label>Greeting</label><textarea class="input" id="aiGreet" rows="3" placeholder="First message the assistant sends"></textarea></div>
            <div class="field"><label>Persona</label><input class="input" id="aiPersona" placeholder="e.g. Friendly Hinglish agronomy assistant"/>
              <div class="hint">Tone &amp; behaviour description that guides the assistant.</div>
            </div>
            <div class="field"><label>Suggestion chips</label><input class="input" id="aiChips" placeholder="Check price, Disease help, Track order"/>
              <div class="hint">Comma-separated quick-reply chips shown under the greeting.</div>
            </div>
            <div class="field"><label>Preview</label><div class="flex gap-2" id="chipPrev" style="flex-wrap:wrap"></div></div>
            <button class="btn btn-primary" onclick="saveAi()"><i class="fa-solid fa-check"></i> Save Ask-AI</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Drawer: new / edit expert -->
<div class="scrim" id="exDrawerScrim" onclick="AdminShell.close('exDrawer')"></div>
<aside class="drawer" id="exDrawer">
  <div class="drawer-head">
    <h3 id="exDrawerTitle">New expert</h3>
    <button class="x-btn" onclick="AdminShell.close('exDrawer')"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="drawer-body">
    <div class="field"><label>Name</label><input class="input" id="exName" placeholder="e.g. Dr. Priya Sharma"/></div>
    <div class="field"><label>Title</label><input class="input" id="exTitle" placeholder="e.g. Senior Agronomist"/></div>
    <div class="row2">
      <div class="field"><label>Experience (years)</label><input class="input" type="number" id="exExp" placeholder="0"/></div>
      <div class="field"><label>Rating</label><input class="input" type="number" step="0.1" id="exRating" placeholder="4.8"/></div>
    </div>
    <div class="field"><label>Languages</label><input class="input" id="exLangs" placeholder="Hindi, Marathi, English"/>
      <div class="hint">Comma-separated list of spoken languages.</div>
    </div>
    <div class="field flex items-center justify-between" style="padding:12px 14px;background:var(--slate-50);border-radius:10px;border:1px solid var(--slate-200)">
      <div><label style="margin:0">Available for calls</label><div class="hint" style="margin-top:2px">Toggle off to hide from expert calls</div></div>
      <label class="switch"><input type="checkbox" id="exAvail" checked><span class="track"></span></label>
    </div>
  </div>
  <div class="drawer-foot">
    <button class="btn btn-ghost" onclick="AdminShell.close('exDrawer')">Cancel</button>
    <button class="btn btn-primary" onclick="saveExpert()"><i class="fa-solid fa-check"></i> Save to draft</button>
  </div>
</aside>

<script src="assets/data.js"></script>
<script src="assets/shell.js"></script>
<script src="assets/validate.js"></script>
<script>
  AdminShell.mount({ active:'experts', title:'Experts & Ask-AI', crumb:'Crop Help', controls:'Agronomist directory + the Ask-AI assistant', preview:'doctor-call.html' });
  let data = KKD.load();
  const TABS = { experts:'Experts', ask:'Ask-AI' };
  let tab = 'experts';

  function initials(name){ return String(name||'?').replace(/^Dr\.?\s*/i,'').split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase()||'?'; }

  function renderTabs(){
    document.getElementById('tabs').innerHTML = Object.entries(TABS).map(([k,v])=>{
      const n = k==='experts' ? ` <span style="opacity:.6">${data.experts.length}</span>` : '';
      return `<div class="tab ${tab===k?'active':''}" onclick="switchTab('${k}')">${v}${n}</div>`;
    }).join('');
  }
  function switchTab(k){
    tab = k; renderTabs();
    document.getElementById('expertsTab').style.display = k==='experts' ? '' : 'none';
    document.getElementById('askTab').style.display = k==='ask' ? '' : 'none';
    document.getElementById('newExpertBtn').style.display = k==='experts' ? '' : 'none';
  }

  function renderExperts(){
    document.getElementById('expGrid').innerHTML = data.experts.map(e=>`
      <div class="card">
        <div class="lrow" style="border-bottom:1px solid var(--slate-100)">
          <div class="iconbox" style="background:var(--green-50);color:var(--green);width:44px;height:44px;font-size:15px;font-weight:800">${esc(initials(e.name))}</div>
          <div style="min-width:0">
            <div class="l-main">${esc(e.name)}</div>
            <div class="l-sub">${esc(e.title)} · ${e.exp} yrs</div>
          </div>
          <label class="switch l-right" style="margin-left:auto"><input type="checkbox" ${e.available?'checked':''} onchange="toggleExpert('${e.id}',this.checked)"><span class="track"></span></label>
        </div>
        <div style="padding:13px 16px">
          <div class="flex gap-2" style="flex-wrap:wrap;margin-bottom:10px">${e.langs.map(l=>`<span class="tag">${esc(l)}</span>`).join('')}</div>
          <div class="flex items-center justify-between">
            <span class="cell-sub"><i class="fa-solid fa-star" style="color:#F59E0B"></i> ${e.rating} · ${e.calls.toLocaleString()} calls</span>
            <div class="flex gap-2">
              <button class="btn btn-ghost btn-sm" onclick="openExpert('${e.id}')"><i class="fa-solid fa-pen"></i></button>
              <button class="btn btn-danger btn-sm" onclick="delExpert('${e.id}')"><i class="fa-solid fa-trash"></i></button>
            </div>
          </div>
        </div>
      </div>`).join('') || '<div class="empty" style="grid-column:1/-1"><i class="fa-solid fa-user-doctor"></i><div>No experts yet.</div></div>';
  }

  function toggleExpert(id,val){ const e=data.experts.find(x=>x.id===id); if(e){ e.available=val; KKD.save(data); AdminShell.saved(val?'Expert set available':'Expert set unavailable'); } }

  let editId = null;
  function openExpert(id){
    editId = id || null;
    const e = id ? data.experts.find(x=>x.id===id) : null;
    document.getElementById('exDrawerTitle').textContent = id ? 'Edit expert' : 'New expert';
    document.getElementById('exName').value = e? e.name : '';
    document.getElementById('exTitle').value = e? e.title : '';
    document.getElementById('exExp').value = e? e.exp : '';
    document.getElementById('exRating').value = e? e.rating : '';
    document.getElementById('exLangs').value = e? e.langs.join(', ') : '';
    document.getElementById('exAvail').checked = e? e.available : true;
    AdminShell.open('exDrawer');
  }
  function saveExpert(){
    const rec = {
      name: document.getElementById('exName').value.trim() || 'Unnamed expert',
      title: document.getElementById('exTitle').value.trim() || 'Agronomist',
      exp: Number(document.getElementById('exExp').value) || 0,
      rating: Number(document.getElementById('exRating').value) || 0,
      langs: document.getElementById('exLangs').value.split(',').map(s=>s.trim()).filter(Boolean),
      available: document.getElementById('exAvail').checked,
    };
    if(editId){ Object.assign(data.experts.find(x=>x.id===editId), rec); }
    else { rec.id='ex'+Date.now(); rec.calls=0; data.experts.push(rec); }
    KKD.save(data); AdminShell.close('exDrawer'); renderTabs(); renderExperts();
    AdminShell.saved(editId?'Expert updated':'Expert added to draft');
  }
  function delExpert(id){ data.experts=data.experts.filter(x=>x.id!==id); KKD.save(data); renderTabs(); renderExperts(); AdminShell.saved('Expert removed'); }

  // ---- Ask-AI ----
  function renderChipPrev(){
    const chips = document.getElementById('aiChips').value.split(',').map(s=>s.trim()).filter(Boolean);
    document.getElementById('chipPrev').innerHTML = chips.map(c=>`<span class="tag tag-green">${esc(c)}</span>`).join('') || '<span class="muted" style="font-size:12px">No chips</span>';
  }
  function loadAi(){
    document.getElementById('aiGreet').value = data.askAi.greeting || '';
    document.getElementById('aiPersona').value = data.askAi.persona || '';
    document.getElementById('aiChips').value = (data.askAi.chips||[]).join(', ');
    renderChipPrev();
  }
  function saveAi(){
    data.askAi.greeting = document.getElementById('aiGreet').value.trim();
    data.askAi.persona = document.getElementById('aiPersona').value.trim();
    data.askAi.chips = document.getElementById('aiChips').value.split(',').map(s=>s.trim()).filter(Boolean);
    KKD.save(data); AdminShell.saved('Ask-AI updated');
  }

  document.getElementById('aiChips').addEventListener('input', renderChipPrev);
  renderTabs(); renderExperts(); loadAi();
</script>
</body></html>
