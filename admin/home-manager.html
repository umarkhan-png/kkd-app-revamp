function cropsUI(){ if(sel==='crops') pick('crops'); }
function cropFind(nm){ return cropLib.find(x=>x.name===nm)||{name:nm,emoji:'🌱',img:''}; }
function cropThumb(c,sm){ return `<div class="cropthumb${sm?' sm':''}">${c.img?`<img src="${c.img}" alt=""/>`:esc(c.emoji||'🌱')}</div>`; }
function cropRow(c,i){ const seas=(c.seasons&&c.seasons.length)?c.seasons.join(', '):'All year';
  return `<div class="li" style="align-items:center">${cropThumb(c)}
    <div class="li-body"><div class="li-sum"><span class="nm">${esc(c.name)}</span><span class="meta">📅 ${esc(seas)}</span></div></div>
    <div class="li-act"><button class="ic-btn" title="Edit" onclick="cropEdit(${i})"><i class="fa-solid fa-pen"></i></button><button class="ic-btn del" title="Delete" onclick="cropDel(${i})"><i class="fa-solid fa-trash"></i></button></div>
  </div>`; }
function cropOrderRow(nm,i){ const c=cropFind(nm); const n=cropDefault.length;
  return `<div class="li" style="align-items:center;padding:8px 11px">
    <span style="font-size:11px;font-weight:700;color:var(--g400);min-width:18px;text-align:center">${i+1}</span>${cropThumb(c,true)}
    <div class="li-body"><span class="nm" style="font-size:13px;font-weight:700">${esc(c.name)}</span></div>
    <div class="li-act"><button class="ic-btn" title="Up" onclick="cropDefMove(${i},-1)" ${i===0?'disabled':''}><i class="fa-solid fa-arrow-up"></i></button><button class="ic-btn" title="Down" onclick="cropDefMove(${i},1)" ${i===n-1?'disabled':''}><i class="fa-solid fa-arrow-down"></i></button></div>
  </div>`; }
function cropDefMove(i,d){ const j=i+d; if(j<0||j>=cropDefault.length) return; const a=cropDefault; [a[i],a[j]]=[a[j],a[i]]; cropsUI(); }
function cropDel(i){ const nm=cropLib[i].name; cropLib.splice(i,1); cropDefault=cropDefault.filter(x=>x!==nm); cropSortings.forEach(s=>s.order=s.order.filter(x=>x!==nm)); cropsUI(); }
function cropAdd(){ cropDraft={name:'',emoji:'🌱',img:'',seasons:[]}; cropDraftIdx=-1; cropModalRender(); }
function cropEdit(i){ cropDraft=JSON.parse(JSON.stringify(cropLib[i])); cropDraftIdx=i; cropModalRender(); }
function cropModalSync(){ if(!cropDraft) return; const n=document.getElementById('cropFName'); if(n) cropDraft.name=n.value; }
function cropModalCancel(){ cropDraft=null; cropDraftIdx=-1; const m=document.getElementById('addModal'); if(m)m.remove(); }
function cropModalSave(){ cropModalSync(); const d=cropDraft; if(!d.name) d.name='New crop';
  if(cropDraftIdx>=0){ const old=cropLib[cropDraftIdx].name; cropLib[cropDraftIdx]=d; if(old!==d.name){ cropDefault=cropDefault.map(x=>x===old?d.name:x); cropSortings.forEach(s=>s.order=s.order.map(x=>x===old?d.name:x)); } }
  else { cropLib.push(d); cropDefault.push(d.name); cropSortings.forEach(s=>s.order.push(d.name)); }
  cropDraft=null; cropDraftIdx=-1; const m=document.getElementById('addModal'); if(m)m.remove(); cropsUI(); }
function cropFPick(input){ const f=input.files&&input.files[0]; if(!f) return; cropModalSync(); cropDraft.img=URL.createObjectURL(f); cropModalRender(); }
function cropFRemove(){ cropModalSync(); cropDraft.img=''; cropModalRender(); }
function cropSeasonTog(m){ cropModalSync(); const s=cropDraft.seasons||[]; const i=s.indexOf(m); i>=0?s.splice(i,1):s.push(m); cropDraft.seasons=s; cropModalRender(); }
function cropModalRender(){ const ex=document.getElementById('addModal'); if(ex) ex.remove(); const d=cropDraft; if(!d) return;
  const body=`
    <div class="sub-l" style="margin-top:0">Crop image &amp; name</div>
    <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:14px">
      ${cropThumb(d)}
      <div style="flex:1;min-width:0">
        <input type="file" id="cropFImg" accept="image/png,image/jpeg,image/webp" style="display:none" onchange="cropFPick(this)"/>
        <div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-s btn-sm" onclick="document.getElementById('cropFImg').click()"><i class="fa-solid fa-upload"></i> ${d.img?'Change image':'Upload image'}</button>${d.img?`<button class="btn btn-d btn-sm" onclick="cropFRemove()"><i class="fa-solid fa-trash"></i> Remove</button>`:''}</div>
        <div class="bg-guide" style="margin-top:8px"><i class="fa-solid fa-circle-info"></i>Square icon · recommended 160 × 160 px · max 500 KB.</div>
      </div>
    </div>
    <div class="row" style="margin-bottom:0"><div class="fg"><label>Crop name</label><input type="text" id="cropFName" value="${esc(d.name)}" data-maxlen="24" placeholder="e.g. Sugarcane"/></div></div>
    <div class="sub-l">Seasonal configuration <span class="hint">(months this crop is in season)</span></div>
    <div class="chip-row">${MONTHS.map(m=>`<span class="cchip ${(d.seasons||[]).indexOf(m)>=0?'on':''}" onclick="cropSeasonTog('${m}')">${m}</span>`).join('')}</div>`;
  const html=`<div id="addModal"><div class="apv-scrim" onclick="cropModalCancel()"></div>
    <div class="apv-box"><div class="apv-box-head"><h3>${cropDraftIdx>=0?'Edit crop':'Add crop'}</h3><button class="x-btn" onclick="cropModalCancel()"><i class="fa-solid fa-xmark"></i></button></div>
      <div class="apv-box-body">${body}</div>
      <div class="apv-box-foot"><button class="btn btn-s btn-sm" onclick="cropModalCancel()">Cancel</button><button class="btn btn-p btn-sm" onclick="cropModalSave()"><i class="fa-solid fa-check"></i> ${cropDraftIdx>=0?'Save crop':'Add crop'}</button></div>
    </div></div>`;
  document.querySelector('.hm').insertAdjacentHTML('beforeend', html);
}
/* state-wise sorting */
function sortRow(s,i){ const shown=s.order.slice(0,3).map(nm=>cropFind(nm).name).join(' → ');
  return `<div class="li" style="align-items:center"><div class="sb-ic sm" style="background:var(--green-lt);color:var(--green)"><i class="fa-solid fa-arrow-down-1-9"></i></div>
    <div class="li-body"><div class="li-sum"><span class="nm">${esc(s.states.join(', ')||'No states')}</span><span class="meta">🌱 ${s.order.length} crops · ${esc(shown)}${s.order.length>3?' …':''}</span></div></div>
    <div class="li-act"><button class="ic-btn" title="Edit" onclick="sortEdit(${i})"><i class="fa-solid fa-pen"></i></button><button class="ic-btn del" title="Delete" onclick="sortDel(${i})"><i class="fa-solid fa-trash"></i></button></div>
  </div>`; }
function sortDel(i){ cropSortings.splice(i,1); cropsUI(); }
function sortAdd(){ sortDraft={ id:'so'+Date.now().toString(36), states:[], order:cropLib.map(c=>c.name) }; sortDraftIdx=-1; sortModalRender(); }
function sortEdit(i){ sortDraft=JSON.parse(JSON.stringify(cropSortings[i])); sortDraftIdx=i; sortModalRender(); }
function sortModalCancel(){ sortDraft=null; sortDraftIdx=-1; const m=document.getElementById('addModal'); if(m)m.remove(); }
function sortModalSave(){ const d=sortDraft; if(!d.states.length){ sortModalCancel(); return; } if(sortDraftIdx>=0) cropSortings[sortDraftIdx]=d; else cropSortings.push(d); sortDraft=null; sortDraftIdx=-1; const m=document.getElementById('addModal'); if(m)m.remove(); cropsUI(); }
function sortStateTog(st){ let s=sortDraft.states.slice(); s.indexOf(st)>=0?s=s.filter(x=>x!==st):s.push(st); sortDraft.states=s; sortModalRender(); }
function sortMove(i,d){ const j=i+d; if(j<0||j>=sortDraft.order.length) return; const a=sortDraft.order; [a[i],a[j]]=[a[j],a[i]]; sortModalRender(); }
function sortModalRender(){ const ex=document.getElementById('addModal'); if(ex) ex.remove(); const d=sortDraft; if(!d) return;
  const n=d.order.length;
  const body=`
    <div class="sub-l" style="margin-top:0">States for this sorting <span class="hint">(pick one or more)</span></div>
    <div class="chip-row">${STATES.filter(s=>s!=='All States').map(s=>`<span class="cchip ${d.states.indexOf(s)>=0?'on':''}" onclick="sortStateTog('${s}')">${s}</span>`).join('')}</div>
    <div class="sub-l">Crop order for these states</div>
    <div class="entry-list">${d.order.map((nm,i)=>{ const c=cropFind(nm); return `<div class="li" style="align-items:center;padding:8px 11px">
      <span style="font-size:11px;font-weight:700;color:var(--g400);min-width:18px;text-align:center">${i+1}</span>${cropThumb(c,true)}
      <div class="li-body"><span class="nm" style="font-size:13px;font-weight:700">${esc(c.name)}</span></div>
      <div class="li-act"><button class="ic-btn" onclick="sortMove(${i},-1)" ${i===0?'disabled':''}><i class="fa-solid fa-arrow-up"></i></button><button class="ic-btn" onclick="sortMove(${i},1)" ${i===n-1?'disabled':''}><i class="fa-solid fa-arrow-down"></i></button></div>
    </div>`; }).join('')}</div>`;
  const html=`<div id="addModal"><div class="apv-scrim" onclick="sortModalCancel()"></div>
    <div class="apv-box" style="width:620px"><div class="apv-box-head"><h3>${sortDraftIdx>=0?'Edit sorting':'Add state-wise sorting'}</h3><button class="x-btn" onclick="sortModalCancel()"><i class="fa-solid fa-xmark"></i></button></div>
      <div class="apv-box-body">${body}</div>
      <div class="apv-box-foot"><button class="btn btn-s btn-sm" onclick="sortModalCancel()">Cancel</button><button class="btn btn-p btn-sm" onclick="sortModalSave()"><i class="fa-solid fa-check"></i> ${sortDraftIdx>=0?'Save sorting':'Add sorting'}</button></div>
    </div></div>`;
  document.querySelector('.hm').insertAdjacentHTML('beforeend', html);
}

/* ── SALE section — a list of sales, each edited in ONE form modal ── */
function saleUI(){ if(sel==='flash') pick('flash'); }
function saleDT(s){ return s?s.replace('T',' '):''; }
function saleSummary(s,i){
  const dates=(s.start&&s.end)?`${saleDT(s.start)} → ${saleDT(s.end)}`:'No schedule';
  const st=(s.states||['All']).indexOf('All')>=0?'All states':s.states.join(', ');
  const cr=(s.crops||['All']).indexOf('All')>=0?'All crops':s.crops.join(', ');
  return `<div class="li" style="align-items:center">
    <div class="sb-ic sm" style="background:var(--green-lt);color:var(--green)"><i class="fa-solid ${s.icon||'fa-bolt'}"></i></div>
    <div class="li-body"><div class="li-sum">
      <span class="nm">${esc(s.name)}</span>
      <span class="meta"><i class="fa-regular fa-clock"></i>${esc(dates)} · 🛒 ${s.products.length} product${s.products.length!==1?'s':''}</span>
      <span class="meta"><i class="fa-solid fa-location-dot"></i>${esc(st)} · 🌱 ${esc(cr)}</span>
    </div></div>
    <div class="li-act">
      <div class="tg ${s.on?'on':''}" title="Enable / disable" onclick="saleToggleIdx(${i})"></div>
      <button class="ic-btn" title="Edit" onclick="saleEditIdx(${i})"><i class="fa-solid fa-pen"></i></button>
      <button class="ic-btn del" title="Delete" onclick="saleDelIdx(${i})"><i class="fa-solid fa-trash"></i></button>
    </div>
  </div>`;
}
function saleToggleIdx(i){ saleList[i].on=!saleList[i].on; saleUI(); }
function saleDelIdx(i){ saleList.splice(i,1); saleUI(); }
function saleBlank(){ return { id:'s'+Date.now().toString(36), name:'', icon:'fa-bolt', on:true, start:'', end:'', countdown:true, leadValue:2, leadUnit:'hours', bgImage:'', products:[], states:['All'], crops:['All'], _q:'' }; }
function saleAdd(){ saleDraft=saleBlank(); saleDraftIdx=-1; saleFormRender(); }
function saleEditIdx(i){ saleDraft=JSON.parse(JSON.stringify(saleList[i])); saleDraft._q=''; saleDraftIdx=i; saleFormRender(); }
function saleFormCancel(){ saleDraft=null; saleDraftIdx=-1; const m=document.getElementById('addModal'); if(m)m.remove(); pick('flash'); }
function saleFormSave(){ saleFormSync(); const d=saleDraft; if(!d.name) d.name='Untitled sale'; delete d._q;
  if(saleDraftIdx>=0) saleList[saleDraftIdx]=d; else saleList.unshift(d);
  saleDraft=null; saleDraftIdx=-1; const m=document.getElementById('addModal'); if(m)m.remove(); pick('flash'); }
/* read live free-text inputs into the draft before any re-render */
function saleFormSync(){ if(!saleDraft) return;
  const g=id=>document.getElementById(id);
  if(g('saleFName')) saleDraft.name=g('saleFName').value;
  if(g('saleFStart')) saleDraft.start=g('saleFStart').value;
  if(g('saleFEnd')) saleDraft.end=g('saleFEnd').value;
  if(g('saleFLead')) saleDraft.leadValue=+g('saleFLead').value||1;
  if(g('saleFSearch')) saleDraft._q=g('saleFSearch').value;
}
function saleFIcon(ic){ saleFormSync(); saleDraft.icon=ic; saleFormRender(); }
function saleFToggle(k){ saleFormSync(); saleDraft[k]=!saleDraft[k]; saleFormRender(); }
function saleFSet(k,v){ if(saleDraft) saleDraft[k]=v; }
function saleFPick(input){ const f=input.files&&input.files[0]; if(!f) return; saleFormSync(); saleDraft.bgImage=URL.createObjectURL(f); saleFormRender(); }
function saleFRemoveBg(){ saleFormSync(); saleDraft.bgImage=''; saleFormRender(); }
function saleFStateAll(){ saleFormSync(); saleDraft.states=['All']; saleFormRender(); }
function saleFStateTog(st){ saleFormSync(); let s=saleDraft.states.filter(x=>x!=='All'); s.indexOf(st)>=0?s=s.filter(x=>x!==st):s.push(st); if(!s.length)s=['All']; saleDraft.states=s; saleFormRender(); }
function saleFCropAll(){ saleFormSync(); saleDraft.crops=['All']; saleFormRender(); }
function saleFCropTog(i){ saleFormSync(); const cr=CROPS[i]; let s=saleDraft.crops.filter(x=>x!=='All'); s.indexOf(cr)>=0?s=s.filter(x=>x!==cr):s.push(cr); if(!s.length)s=['All']; saleDraft.crops=s; saleFormRender(); }
/* products + variants + pricing (inline in the form) */
function saleFLines(){ if(!saleDraft.products.length) return '<p class="hint" style="margin:0 0 8px">No products added yet — search below to add variants.</p>';
  return saleDraft.products.map((pr,idx)=>`<div class="saleline">
    <div class="saleline-nm">🌱 ${esc(pr.name)} <span class="saleline-v">${esc(pr.variant)}</span></div>
    <div class="saleline-pr"><span class="saleline-mrp">₹${pr.mrp}</span> <b>₹${pr.price}</b></div>
    <button class="ic-btn del" title="Remove" onclick="saleFDelProd(${idx})"><i class="fa-solid fa-trash"></i></button>
  </div>`).join('');
}
function saleFDelProd(i){ saleFormSync(); saleDraft.products.splice(i,1); saleFormRender(); }
function saleFProdRows(q){ const ql=(q||'').toLowerCase(); const rows=[];
  PRODS.forEach(p=>{ if(p.n.toLowerCase().indexOf(ql)<0) return;
    (p.variants||[{v:'Standard',mrp:0}]).forEach(vr=>{
      const added=saleDraft.products.some(x=>x.name===p.n&&x.variant===vr.v);
      rows.push(`<div class="ppick${added?' on':''}">
        <div style="min-width:0;flex:1"><div class="ppick-nm">🌱 ${esc(p.n)}</div><div class="ppick-sub">${esc(vr.v)} · MRP ₹${vr.mrp}</div></div>
        ${added?'<span class="ppick-added"><i class="fa-solid fa-circle-check"></i> Added</span>'
          :`<div class="saleprice-wrap">₹<input type="number" class="saleprice" value="${vr.mrp}" placeholder="${vr.mrp}"/></div>
            <button class="btn btn-p btn-xs" onclick="saleFAdd('${p.n.replace(/'/g,"\\'")}','${vr.v.replace(/'/g,"\\'")}',${vr.mrp},this)">Add</button>`}
      </div>`);
    });
  });
  return rows.length?rows.join(''):'<p class="hint" style="padding:8px 2px">No products match.</p>';
}
function saleFProdSearch(q){ if(saleDraft) saleDraft._q=q; const el=document.getElementById('saleFProds'); if(el) el.innerHTML=saleFProdRows(q); }
function saleFAdd(pn,v,mrp,btn){ const row=btn.closest('.ppick'); const pi=row?row.querySelector('.saleprice'):null; const price=Math.max(0,+(pi&&pi.value)||mrp);
  saleFormSync(); saleDraft.products.push({name:pn,variant:v,mrp:mrp,price:price}); saleFormRender(); }
function saleFormRender(){
  const ex=document.getElementById('addModal'); if(ex) ex.remove();
  const d=saleDraft; if(!d) return;
  const allStates=(d.states||['All']).indexOf('All')>=0, allCrops=(d.crops||['All']).indexOf('All')>=0;
  const body=`
    <div class="sub-l" style="margin-top:0">Name &amp; icon</div>
    <div class="row"><div class="fg" style="max-width:340px"><label>Sale name</label><input type="text" id="saleFName" value="${esc(d.name)}" data-maxlen="24" placeholder="e.g. Mega Monsoon Sale"/></div></div>
    <div class="ic-grid">${SB_ICONS.map(ic=>`<div class="ic-opt${d.icon===ic?' on':''}" onclick="saleFIcon('${ic}')"><i class="fa-solid ${ic}"></i></div>`).join('')}</div>

    <div class="sub-l" style="margin-top:18px">Schedule</div>
    <div class="row"><div class="fg"><label>Start date &amp; time</label><input type="datetime-local" id="saleFStart" value="${d.start}"/></div><div class="fg"><label>End date &amp; time</label><input type="datetime-local" id="saleFEnd" value="${d.end}"/></div></div>

    <div class="sub-l">Countdown timer</div>
    <div class="tr"><div class="tr-l"><div class="tt">Show countdown to sale end</div><div class="td">HH:MM:SS ticking down to the end time</div></div><div class="tg ${d.countdown?'on':''}" onclick="saleFToggle('countdown')"></div></div>
    ${d.countdown?`<div class="row" style="margin:12px 0 0;align-items:flex-end">
      <div class="fg fix"><label>Start showing</label><input type="number" id="saleFLead" min="1" style="width:100px" value="${d.leadValue}"/></div>
      <div class="fg fix"><label>&nbsp;</label><select class="s" onchange="saleFSet('leadUnit',this.value)"><option${d.leadUnit==='minutes'?' selected':''}>minutes</option><option${d.leadUnit==='hours'?' selected':''}>hours</option><option${d.leadUnit==='days'?' selected':''}>days</option></select></div>
      <div class="fg"><label>&nbsp;</label><div style="padding:9px 0;font-size:12.5px;color:var(--g500)">before the sale ends</div></div>
    </div>`:''}

    <div class="sub-l">Background image</div>
    <div class="bg-up">
      <div class="bg-prev" style="background:${d.bgImage?'#111':'linear-gradient(135deg,#EA580C,#F59E0B)'}">${d.bgImage?`<img src="${d.bgImage}" alt=""/>`:'No image'}</div>
      <div style="flex:1;min-width:0">
        <input type="file" id="saleFBgFile" accept="image/png,image/jpeg,image/webp,image/gif" style="display:none" onchange="saleFPick(this)"/>
        <div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-p btn-sm" onclick="document.getElementById('saleFBgFile').click()"><i class="fa-solid fa-upload"></i> Upload background</button>${d.bgImage?`<button class="btn btn-d btn-sm" onclick="saleFRemoveBg()"><i class="fa-solid fa-trash"></i> Remove</button>`:''}</div>
        <div class="bg-guide"><i class="fa-solid fa-circle-info"></i>Full-width banner · recommended 1080 × 420 px · max 2 MB.</div>
      </div>
    </div>

    <div class="sub-l">Products &amp; pricing</div>
    <div id="saleFLines" class="saleline-list">${saleFLines()}</div>
    <div class="salepick-box">
      <div class="row" style="margin-bottom:8px"><div class="fg"><label>Search a product to see its variants</label><input type="text" id="saleFSearch" value="${esc(d._q||'')}" placeholder="Type a product name…" oninput="saleFProdSearch(this.value)"/></div></div>
      <div id="saleFProds" class="ppick-list">${saleFProdRows(d._q||'')}</div>
    </div>

    <div class="sub-l">Show to</div>
    <p class="hint" style="margin:0 0 8px">Target by farmer state and the crops they grow. Leave "All" for everyone.</p>
    <div class="sub-l" style="font-weight:600;margin-top:4px">States</div>
    <div class="chip-row"><span class="cchip ${allStates?'on':''}" onclick="saleFStateAll()">All states</span> ${STATES.filter(s=>s!=='All States').map(s=>`<span class="cchip ${(!allStates&&d.states.indexOf(s)>=0)?'on':''}" onclick="saleFStateTog('${s}')">${s}</span>`).join('')}</div>
    <div class="sub-l" style="font-weight:600">Crops the farmer grows</div>
    <div class="chip-row"><span class="cchip ${allCrops?'on':''}" onclick="saleFCropAll()">All crops</span> ${CROPS.map((c,i)=>`<span class="cchip ${(!allCrops&&d.crops.indexOf(c)>=0)?'on':''}" onclick="saleFCropTog(${i})">${c}</span>`).join('')}</div>`;
  const html=`<div id="addModal"><div class="apv-scrim" onclick="saleFormCancel()"></div>
    <div class="apv-box" style="width:760px">
      <div class="apv-box-head"><h3>${saleDraftIdx>=0?'Edit sale':'Create sale'}</h3><button class="x-btn" onclick="saleFormCancel()"><i class="fa-solid fa-xmark"></i></button></div>
      <div class="apv-box-body">${body}</div>
      <div class="apv-box-foot"><button class="btn btn-s btn-sm" onclick="saleFormCancel()">Cancel</button><button class="btn btn-p btn-sm" onclick="saleFormSave()"><i class="fa-solid fa-check"></i> ${saleDraftIdx>=0?'Save sale':'Create sale'}</button></div>
    </div></div>`;
  document.querySelector('.hm').insertAdjacentHTML('beforeend', html);
}
function addBS(btn){const p=PRODS.find(p=>!document.getElementById('bsList').innerHTML.includes(p.n));if(!p)return;const c=document.createElement('span');c.className='pchip';c.innerHTML=`⭐ ${p.n} <span class="x" onclick="this.closest('.pchip').remove()">×</span>`;btn.before(c);}
function addFC(btn){const p=PRODS[Math.floor(Math.random()*PRODS.length)];const c=document.createElement('span');c.className='pchip';c.innerHTML=`🌱 ${p.n} <span class="x" onclick="this.closest('.pchip').remove()">×</span>`;btn.before(c);}

// INIT — open the section from #hash (e.g. #theme) or the first one
renderList();
(function(){ const raw=(location.hash||'').replace('#',''); const parts=raw.split('/'); const sec=parts[0]; const id=SECS.some(s=>s.id===sec)?sec:SECS[0].id; pick(id); if(id==='theme'&&parts[1]){ teEdit=parts[1]; themeUI(); } })();
</script>
</body></html>
