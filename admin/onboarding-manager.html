<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>KKD Admin · Onboarding Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="assets/admin.css">
<style>
/* ── Onboarding Manager · scoped under .hm (same design system as Home Page Manager) ── */
.hm{
  --green:#258046;--green-lt:#ECFDF5;--green-md:#1F7A40;
  --g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g300:#D1D5DB;
  --g400:#9CA3AF;--g500:#6B7280;--g600:#4B5563;--g700:#374151;--g800:#1F2937;
  --red:#DC2626;--amber:#D97706;--blue:#2563EB;--r:10px;
  color:var(--g800);
}
.hm .hm-layout{display:flex;gap:16px;align-items:flex-start;}
.hm .lp{width:240px;flex-shrink:0;background:#fff;border:1px solid var(--g200);border-radius:var(--r);box-shadow:var(--shadow-sm);overflow:hidden;position:sticky;top:16px;}
.hm .lp-head{padding:13px 15px;border-bottom:1px solid var(--g100);}
.hm .lp-head h3{font-size:13px;font-weight:700;color:var(--g700);margin:0;}
.hm .lp-head p{font-size:11px;color:var(--g400);margin:2px 0 0;}
.hm .lp-body{padding:6px 0;}
.hm .sec-item{display:flex;align-items:center;gap:9px;padding:10px 13px;cursor:pointer;border-left:3px solid transparent;transition:background .1s;}
.hm .sec-item:hover{background:var(--g50);}
.hm .sec-item.active{background:var(--green-lt);border-left-color:var(--green);}
.hm .sec-icon{font-size:18px;flex-shrink:0;}
.hm .sec-info{flex:1;min-width:0;}
.hm .sec-name{font-size:13px;font-weight:600;}
.hm .sec-sub{font-size:10.5px;color:var(--g400);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hm .rp{flex:1;min-width:0;}
.hm .card{background:#fff;border:1px solid var(--g200);border-radius:var(--r);margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow-sm);}
.hm .card-head{padding:13px 18px;border-bottom:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between;}
.hm .card-head h3{font-size:13.5px;font-weight:700;margin:0;}
.hm .card-body{padding:18px;}
.hm .lang-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap;}
.hm .lt{padding:4px 11px;border-radius:20px;font-size:12px;cursor:pointer;border:1.5px solid var(--g200);color:var(--g600);transition:all .15s;font-weight:500;}
.hm .lt.on{background:var(--green);border-color:var(--green);color:#fff;}
.hm .row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.hm .fg{display:flex;flex-direction:column;flex:1;min-width:150px;}
.hm .fg.fix{flex:0 0 auto;}
.hm label{font-size:11px;font-weight:700;color:var(--g600);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px;display:block;}
.hm input[type=text],.hm input[type=number],.hm input[type=url],.hm input[type=date],.hm textarea,.hm select.s{
  border:1px solid var(--g200);border-radius:8px;padding:8px 10px;font-size:13px;
  color:var(--g800);outline:none;background:#fff;width:100%;font-family:inherit;transition:border .15s;
}
.hm input[type=date]{max-width:200px;cursor:pointer;}
.hm input[type=date]::-webkit-calendar-picker-indicator{cursor:pointer;opacity:.65;}
.hm input[type=date]:hover{border-color:var(--g300);}
.hm input:focus,.hm textarea:focus,.hm select.s:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(37,128,70,.08);}
.hm textarea{resize:vertical;min-height:60px;}
.hm input[type=color]{width:44px;height:34px;border:1px solid var(--g200);border-radius:6px;padding:2px;cursor:pointer;}
.hm .btn{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.hm .btn-p{background:var(--green);color:#fff;}
.hm .btn-p:hover{background:var(--green-md);}
.hm .btn-s{background:#fff;color:var(--g700);border:1px solid var(--g200);}
.hm .btn-s:hover{background:var(--g100);}
.hm .btn-d{background:#FEE2E2;color:var(--red);border:1px solid #FECACA;}
.hm .btn-d:hover{background:#FECACA;}
.hm .btn-sm{padding:5px 10px;font-size:12px;}
.hm .btn-ic{padding:5px 8px;font-size:13px;}
.hm .tr{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--g100);}
.hm .tr:last-child{border-bottom:none;}
.hm .tr-l .tt{font-size:13px;font-weight:600;}
.hm .tr-l .td{font-size:11px;color:var(--g400);margin-top:1px;}
.hm .tg{position:relative;width:37px;height:20px;background:var(--g200);border-radius:20px;cursor:pointer;transition:background .2s;flex-shrink:0;}
.hm .tg.on{background:var(--green);}
.hm .tg::after{content:'';position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.hm .tg.on::after{left:20px;}
.hm .li{display:flex;align-items:flex-start;gap:10px;padding:12px;border:1px solid var(--g200);border-radius:8px;margin-bottom:8px;background:#fff;}
.hm .li-body{flex:1;min-width:0;}
.hm .li-act{display:flex;gap:4px;flex-shrink:0;}
.hm .hint{font-size:11px;color:var(--g400);line-height:1.4;}
.hm .info-box{background:var(--green-lt);border-radius:8px;padding:11px 13px;font-size:12px;color:var(--green);margin-top:4px;display:flex;gap:8px;align-items:flex-start;}
.hm .lang-pill{font-size:10px;font-weight:700;color:var(--green);background:var(--green-lt);border-radius:6px;padding:1px 6px;margin-left:5px;vertical-align:middle;}
/* image field */
.hm .imgbox{width:62px;height:62px;border-radius:8px;border:1px solid var(--g200);background:var(--g50);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--g400);flex-shrink:0;overflow:hidden;}
.hm .imgbox img{max-width:100%;max-height:100%;object-fit:contain;}
.hm .factic{width:38px;height:38px;border-radius:8px;background:var(--green-lt);color:var(--green);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.hm .cchip{display:inline-flex;align-items:center;gap:4px;padding:4px 11px;border-radius:20px;font-size:12px;cursor:pointer;border:1.5px solid var(--g200);margin:3px 3px 3px 0;transition:all .15s;color:var(--g600);}
.hm .cchip.on{background:var(--green-lt);border-color:var(--green);color:var(--green);font-weight:600;}
.hm .sdiv{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--g400);padding:6px 0 8px;}
.hm .locked-card{position:relative;}
.hm .lock-badge{font-size:10px;font-weight:700;color:var(--g500);background:var(--g100);border:1px solid var(--g200);border-radius:20px;padding:2px 9px;display:inline-flex;align-items:center;gap:4px;}
.hm .splash-prev{width:96px;height:180px;border-radius:14px;border:1px solid var(--g200);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
.hm .splash-prev img{max-width:62%;max-height:40%;object-fit:contain;}
.hm .ro-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--g100);font-size:12.5px;}
.hm .ro-row:last-child{border-bottom:none;}
.hm .ro-row .k{color:var(--g500);font-weight:600;}
.hm .ro-row .v{color:var(--g800);font-weight:600;}
.hm .warn-box{background:#FFFBEB;color:var(--amber);border:1px solid #FDE68A;border-radius:8px;padding:9px 12px;font-size:12px;margin-top:10px;display:flex;gap:7px;align-items:flex-start;}
.hm .icon-grid{display:flex;flex-wrap:wrap;gap:6px;}
.hm .icpick{width:38px;height:38px;border-radius:9px;border:1.5px solid var(--g200);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--g500);cursor:pointer;transition:all .12s;background:#fff;}
.hm .icpick:hover{border-color:var(--g400);color:var(--g700);}
.hm .icpick.on{background:var(--green-lt);border-color:var(--green);color:var(--green);}
.hm .splash-nest{margin-top:14px;padding:14px 16px;border:1px solid var(--g200);border-left:3px solid var(--green);border-radius:10px;background:var(--g50);}
.hm .splash-nest .sdiv:first-child{padding-top:0;}
.hm .up-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:8px 10px;border:1px solid var(--g200);border-radius:9px;background:#fff;}
.hm .date-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:6px;}
.hm .hero-prev{width:100%;max-width:360px;aspect-ratio:1080/600;border-radius:12px;border:1px solid var(--g200);background:var(--g50);overflow:hidden;display:flex;align-items:center;justify-content:center;}
.hm .hero-prev img{width:100%;height:100%;object-fit:cover;}
.hm .hero-ph{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--g400);font-size:12px;}
.hm .hero-ph i{font-size:28px;}
@media (max-width:1080px){ .hm .hm-layout{flex-direction:column;} .hm .lp{width:100%;position:static;} }
</style>
</head>
<body>
<div class="admin">
  <aside class="sidebar" id="side"></aside>
  <div class="main">
    <header class="topbar" id="top"></header>
    <div class="work">
      <div class="hm">
        <div class="hm-layout">
          <div class="lp">
            <div class="lp-head"><h3>Onboarding screens</h3><p>click a screen to edit it</p></div>
            <div class="lp-body" id="secList"></div>
          </div>
          <div class="rp" id="rp"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="assets/data.js"></script>
<script src="assets/shell.js"></script>
<script src="assets/validate.js"></script>
<script>
AdminShell.mount({ active:'sc-onboarding', title:'Onboarding Manager', crumb:'App Screens', controls:'The first-run flow — splash, language, mobile, OTP, name & welcome', preview:'phone.html' });

const D = KKD.load();
const O = D.onboarding;
let activeKey = 'splash';
let activeLang = 'hi';

// 12 app languages (screens/language.html)
const LANGS=[{c:'hi',l:'HI'},{c:'en',l:'EN'},{c:'hien',l:'HIN'},{c:'mr',l:'MR'},{c:'gu',l:'GU'},{c:'pa',l:'PA'},{c:'te',l:'TE'},{c:'ta',l:'TA'},{c:'kn',l:'KN'},{c:'ml',l:'ML'},{c:'od',l:'OD'},{c:'bn',l:'BN'}];
const STATES=['MP','UP','Maharashtra','Gujarat','Rajasthan','Karnataka','AP','Telangana','Punjab','Haryana','Bihar','WB'];

// At most TWO splashes: the locked default (O.splash) + one optional custom (O.splashCustom).
// Defensive init for older saved state (top-level merge won't add nested keys).
if(!O.splashCustom) O.splashCustom = { enabled:false, img:'', imgByLocale:{}, trigger:{type:'festival',start:'',end:'',states:STATES.slice()} };
if(!O.splashCustom.trigger) O.splashCustom.trigger={type:'festival',start:'',end:'',states:STATES.slice()};
O.splashCustom.trigger.type='festival';                       // condition is always a festival/date range now
if(O.splashCustom.img===undefined) O.splashCustom.img = O.splashCustom.bgImage || '';   // migrate to direct image
if(!O.splashCustom.imgByLocale) O.splashCustom.imgByLocale={};
// normalize states: legacy ['All'] sentinel → every state selected
if(!Array.isArray(O.splashCustom.trigger.states) || O.splashCustom.trigger.states.indexOf('All')>=0) O.splashCustom.trigger.states=STATES.slice();
// Phone screen hero: a SINGLE hero image (not separate product components) with optional
// per-language variants. Migrate from the older 3-image array if present.
if(!O.phone.hero) O.phone.hero = { img:(O.phone.heroImages&&O.phone.heroImages[0])||'', imgByLocale:{}, states:STATES.slice(), stateImg:'' };
if(!O.phone.hero.imgByLocale) O.phone.hero.imgByLocale={};
if(!Array.isArray(O.phone.hero.states)) O.phone.hero.states=STATES.slice();
if(O.phone.hero.stateImg===undefined) O.phone.hero.stateImg='';
// OTP resend channels — enable/disable toggles (copy lives in Translations)
if(O.otp.resendWhatsapp===undefined) O.otp.resendWhatsapp=true;
if(O.otp.resendSms===undefined) O.otp.resendSms=true;
if(O.otp.factsEnabled===undefined) O.otp.factsEnabled=true;   // master on/off for the rotating strip
// Welcome — show the user's name in the greeting (toggle per variant)
if(O.welcomeAboard && O.welcomeAboard.showName===undefined) O.welcomeAboard.showName=true;
if(O.welcomeBack && O.welcomeBack.showName===undefined) O.welcomeBack.showName=true;

const SECTIONS = [
  { key:'splash',   icon:'📲', name:'Splash',          sub:'Logo + background',     screen:'splash.html' },
  { key:'language', icon:'🌐', name:'Language select',  sub:'12 languages',          screen:'language.html' },
  { key:'phone',    icon:'📱', name:'Mobile number',    sub:'Logo, hero, consent',   screen:'phone.html' },
  { key:'otp',      icon:'🔢', name:'OTP verify',       sub:'Rotating facts, resend',screen:'otp.html' },
  { key:'name',     icon:'🙋', name:'Name entry',       sub:'Name fields',           screen:'name.html' },
  { key:'welcome',  icon:'🎉', name:'Welcome',          sub:'Welcome + permission',  screen:'welcome-aboard.html' },
];

/* ---------- path helpers (read/write nested O by "a.b.0.c") ---------- */
function getPath(p){ return p.split('.').reduce((o,k)=> (o==null?o:o[k]), O); }
function setPath(p,val){ const ks=p.split('.'); let o=O; for(let i=0;i<ks.length-1;i++){ if(o[ks[i]]==null) o[ks[i]]={}; o=o[ks[i]]; } o[ks[ks.length-1]]=val; }
function commit(msg){ KKD.save(D); AdminShell.saved(msg||'Saved to draft'); }

/* ---------- field components ---------- */
// translatable text field — binds to <path>.<activeLang>, shows English as placeholder fallback
function tField(path,label,opts){
  opts=opts||{};
  const cur = getPath(path+'.'+activeLang) || '';
  const en  = getPath(path+'.en') || '';
  const ph  = (activeLang!=='en' && en) ? en : (opts.ph||'Enter text');
  const badge = activeLang!=='en' ? `<span class="lang-pill">${activeLang.toUpperCase()}</span>` : '';
  const ctrl = opts.area
    ? `<textarea oninput="setPath('${path}.${activeLang}',this.value)" onchange="commit()" placeholder="${esc(ph)}">${esc(cur)}</textarea>`
    : `<input type="text" value="${esc(cur)}" oninput="setPath('${path}.${activeLang}',this.value)" onchange="commit()" placeholder="${esc(ph)}"/>`;
  return `<div class="fg" ${opts.style?`style="${opts.style}"`:''}><label>${label}${badge}</label>${ctrl}${opts.hint?`<div class="hint" style="margin-top:4px">${opts.hint}</div>`:''}</div>`;
}
// plain text/number field
function field(path,label,opts){
  opts=opts||{};
  const cur = getPath(path); const v = (cur==null?'':cur);
  return `<div class="fg ${opts.fix?'fix':''}" ${opts.style?`style="${opts.style}"`:''}><label>${label}</label>
    <input type="${opts.type||'text'}" value="${esc(String(v))}" oninput="setPath('${path}',${opts.type==='number'?'(this.value===\'\'?0:+this.value)':'this.value'})" onchange="commit()" placeholder="${esc(opts.ph||'')}" ${opts.type==='number'?`style="max-width:140px"`:''}/>
    ${opts.hint?`<div class="hint" style="margin-top:4px">${opts.hint}</div>`:''}</div>`;
}
// image field — preview + path input + Upload. Pass `spec` (e.g. 'splash') to enforce
// dimensions/size via validate.js: a required-size hint + a result message appear.
function cssId(s){ return s.replace(/[^a-z0-9]/gi,''); }
function imgField(path,label,hint,spec){
  const v = getPath(path)||'';
  const isImg = /\.(png|jpe?g|webp|svg|gif)(\?|$)/i.test(v) || v.startsWith('blob:') || v.startsWith('data:') || v.startsWith('http');
  const specHint = (spec && window.KKDV) ? `<div class="kkdv-hint" style="margin-top:7px"><i class="fa-solid fa-circle-info"></i> ${KKDV.specHint(spec)}</div>` : '';
  return `<div class="fg"><label>${label}</label>
    <div style="display:flex;gap:11px;align-items:flex-start">
      <div class="imgbox">${isImg?`<img src="${esc(v)}" onerror="this.style.display='none'"/>`:'<i class="fa-solid fa-image"></i>'}</div>
      <div style="flex:1;min-width:0">
        <input type="text" value="${esc(v)}" oninput="setPath('${path}',this.value)" onchange="commit();rerender()" placeholder="../assets/your-image.png or https://…"/>
        <div style="display:flex;gap:7px;margin-top:7px;align-items:center">
          <button class="btn btn-s btn-sm" onclick="pickImg('${path}','${spec||''}')"><i class="fa-solid fa-upload"></i> Upload image</button>
          ${hint?`<span class="hint">${hint}</span>`:''}
        </div>
        ${specHint}
        <div class="kkdv-msg" id="msg_${cssId(path)}"></div>
      </div>
    </div></div>`;
}
function pickImg(path,spec){
  const inp=document.createElement('input'); inp.type='file';
  inp.accept = spec ? 'image/png,image/jpeg,image/webp' : 'image/*';
  inp.onchange=async ()=>{
    const f=inp.files&&inp.files[0]; if(!f)return;
    if(spec && window.KKDV){
      const res=await KKDV.checkImage(f,spec);
      const m=document.getElementById('msg_'+cssId(path));
      if(m){ m.className='kkdv-msg show '+res.kind; m.textContent=res.text; }
      if(res.kind==='err') return;                 // wrong size/type — keep current image
      setPath(path,res.url);
    } else {
      setPath(path, URL.createObjectURL(f));
    }
    commit('Image updated'); rerender();
  };
  inp.click();
}
// on/off toggle bound to a boolean path
function toggle(path,title,desc){
  const on = !!getPath(path);
  return `<div class="tr"><div class="tr-l"><div class="tt">${title}</div>${desc?`<div class="td">${desc}</div>`:''}</div>
    <div class="tg ${on?'on':''}" onclick="setPath('${path}',${!on});commit();rerender()"></div></div>`;
}
// color field bound to a path
function colorField(path,label){
  const v=getPath(path)||'#000000';
  return `<div class="fg fix"><label>${label}</label><div style="display:flex;gap:8px;align-items:center">
    <input type="color" value="${esc(v)}" oninput="setPath('${path}',this.value);document.getElementById('cx_${path.replace(/[^a-z0-9]/gi,'')}').value=this.value" onchange="commit()"/>
    <input id="cx_${path.replace(/[^a-z0-9]/gi,'')}" type="text" value="${esc(v)}" style="max-width:110px" oninput="setPath('${path}',this.value)" onchange="commit()"/>
  </div></div>`;
}

/* ---------- shared chrome ---------- */
function langBar(){ return `<div class="lang-tabs">${LANGS.map(l=>`<div class="lt${l.c===activeLang?' on':''}" onclick="setLang('${l.c}')">${l.l}</div>`).join('')}</div>`; }
function setLang(c){ activeLang=c; rerender(); }
function head(meta){
  return `<div class="flex items-center justify-between" style="margin-bottom:14px">
    <div><h2 style="font-size:18px;font-weight:800;margin:0">${meta.icon} ${meta.name}</h2></div>
    <button class="btn btn-s btn-sm" onclick="AdminShell.previewApp('${meta.screen}')"><i class="fa-solid fa-mobile-screen-button"></i> Preview in app</button>
  </div>`;
}
function card(title,inner){ return `<div class="card"><div class="card-head"><h3>${title}</h3></div><div class="card-body">${inner}</div></div>`; }

/* ---------- per-screen editors ---------- */
const EDITORS = {
  splash(){
    return head(meta('splash')) +
      `<div class="info-box" style="margin-bottom:14px"><i class="fa-solid fa-layer-group" style="margin-top:1px"></i><span>You can have <b>at most two splash screens</b>: the <b>Default</b> (always shown, locked) and one optional <b>Custom</b> splash that replaces it only when its condition matches.</span></div>` +
      splashDefaultCard() +
      splashCustomCard();
  },
  language(){
    const tiles = O.languages.map((L,i)=>`
      <div class="li" style="align-items:center">
        <div class="li-body">
          <div style="font-size:13.5px;font-weight:700">${esc(L.native||'—')}
            <span class="hint" style="font-weight:500;margin-left:4px">${esc(L.name||'')}${L.code?' · '+esc(L.code):''}</span></div>
        </div>
        <div class="li-act" style="align-items:center">
          <div class="tg ${L.on?'on':''}" title="${L.on?'Shown in the picker':'Hidden from the picker'}" onclick="setPath('languages.${i}.on',${!L.on});commit('Language '+(${!L.on}?'enabled':'disabled'));rerender()"></div>
        </div>
      </div>`).join('');
    return head(meta('language')) +
      card(`Languages in the picker · ${O.languages.length}`,
        `<p class="hint" style="margin:0 0 12px">The only action here is to <b>enable or disable</b> a language in the picker. Language names and all screen copy are managed in <b>Translations</b>.</p>`+
        tiles
      );
  },
  phone(){
    return head(meta('phone')) +
      card('Top bar',
        imgField('phone.logo','Top-bar logo','Shown ~40px tall at the top-left','logo')
      ) +
      card('Hero',
        phoneHeroBlock()
      );
  },
  otp(){
    const stripOn = O.otp.factsEnabled!==false;
    const facts = O.otp.facts.map((f,i)=>{
      const on = f.on!==false;
      return `
      <div class="li" style="${on?'':'opacity:.55'}">
        <div class="factic"><i class="fa-solid fa-${esc(f.icon||'circle-info')}"></i></div>
        <div class="li-body">
          ${iconPicker('otp.facts.'+i+'.icon', f.icon)}
          <div style="height:10px"></div>
          ${tField('otp.facts.'+i+'.text','Message')}
        </div>
        <div class="li-act"><div class="tg ${on?'on':''}" title="${on?'Shown in the strip':'Hidden'}" onclick="setPath('otp.facts.${i}.on',${!on});commit();rerender()"></div></div>
      </div>`;}).join('');
    return head(meta('otp')) +
      card('Resend',
        `<div class="row">`+ field('otp.resendSecs','Resend timer (secs)',{type:'number'}) +`</div>`+
        toggle('otp.resendWhatsapp','WhatsApp resend','Let users request the code on WhatsApp') +
        toggle('otp.resendSms','SMS resend','Let users request the code over SMS')
      ) +
      card('Auto-rotating message strip',
        toggle('otp.factsEnabled','Show the rotating message strip','Turn the whole strip on or off below the OTP boxes') +
        `<div style="height:8px"></div>`+
        `<p class="hint" style="margin:0 0 12px">Each message rotates one after another. Pick an icon, write the text, and turn individual messages on or off.</p>`+
        `<div class="row" style="margin-bottom:14px">`+ field('otp.factRotateMs','Rotation speed (ms)',{type:'number',hint:'Time each message stays on screen'}) +`</div>`+
        facts +
        `<button class="btn btn-s btn-sm" onclick="addFact()"><i class="fa-solid fa-plus"></i> Add rotating message</button>`
      );
  },
  name(){
    return head(meta('name')) +
      card('Screen text',
        `<div class="row" style="margin-bottom:0">`+ tField('name.heading','Heading') +`</div>`
      );
  },
  welcome(){
    return head(meta('welcome')) +
      card('Welcome — new user (Welcome aboard)',
        `<div class="row">`+ tField('welcomeAboard.eyebrow','Eyebrow') + tField('welcomeAboard.headline','Headline') +`</div>`+
        tField('welcomeAboard.sub','Sub-text',{area:true}) +
        `<div style="height:12px"></div>`+
        nameToggle('welcomeAboard')
      ) +
      card('Welcome — returning user (Welcome back)',
        `<div class="row">`+ tField('welcomeBack.eyebrow','Eyebrow') + tField('welcomeBack.headline','Headline') +`</div>`+
        tField('welcomeBack.sub','Sub-text',{area:true}) +
        `<div style="height:12px"></div>`+
        nameToggle('welcomeBack')
      );
  },
};
function meta(k){ return SECTIONS.find(s=>s.key===k); }

/* ---------- list mutations ---------- */
function addFact(){ O.otp.facts.push({ icon:'circle-info', text:{ en:'New message' }, on:true }); commit('Message added'); rerender(); }

/* ---------- Welcome: name on/off, shown linked to the greeting headline ---------- */
function nameToggle(base){
  const on = getPath(base+'.showName')!==false;
  const hl = getPath(base+'.headline.'+activeLang) || getPath(base+'.headline.en') || 'Welcome';
  const ex = on ? esc(hl)+', <span style="color:var(--green);font-weight:700">[user name]</span>' : esc(hl);
  return `<div style="border:1.5px solid ${on?'var(--green)':'var(--g200)'};border-radius:10px;padding:2px 14px 12px;background:${on?'var(--green-lt)':'var(--g50)'}">
    ${toggle(base+'.showName',"Show the user's name","Adds the logged-in user’s name to the greeting headline above")}
    <div class="hint" style="margin-top:2px">In the app the greeting reads: <b>“${ex}”</b></div>
  </div>`;
}

/* ---------- predefined icon picker (OTP rotating strip) ---------- */
const PRESET_ICONS=['truck-fast','box-open','shield-halved','lock','circle-check','headset','phone','clock',
  'leaf','seedling','wheat-awn','tractor','bug','flask','droplet',
  'hand-holding-dollar','indian-rupee-sign','percent','gift','star','tag','bolt'];
function iconPicker(path,cur){
  return `<div class="fg"><label>Icon</label>
    <div class="icon-grid">${PRESET_ICONS.map(ic=>`<span class="icpick ${ic===cur?'on':''}" title="${ic}" onclick="setPath('${path}','${ic}');commit('Icon updated');rerender()"><i class="fa-solid fa-${ic}"></i></span>`).join('')}</div></div>`;
}

/* ---------- PHONE hero: one image + per-language + per-state variants ---------- */
function clearImg(path){ setPath(path,''); commit('Image removed'); rerender(); }
// compact variant row (small preview + Upload/Replace/Clear + validation message)
function heroVar(path,label,spec,emptyHint){
  spec=spec||'hero';
  const v=getPath(path)||'';
  const isImg = /\.(png|jpe?g|webp|svg|gif)(\?|$)/i.test(v) || v.startsWith('blob:') || v.startsWith('data:') || v.startsWith('http');
  return `<div class="up-row">
    <div class="imgbox" style="width:46px;height:46px">${isImg?`<img src="${esc(v)}" onerror="this.style.display='none'"/>`:'<i class="fa-solid fa-image"></i>'}</div>
    <div style="flex:1;min-width:0">
      <div style="font-size:12.5px;font-weight:600">${label}${isImg?' <span class="lang-pill" style="background:#ECFDF5;color:#258046">set</span>':' <span class="hint" style="font-weight:500">'+(emptyHint||'falls back to default')+'</span>'}</div>
      <div class="kkdv-msg" id="msg_${cssId(path)}"></div>
    </div>
    <button class="btn btn-s btn-sm" onclick="pickImg('${path}','${spec}')"><i class="fa-solid fa-upload"></i> ${isImg?'Replace':'Upload'}</button>
    ${isImg?`<button class="btn btn-d btn-ic btn-sm" onclick="clearImg('${path}')"><i class="fa-solid fa-xmark"></i></button>`:''}
  </div>`;
}
// large full-image hero preview (proper aspect) + upload/replace/remove
function heroBig(path,label,hint,spec){
  spec=spec||'hero';
  const v=getPath(path)||'';
  const isImg = /\.(png|jpe?g|webp|svg|gif)(\?|$)/i.test(v) || v.startsWith('blob:') || v.startsWith('data:') || v.startsWith('http');
  return `<div class="fg"><label>${label}</label>
    <div class="hero-prev">${isImg?`<img src="${esc(v)}" onerror="this.parentNode.innerHTML='<div class=\\'hero-ph\\'><i class=\\'fa-solid fa-image\\'></i><span>Image not found</span></div>'"/>`:`<div class="hero-ph"><i class="fa-solid fa-image"></i><span>No hero image yet</span></div>`}</div>
    <div style="display:flex;gap:7px;margin-top:8px;align-items:center;flex-wrap:wrap">
      <button class="btn btn-s btn-sm" onclick="pickImg('${path}','${spec}')"><i class="fa-solid fa-upload"></i> ${isImg?'Replace image':'Upload image'}</button>
      ${isImg?`<button class="btn btn-d btn-sm" onclick="clearImg('${path}')"><i class="fa-solid fa-xmark"></i> Remove</button>`:''}
      ${hint?`<span class="hint">${hint}</span>`:''}
    </div>
    ${(spec&&window.KKDV)?`<div class="kkdv-hint" style="margin-top:8px"><i class="fa-solid fa-circle-info"></i> ${KKDV.specHint(spec)}</div>`:''}
    <div class="kkdv-msg" id="msg_${cssId(path)}"></div>
  </div>`;
}
function phoneHeroBlock(){
  const langs=O.languages.filter(L=>L.on);
  const sts=O.phone.hero.states||[], all=sts.length===STATES.length;
  const chips=STATES.map(st=>`<span class="cchip ${sts.indexOf(st)>=0?'on':''}" onclick="heroScope('${st}')">${st}</span>`).join('');
  return heroBig('phone.hero.img','Default hero — shown to all users','Used unless a state version below applies','hero')
    + `<div class="sdiv" style="margin-top:16px">States</div>`
    + `<div><span class="cchip ${all?'on':''}" onclick="heroScopeAll()">All states</span> ${chips}</div>`
    + `<div class="splash-nest">`
    +   `<div class="sdiv">Hero for the selected states</div>`
    +   imgField('phone.hero.stateImg','Hero image','Shown to users in the selected states','hero')
    +   `<div class="sdiv" style="margin-top:16px">By language <span class="hint" style="font-weight:500;text-transform:none;letter-spacing:0">· optional</span></div>`
    +   (langs.map(L=>heroVar('phone.hero.imgByLocale.'+L.code, esc(L.native||L.name||L.code)+' <span class="hint" style="font-weight:500">'+esc(L.code)+'</span>','hero')).join('') || `<div class="hint">No languages enabled.</div>`)
    + `</div>`
    + `<div class="info-box" style="margin-top:12px"><i class="fa-solid fa-circle-info" style="margin-top:1px"></i><span>A user in a selected state sees that state's hero (their <b>language</b> version if set); everyone else sees the <b>default</b>.</span></div>`;
}
function heroScopeAll(){ const s=O.phone.hero.states||[]; O.phone.hero.states = s.length===STATES.length?[]:STATES.slice(); commit(); rerender(); }
function heroScope(st){ let s=(O.phone.hero.states||[]).slice(); const i=s.indexOf(st); i>=0?s.splice(i,1):s.push(st); O.phone.hero.states=s; commit(); rerender(); }

/* ---------- SPLASH (max 2: locked default + 1 conditional custom) ---------- */
// Locked default — read-only, never editable. The guaranteed fallback.
function splashDefaultCard(){
  const s=O.splash;
  const logoImg = s.logo ? `<img src="${esc(s.logo)}" onerror="this.style.display='none'"/>` : '';
  return `<div class="card locked-card">
    <div class="card-head"><h3>Default splash <span class="lock-badge"><i class="fa-solid fa-lock"></i> Locked</span></h3>
      <span class="hint">Always shown · can't be edited</span></div>
    <div class="card-body">
      <div style="display:flex;gap:18px;align-items:flex-start">
        <div class="splash-prev" style="background:${esc(s.bg)}">${logoImg}</div>
        <div style="flex:1;min-width:0">
          <div class="ro-row"><span class="k">Logo</span><span class="v">${esc(s.logo.split('/').pop())}</span></div>
          <div class="ro-row"><span class="k">Background</span><span class="v"><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:${esc(s.bg)};border:1px solid var(--g200);vertical-align:middle;margin-right:5px"></span>${esc(s.bg)}</span></div>
          <div class="ro-row"><span class="k">Logo width</span><span class="v">${esc(String(s.logoWidth))} px</span></div>
          <div class="ro-row"><span class="k">Auto-advance</span><span class="v">${esc(String(s.durationMs))} ms</span></div>
        </div>
      </div>
      <div class="info-box" style="margin-top:14px"><i class="fa-solid fa-circle-info" style="margin-top:1px"></i><span>This is the fallback every user sees. It shows the logo only (no text), so it isn't part of Translations. To run a seasonal/festival splash, add a <b>Custom splash</b> below.</span></div>
    </div>
  </div>`;
}

// Optional second splash — a festival/date-range splash. Direct image upload (+ per-language).
function splashCustomCard(){
  const c=O.splashCustom, on=!!c.enabled;
  const langs=O.languages.filter(L=>L.on);
  let body;
  if(!on){
    body=`<div class="hint" style="font-size:12.5px;line-height:1.5">Off — every user sees the default splash. Turn this on to run a festival/seasonal splash that replaces the default during a chosen date range.</div>`;
  } else {
    body=`
      ${splashScopeRow()}
      <div class="splash-nest">
        <div class="sdiv">Active dates · festival / date range</div>
        <div class="date-row">
          ${field('splashCustom.trigger.start','Start date',{type:'date',fix:true})}
          ${field('splashCustom.trigger.end','End date',{type:'date',fix:true})}
        </div>
        ${splashCondSummary()}
        <div class="sdiv" style="margin-top:16px">Splash image <span class="hint" style="font-weight:500;text-transform:none;letter-spacing:0">· ${window.KKDV?KKDV.specHint('splash'):''}</span></div>
        ${heroVar('splashCustom.img','Default — shown to all users','splash','No image yet')}
        <div class="sdiv" style="margin-top:14px">By language <span class="hint" style="font-weight:500;text-transform:none;letter-spacing:0">· optional</span></div>
        ${langs.map(L=>heroVar('splashCustom.imgByLocale.'+L.code, esc(L.native||L.name||L.code)+' <span class="hint" style="font-weight:500">'+esc(L.code)+'</span>', 'splash')).join('') || `<div class="hint">No languages enabled.</div>`}
      </div>`;
  }
  return `<div class="card">
    <div class="card-head"><h3>Custom splash <span class="lang-pill" style="background:#EEF2FF;color:#4338CA">2nd of 2</span></h3>
      <div class="tg ${on?'on':''}" title="Enable custom splash" onclick="setPath('splashCustom.enabled',${!on});commit();rerender()"></div></div>
    <div class="card-body">${body}</div>
  </div>`;
}
function splashScopeRow(){
  const sts=O.splashCustom.trigger.states||[], all=sts.length===STATES.length;
  const chips=STATES.map(st=>`<span class="cchip ${sts.indexOf(st)>=0?'on':''}" onclick="splashScope('${st}')">${st}</span>`).join('');
  return `<div class="sdiv">States</div>
    <div><span class="cchip ${all?'on':''}" onclick="splashScopeAll()">All states</span> ${chips}</div>`;
}
function splashCondSummary(){
  const tr=O.splashCustom.trigger, sts=tr.states||[], all=sts.length===STATES.length;
  const scope = all?'all states':(sts.length?sts.join(', '):'no states');
  let warn='';
  if(tr.start&&tr.end&&tr.end<tr.start) warn='End date is before the start date — fix the range.';
  const summary = (tr.start&&tr.end&&sts.length)
    ? `Shows from <b>${esc(tr.start)}</b> to <b>${esc(tr.end)}</b> in <b>${esc(scope)}</b>. Outside this window, the default splash shows.` : '';
  return (summary?`<div class="info-box" style="margin-top:10px"><i class="fa-solid fa-eye" style="margin-top:1px"></i><span>${summary}</span></div>`:'')
    + (warn?`<div class="warn-box"><i class="fa-solid fa-triangle-exclamation" style="margin-top:1px"></i><span>${warn}</span></div>`:'');
}
function splashScopeAll(){ const sts=O.splashCustom.trigger.states||[]; O.splashCustom.trigger.states = sts.length===STATES.length ? [] : STATES.slice(); commit(); rerender(); }
function splashScope(st){ let s=(O.splashCustom.trigger.states||[]).slice(); const i=s.indexOf(st); i>=0?s.splice(i,1):s.push(st); O.splashCustom.trigger.states=s; commit(); rerender(); }

/* ---------- render ---------- */
function renderList(){
  document.getElementById('secList').innerHTML = SECTIONS.map(s=>`
    <div class="sec-item ${s.key===activeKey?'active':''}" onclick="selectSection('${s.key}')">
      <span class="sec-icon">${s.icon}</span>
      <div class="sec-info"><div class="sec-name">${s.name}</div><div class="sec-sub">${s.sub}</div></div>
    </div>`).join('');
}
function selectSection(k){ activeKey=k; try{ location.hash=k; }catch(e){} renderList(); rerender(); }
function rerender(){ document.getElementById('rp').innerHTML = EDITORS[activeKey](); }

// deep-link: #otp, #phone, … opens that screen directly
(function(){ const h=(location.hash||'').replace('#',''); if(h && SECTIONS.some(s=>s.key===h)) activeKey=h; })();
renderList(); rerender();
</script>
</body></html>
