<!DOCTYPE html><html><head><meta charset="utf-8">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',system-ui,sans-serif;background:#fff;width:390px}
  .head{font:800 13px system-ui;color:#0F172A;padding:20px 16px 1px;letter-spacing:.2px;border-top:1px solid #EEE}
  .sub{font:500 11px system-ui;color:#94A3B8;padding:0 16px 8px}
  .lab{font-size:11.5px;font-weight:600;color:#2A1F14;text-align:center;line-height:1.1}
  svg{display:block}

  /* A — soft circle badge */
  .rowA{display:flex;gap:6px;padding:6px 16px 16px}
  .rowA .t{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:8px}
  .rowA .c{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center}

  /* B — solid colour circle, white icon */
  .rowB{display:flex;gap:6px;padding:6px 16px 16px}
  .rowB .t{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:8px}
  .rowB .c{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 14px -6px rgba(0,0,0,.3)}

  /* C — inline pill (icon + label) */
  .rowC{display:flex;gap:8px;padding:6px 16px 16px;overflow-x:auto;flex-wrap:wrap}
  .rowC .p{display:inline-flex;align-items:center;gap:7px;padding:8px 13px 8px 9px;border-radius:999px;border:1px solid;background:#fff;box-shadow:0 2px 6px -3px rgba(40,30,15,.18)}
  .rowC .p .lab{font-size:12.5px;font-weight:600}

  /* D — minimal, no box, colour underline accent */
  .rowD{display:flex;gap:6px;padding:6px 16px 18px}
  .rowD .t{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:9px}
  .rowD .c{height:42px;display:flex;align-items:flex-end;justify-content:center}
  .rowD .u{width:20px;height:3px;border-radius:3px;margin-top:-4px}

  /* E — squircle card with colour icon-platform */
  .rowE{display:flex;gap:6px;padding:6px 16px 18px}
  .rowE .t{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:8px}
  .rowE .c{width:60px;height:60px;border-radius:18px;background:#fff;border:1px solid #ECE3D3;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px -9px rgba(60,45,25,.32),0 1px 2px rgba(60,45,25,.05)}
  .rowE .plat{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center}
</style></head>
<body>
<script>
const CATS=[
 {key:'pesticide', label:'Pesticide', ink:'#B23A1E', solid:'#C0492B', tint:'#FBEDE7', bd:'#EFD7CC'},
 {key:'fungicide', label:'Fungicide', ink:'#6B3E7A', solid:'#7A4A86', tint:'#F3ECF8', bd:'#E0D2EC'},
 {key:'fertilizer',label:'Fertilizer',ink:'#256B2A', solid:'#2E7D32', tint:'#ECF4EB', bd:'#CFE3CC'},
 {key:'herbicide', label:'Herbicide', ink:'#875A0C', solid:'#B07A12', tint:'#F8F1E0', bd:'#ECDDB6'},
 {key:'combo',     label:'Combo',     ink:'#34468C', solid:'#3D52A0', tint:'#EDF0F9', bd:'#D2DAF0'},
];
function glyph(key, stroke, sw, size){
 const o=`width="${size}" height="${size}" viewBox="0 0 48 48" fill="none" stroke="${stroke}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round"`;
 const inner={
  pesticide:`<path d="M34 8h4v4h-4z"/><path d="M34 12l-6 4h-4v4h4l6 4"/><rect x="14" y="16" width="14" height="24" rx="2"/><path d="M17 12h8v4"/><path d="M18 24h6"/>`,
  fungicide:`<path d="M8 40c0-18 12-32 32-32-2 18-14 32-32 32z"/><path d="M8 40C16 28 26 18 40 8"/><circle cx="22" cy="28" r="1.6"/><circle cx="28" cy="22" r="1.4"/><circle cx="30" cy="30" r="1.2"/>`,
  fertilizer:`<path d="M22 4c0 3 2 4 2 7s-2 4-2 7"/><path d="M18 10c-3 0-5-2-5-4 3 0 5 2 5 4z"/><path d="M30 10c3 0 5-2 5-4-3 0-5 2-5 4z"/><path d="M14 20c2-3 6-3 10 0 4-3 8-3 10 0l-2 20a3 3 0 01-3 3H19a3 3 0 01-3-3l-2-20z"/><path d="M19 28h10"/>`,
  herbicide:`<path d="M12 42V22"/><path d="M22 42V16"/><path d="M32 42V20"/><path d="M12 22c-2-2-3-4-3-6M12 22c2-2 3-4 3-6"/><path d="M22 16c-2-2-3-4-3-6M22 16c2-2 3-4 3-6"/><path d="M32 20c-2-2-3-4-3-6M32 20c2-2 3-4 3-6"/><line x1="8" y1="10" x2="40" y2="40"/>`,
  combo:`<rect x="6" y="16" width="10" height="26" rx="1.5"/><path d="M9 12h4v4H9z"/><rect x="19" y="12" width="10" height="30" rx="1.5"/><path d="M22 8h4v4h-4z"/><rect x="32" y="16" width="10" height="26" rx="1.5"/><path d="M35 12h4v4h-4z"/>`,
 }[key];
 return `<svg ${o}>${inner}</svg>`;
}

let h='';
// A
h+=`<div class="head">A · Soft circle badge</div><div class="sub">tinted circle · colour icon · label below (Blinkit/Zepto-style, minimal)</div><div class="rowA">`;
CATS.forEach(c=>h+=`<div class="t"><div class="c" style="background:${c.tint}">${glyph(c.key,c.ink,2.1,30)}</div><div class="lab">${c.label}</div></div>`);
h+=`</div>`;
// B
h+=`<div class="head">B · Solid colour circle</div><div class="sub">bold filled circle · white icon · app-launcher feel</div><div class="rowB">`;
CATS.forEach(c=>h+=`<div class="t"><div class="c" style="background:${c.solid}">${glyph(c.key,'#FFFFFF',2.1,28)}</div><div class="lab">${c.label}</div></div>`);
h+=`</div>`;
// C
h+=`<div class="head">C · Inline pill</div><div class="sub">icon + label side-by-side · filter-chip grammar</div><div class="rowC">`;
CATS.forEach(c=>h+=`<div class="p" style="border-color:${c.bd}"><span style="display:flex;width:24px;height:24px;align-items:center;justify-content:center;border-radius:50%;background:${c.tint}">${glyph(c.key,c.ink,2.2,17)}</span><span class="lab" style="color:${c.ink}">${c.label}</span></div>`);
h+=`</div>`;
// D
h+=`<div class="head">D · Minimal, no box</div><div class="sub">airy · colour icon + tiny colour underline · premium-clean</div><div class="rowD">`;
CATS.forEach(c=>h+=`<div class="t"><div class="c">${glyph(c.key,c.ink,2.1,34)}</div><div class="u" style="background:${c.solid}"></div><div class="lab">${c.label}</div></div>`);
h+=`</div>`;
// E
h+=`<div class="head">E · Card + colour icon-platform</div><div class="sub">white card · icon sits on a small colour chip (layered/premium)</div><div class="rowE">`;
CATS.forEach(c=>h+=`<div class="t"><div class="c"><div class="plat" style="background:${c.tint}">${glyph(c.key,c.ink,2.2,26)}</div></div><div class="lab">${c.label}</div></div>`);
h+=`</div>`;

document.body.innerHTML=h;
</script>
</body></html>
