<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head><body style="background:#fff">
<div id="out" style="position:fixed;top:0;left:0;z-index:99999;background:#000;color:#0f0;font:12px monospace;padding:6px;white-space:pre;max-width:100%"></div>
<script src="../assets/celebrate.js"></script><script src="../assets/rate.js"></script>
<script>window.addEventListener('load',function(){setTimeout(function(){
 window.kkdRate({name:'ZYME PLUS',img:'../assets/AntiVirus_nobg.png',rating:5});
 setTimeout(function(){
   var vw=document.documentElement.clientWidth, sw=document.documentElement.scrollWidth;
   var lines=['vw='+vw+' scrollWidth='+sw];
   if(sw>vw){
     document.querySelectorAll('*').forEach(function(el){
       var r=el.getBoundingClientRect();
       if(r.right>vw+1){ lines.push((el.className||el.tagName)+' right='+Math.round(r.right)+' w='+Math.round(r.width)); }
     });
   }
   document.getElementById('out').textContent=lines.slice(0,18).join('\n');
 },400);
},300);});</script></body></html>
