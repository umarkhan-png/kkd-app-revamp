<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/><title>KKD · Add Address</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>*{font-family:'Poppins',system-ui,sans-serif;-webkit-font-smoothing:antialiased}.hi{font-family:'Noto Sans Devanagari',sans-serif}html,body{margin:0;padding:0}body{min-height:100vh;background:#FDF8EE;color:#0F172A}.input{height:54px;padding:0 14px;border-radius:10px;border:2px solid #EEE5D8;background:#fff;font-size:14px;font-weight:600;width:100%;outline:none}.input:focus{border-color:#047857}.lbl{font-size:11px;font-weight:bold;text-transform:uppercase;letter-spacing:0.08em;color:#64748B;display:block;margin-bottom:6px}.tag{display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 14px;border-radius:999px;border:2px solid #EEE5D8;background:#fff;font-size:12px;font-weight:bold}.tag.active{border-color:#059669;background:#ECFDF5;color:#059669}</style></head>
<body class="min-h-screen pb-[110px]">

<div class="flex items-center justify-between px-4 pt-3 text-[11px] font-bold"><span>9:41</span><div class="flex items-center gap-1.5"><svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#0F172A" stroke-width="2.5"/></svg><svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#0F172A" stroke-width="2"/></svg><svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#0F172A" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#0F172A"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#0F172A"/></svg></div></div>

<div class="px-4 pt-4 flex items-center gap-3"><button onclick="history.back()" class="w-10 h-10 rounded-full bg-white border border-[#E5E7EB] flex items-center justify-center"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button><div class="hi text-[20px] font-extrabold">नया पता</div></div>

<!-- Use current location -->
<div class="px-4 mt-5">
  <button class="w-full bg-[#E8F2FB] border border-[#1565C0]/25 rounded-lg p-3 flex items-center gap-3">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1565C0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
    <div class="flex-1 text-left"><div class="text-[12.5px] font-extrabold text-[#1565C0]">Use current location</div><div class="text-[10.5px] text-[#64748B] mt-0.5">Auto-fill from GPS</div></div>
  </button>
</div>

<!-- Form -->
<div class="px-4 mt-5 space-y-4">
  <div><label class="lbl">Name</label><input class="input" value="Ramesh Patel"/></div>
  <div><label class="lbl">Mobile</label><input class="input" value="98765 43210"/></div>
  <div><label class="lbl">Pincode</label><input class="input" value="452001" placeholder="6 digits"/></div>
  <div><label class="lbl">House / Plot / Survey No.</label><input class="input" placeholder="Plot 22, Khasra 145"/></div>
  <div><label class="lbl">Village / Area</label><input class="input" placeholder="Bawadia"/></div>
  <div><label class="lbl">City</label><input class="input" value="Indore"/></div>
  <div><label class="lbl">State</label><input class="input" value="Madhya Pradesh"/></div>
  <div><label class="lbl">Landmark <span class="text-[#94A3B8] normal-case font-normal">(optional)</span></label><input class="input" placeholder="Near tube well"/></div>

  <div>
    <label class="lbl">Address type</label>
    <div class="flex gap-2 flex-wrap">
      <button class="tag active"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21V8l9-5 9 5v13"/></svg>Home</button>
      <button class="tag"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v8M8 6l4-4 4 4M5 22V12h14v10"/></svg>Farm</button>
      <button class="tag"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>Other</button>
    </div>
  </div>
</div>

<!-- Sticky save -->
<div class="fixed bottom-0 left-0 right-0 bg-white border-t border-[#E5E7EB] px-4 py-3">
  <button onclick="location.href='addresses.html'" class="w-full h-[52px] rounded-lg bg-[#059669] text-white text-[15px] font-extrabold"><span class="hi">पता save करें</span></button>
</div>

</body></html>
