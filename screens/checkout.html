<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/><title>KKD · Checkout</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>*{font-family:'Poppins',system-ui,sans-serif;-webkit-font-smoothing:antialiased}.hi{font-family:'Noto Sans Devanagari',sans-serif}html,body{margin:0;padding:0}body{min-height:100vh;background:#FAF7F2;color:#1C1C1C}.tnum{font-variant-numeric:tabular-nums}.pay{transition:all .15s}.pay.active{border-color:#0C831F;background:#F0FDF5}.pay.active .radio{background:#0C831F;border-color:#0C831F}.pay.active .radio::after{content:'';width:7px;height:7px;border-radius:999px;background:#fff}.radio{width:18px;height:18px;border-radius:999px;border:2px solid #C8C2B0;display:flex;align-items:center;justify-content:center}</style></head>
<body class="min-h-screen pb-[110px]">

<div class="flex items-center justify-between px-4 pt-3 text-[11px] font-bold"><span>9:41</span><div class="flex items-center gap-1.5"><svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#1C1C1C" stroke-width="2.5"/></svg><svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#1C1C1C" stroke-width="2"/></svg><svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#1C1C1C" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#1C1C1C"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#1C1C1C"/></svg></div></div>

<div class="px-4 pt-4 flex items-center gap-3"><button onclick="history.back()" class="w-10 h-10 rounded-full bg-white border border-[#EEE5D8] flex items-center justify-center"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button><div class="hi text-[20px] font-extrabold">Checkout</div></div>

<!-- Address -->
<div class="px-4 mt-5">
  <div class="text-[11px] font-bold text-[#606060] uppercase tracking-wider mb-2">Delivery Address</div>
  <div class="bg-white border border-[#EEE5D8] rounded-[14px] p-4">
    <div class="flex items-start gap-3">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="flex-shrink-0 mt-0.5"><path d="M3 21V8l9-5 9 5v13"/><path d="M9 21v-6h6v6"/></svg>
      <div class="flex-1">
        <div class="flex items-center gap-2 mb-1"><span class="text-[13px] font-extrabold">Home</span><span class="text-[9px] font-bold bg-[#F0FDF5] text-[#0C831F] px-1.5 py-0.5 rounded">Default</span></div>
        <div class="text-[13px] font-bold">Ramesh Patel · 98765 43210</div>
        <div class="text-[12px] text-[#606060] mt-0.5 leading-snug">Plot 22, Khasra No. 145<br/>Village Bawadia, Indore — 452001<br/>Madhya Pradesh</div>
      </div>
      <button onclick="location.href='addresses.html'" class="text-[11px] font-bold text-[#0E7A4E] uppercase">Change</button>
    </div>
  </div>
</div>

<!-- Payment -->
<div class="px-4 mt-5">
  <div class="text-[11px] font-bold text-[#606060] uppercase tracking-wider mb-2">Payment Method</div>
  <div class="space-y-2.5">

    <label class="pay active bg-white border-2 border-[#EEE5D8] rounded-[14px] p-3.5 flex items-center gap-3 cursor-pointer">
      <div class="radio"></div>
      <div class="w-10 h-10 rounded-[10px] bg-[#F0FDF5] flex items-center justify-center flex-shrink-0">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0C831F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="13" rx="2"/><path d="M2 11h20"/></svg>
      </div>
      <div class="flex-1">
        <div class="flex items-baseline gap-2"><span class="text-[14px] font-extrabold">Cash on Delivery</span><span class="hi text-[10px] text-[#606060]">कैश</span></div>
        <div class="text-[10.5px] text-[#606060] mt-0.5">Pay when you receive the order</div>
      </div>
    </label>

    <label class="pay bg-white border-2 border-[#EEE5D8] rounded-[14px] p-3.5 flex items-center gap-3 cursor-pointer">
      <div class="radio"></div>
      <div class="w-10 h-10 rounded-[10px] bg-[#E8F2FB] flex items-center justify-center flex-shrink-0">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1565C0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M9 18h6"/></svg>
      </div>
      <div class="flex-1">
        <div class="flex items-baseline gap-2"><span class="text-[14px] font-extrabold">UPI</span><span class="text-[10px] font-bold text-[#1565C0]">+ extra ₹50 off</span></div>
        <div class="text-[10.5px] text-[#606060] mt-0.5">PhonePe · GPay · Paytm · BHIM</div>
      </div>
    </label>

    <label class="pay bg-white border-2 border-[#EEE5D8] rounded-[14px] p-3.5 flex items-center gap-3 cursor-pointer">
      <div class="radio"></div>
      <div class="w-10 h-10 rounded-[10px] bg-[#FFF8E6] flex items-center justify-center flex-shrink-0">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8B6914" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 7v5l3 3"/></svg>
      </div>
      <div class="flex-1">
        <div class="text-[14px] font-extrabold">Partial Payment</div>
        <div class="text-[10.5px] text-[#606060] mt-0.5">₹500 now · balance on delivery</div>
      </div>
    </label>

  </div>
</div>

<!-- EDD -->
<div class="mx-4 mt-5 bg-white border border-[#EEE5D8] rounded-[14px] p-3.5 flex items-center gap-3">
  <div class="w-10 h-10 rounded-[10px] bg-[#FBF0E5] flex items-center justify-center"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C7821F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
  <div class="flex-1">
    <div class="text-[12.5px] font-extrabold">Delivers <span class="text-[#0C831F]">Tue, 19 May</span> – <span class="text-[#0C831F]">Thu, 21 May</span></div>
    <div class="text-[10.5px] text-[#606060] mt-0.5">Free delivery · Tracking on WhatsApp</div>
  </div>
</div>

<!-- Bill summary -->
<div class="mx-4 mt-4 bg-white border border-[#EEE5D8] rounded-[14px] p-4">
  <div class="space-y-2 text-[12.5px]">
    <div class="flex justify-between"><span class="text-[#606060]">Items (3)</span><span class="font-bold tnum">₹2,300</span></div>
    <div class="flex justify-between"><span class="text-[#606060]">Discount</span><span class="font-bold text-[#0C831F] tnum">−₹400</span></div>
    <div class="flex justify-between"><span class="text-[#606060]">Delivery</span><span class="font-bold text-[#0C831F]">FREE</span></div>
    <div class="border-t border-dashed border-[#EEE5D8] pt-2 mt-2 flex justify-between"><span class="text-[14px] font-extrabold">Total to pay</span><span class="text-[20px] font-black tnum">₹1,900</span></div>
  </div>
</div>

<!-- Sticky place order -->
<div class="fixed bottom-0 left-0 right-0 bg-white border-t border-[#EEE5D8] px-4 py-3">
  <button onclick="location.href='order-success.html'" class="w-full h-[54px] rounded-[10px] bg-[#0C831F] text-white text-[15px] font-extrabold flex items-center justify-between px-4">
    <span class="tnum">₹1,900</span>
    <span class="flex items-center gap-1"><span class="hi">Order करें</span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></span>
  </button>
</div>

</body></html>
