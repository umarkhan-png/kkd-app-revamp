<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/><title>KKD · Crop</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  *{font-family:'Poppins',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  html,body{margin:0;padding:0;overflow-x:hidden}
  body{min-height:100vh;background:#F8F8F8;color:#0F172A;padding-bottom:84px}
  .tnum{font-variant-numeric:tabular-nums}
  .sec-title{margin:20px 16px 10px;font-size:11.5px;font-weight:800;color:#64748B;text-transform:uppercase;letter-spacing:0.06em;display:flex;align-items:center;gap:8px}

  /* Crop selector chips */
  .crop-chips{display:flex;gap:8px;padding:8px 16px 6px;overflow-x:auto;scrollbar-width:none}
  .crop-chips::-webkit-scrollbar{display:none}
  .crop-chip{flex-shrink:0;display:inline-flex;align-items:center;gap:8px;padding:6px 12px 6px 6px;border-radius:9999px;background:#FFFFFF;border:1.5px solid #E5E7EB;cursor:pointer}
  .crop-chip .cimg{width:26px;height:26px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#ECFDF5;font-size:14px}
  .crop-chip .cimg img{width:100%;height:100%;object-fit:cover}
  .crop-chip span{font-size:13.5px;font-weight:700;color:#0F172A}
  .crop-chip.active{border-color:#047857;background:#ECFDF5}
  .crop-chip.active span{color:#047857;font-weight:800}
  .crop-add{flex-shrink:0;display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:9999px;background:#ECFDF5;border:1.5px dashed #10B981;color:#047857;font-size:12.5px;font-weight:800;cursor:pointer}

  /* Identity card */
  .ident{margin:12px 16px 0;background:#FFFFFF;border:1px solid #E5E7EB;border-radius:16px;padding:16px;box-shadow:0 1px 3px rgba(15,23,42,0.04);display:flex;align-items:center;gap:14px}
  .ident-img{width:60px;height:60px;border-radius:14px;overflow:hidden;flex-shrink:0;border:1px solid #E5E7EB;background:#ECFDF5;display:flex;align-items:center;justify-content:center;font-size:30px}
  .ident-img img{width:100%;height:100%;object-fit:cover}
  .ident h1{font-size:23px;font-weight:900;letter-spacing:-0.01em;line-height:1;color:#0F172A}
  .ident .sci{font-size:12.5px;font-style:italic;color:#94A3B8;margin-top:4px}
  .ident-chips{display:flex;flex-wrap:wrap;gap:7px;margin:12px 16px 0}
  .ident-chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:9999px;background:#F1F5F9;color:#475569}
  .ident-chip i{font-size:9px;color:#047857}

  /* Stat strip */
  .stats{display:flex;gap:10px;margin:14px 16px 0}
  .stat{flex:1;background:#FFFFFF;border:1px solid #E5E7EB;border-radius:13px;padding:13px 8px;text-align:center;box-shadow:0 1px 3px rgba(15,23,42,0.04)}
  .stat .v{font-size:20px;font-weight:900;color:#0F172A;line-height:1}
  .stat .k{font-size:10.5px;color:#64748B;font-weight:600;margin-top:4px;line-height:1.15}

  /* Vertical growth-stage accordions */
  .vstages{margin:0 16px}
  .vstg{background:#FFFFFF;border:1px solid #E5E7EB;border-left:3px solid #E5E7EB;border-radius:14px;overflow:hidden;margin-bottom:12px;box-shadow:0 1px 3px rgba(15,23,42,0.04)}
  .vstg.done{border-left-color:#10B981}
  .vstg.on{border-left-color:#047857}
  .vstg-head{display:flex;align-items:center;gap:12px;width:100%;padding:15px 15px;background:transparent;border:0;cursor:pointer;text-align:left}
  .vstg-dot{width:30px;height:30px;border-radius:50%;background:#F1F5F9;border:2px solid #E5E7EB;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#94A3B8;flex-shrink:0}
  .vstg.done .vstg-dot{background:#10B981;border-color:#10B981;color:#fff}
  .vstg.on .vstg-dot{background:#047857;border-color:#047857;color:#fff}
  .vstg-info{flex:1;min-width:0;line-height:1.25}
  .vstg-info .nm{font-size:15.5px;font-weight:800;color:#0F172A}
  .vstg-info .meta{font-size:12px;color:#94A3B8;margin-top:2px}
  .vstg-iss{flex-shrink:0;display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:800;color:#B45309;background:#FEF3C7;border:1px solid #FCD34D;padding:4px 9px;border-radius:9999px}
  .vstg-iss.none{color:#047857;background:#ECFDF5;border-color:#A7F3D0}
  .vstg-chev{font-size:12px;color:#94A3B8;transition:transform .2s ease;flex-shrink:0}
  .vstg.open .vstg-chev{transform:rotate(180deg)}
  .vstg-body{display:none;padding:0 14px 14px}
  .vstg.open .vstg-body{display:block}
  .vstg-empty{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:#047857;background:#ECFDF5;border:1px solid #A7F3D0;border-radius:10px;padding:10px 12px}

  /* Problem block (inside an expanded stage) */
  .prob-block{border:1px solid #F1F5F9;border-radius:12px;overflow:hidden;margin-top:10px}
  .prob-h{display:flex;align-items:center;gap:10px;padding:11px 12px;background:#FFFBEB}
  .prob-h .pic{width:28px;height:28px;border-radius:8px;background:#FEF3C7;color:#B45309;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
  .prob-h .pn{font-size:14.5px;font-weight:800;color:#0F172A;line-height:1.2}
  .sev{display:inline-flex;align-items:center;gap:4px;font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:0.04em;margin-top:2px}
  .sev::before{content:"";width:6px;height:6px;border-radius:50%}
  .sev.high{color:#DC2626}.sev.high::before{background:#DC2626}
  .sev.med{color:#B45309}.sev.med::before{background:#F59E0B}
  .prob-desc{font-size:13px;line-height:1.55;color:#475569;padding:10px 12px 0}
  .rp-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;color:#64748B;padding:10px 12px 6px}
  .prod-row{display:flex;align-items:center;gap:11px;padding:9px 12px;border-top:1px solid #F1F5F9;text-decoration:none;color:inherit}
  .prod-thumb{width:42px;height:42px;border-radius:10px;background:#F8FAFC;border:1px solid #E5E7EB;display:flex;align-items:center;justify-content:center;padding:5px;flex-shrink:0}
  .prod-thumb img{max-width:100%;max-height:100%;object-fit:contain;mix-blend-mode:multiply}
  .prod-meta{flex:1;min-width:0;line-height:1.25}
  .prod-meta .pn{font-size:13.5px;font-weight:800;color:#0F172A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .prod-meta .pc{font-size:11px;color:#94A3B8;font-weight:600;margin-top:2px}
  .prod-meta .ptype{display:inline-flex;font-size:9px;font-weight:700;padding:2px 7px;border-radius:9999px;margin-top:3px}
  .ptype.chem{background:#EFF6FF;color:#2563EB}.ptype.bio{background:#ECFDF5;color:#047857}
  .prod-price{text-align:right;flex-shrink:0}
  .prod-price .amt{font-size:13px;font-weight:900;color:#0F172A}
  .prod-price .add{margin-top:4px;display:inline-flex;font-size:10px;font-weight:800;color:#FFFFFF;background:#059669;padding:4px 11px;border-radius:8px;cursor:pointer}

  /* Empty state */
  .empty{margin:24px 16px 0;background:#FFFFFF;border:1px dashed #A7F3D0;border-radius:16px;padding:30px 20px;text-align:center}
  .empty .ic{width:64px;height:64px;border-radius:18px;margin:0 auto 14px;background:#ECFDF5;color:#047857;display:flex;align-items:center;justify-content:center;font-size:28px}
  .empty h2{font-size:17px;font-weight:900;color:#0F172A}
  .empty p{font-size:12.5px;color:#64748B;margin-top:5px;line-height:1.5}
  .empty .cta{margin-top:16px;height:48px;width:100%;border-radius:12px;background:#059669;color:#FFFFFF;border:0;font-size:14px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;box-shadow:0 8px 20px -6px rgba(5,150,105,0.45)}

  /* Ask Expert banner (matches the home/PDP expert element) */
  .expert-banner{display:flex;align-items:center;gap:12px;margin:16px 16px 0;padding:12px 14px;border-radius:16px;text-decoration:none;color:#FFFFFF;background:linear-gradient(145deg,#10B981,#065F46);box-shadow:0 8px 22px -6px rgba(16,185,129,0.55),inset 0 1px 0 rgba(255,255,255,0.18)}
  .expert-banner .ph-wrap{position:relative;flex-shrink:0}
  .expert-banner .ph{width:46px;height:46px;border-radius:9999px;object-fit:cover;border:2px solid #FFFFFF;display:block}
  .expert-banner .vb{position:absolute;bottom:-2px;right:-2px;width:22px;height:22px;border-radius:9999px;background:#DC2626;border:2px solid #FFFFFF;display:flex;align-items:center;justify-content:center;color:#FFFFFF;font-size:9px}
  .expert-banner .a{font-size:14px;font-weight:800}
  .expert-banner .b{font-size:11px;font-weight:600;color:rgba(255,255,255,0.85)}
  .expert-banner .ar{margin-left:auto;font-size:18px;font-weight:800}

  /* Add-crop bottom sheet (same pattern as the homepage Shop-by-Crop modal) */
  .modal-bd{position:fixed;inset:0;background:rgba(15,23,42,0.55);opacity:0;pointer-events:none;transition:opacity .25s ease;z-index:80}
  .modal-bd.open{opacity:1;pointer-events:auto}
  .modal-sheet{position:fixed;left:0;right:0;bottom:0;background:#fff;border-radius:24px 24px 0 0;box-shadow:0 -8px 32px rgba(0,0,0,0.18);transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);z-index:90;padding:0 0 22px;max-height:82vh;display:flex;flex-direction:column}
  .modal-sheet.open{transform:translateY(0)}
  .pick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:6px 20px 0;overflow-y:auto}
  .pick{position:relative;display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px 6px;border:2px solid #E5E7EB;border-radius:14px;background:#fff;cursor:pointer}
  .pick.sel{border-color:#059669;background:#ECFDF5}
  .pick .chk{position:absolute;top:6px;right:6px;width:18px;height:18px;border-radius:50%;background:#059669;color:#fff;display:none;align-items:center;justify-content:center;font-size:8px}
  .pick.sel .chk{display:flex}
  .pick .pcirc{width:56px;height:56px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#ECFDF5;font-size:28px}
  .pick .pcirc img{width:100%;height:100%;object-fit:cover}
  .pick span{font-size:12px;font-weight:700;color:#0F172A}
  .pick:active{transform:scale(.97)}
  .pick-apply{margin:14px 16px 4px;height:52px;border-radius:12px;background:#059669;color:#fff;border:0;font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;box-shadow:0 8px 20px -6px rgba(5,150,105,0.45)}
  .pick-apply:active{transform:scale(.99)}
  .pick-apply:disabled{opacity:.5;cursor:not-allowed}
</style></head>
<body>

  <div class="flex items-center justify-between px-4 pt-3 text-[11px] font-bold">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#0F172A" stroke-width="2.5"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#0F172A" stroke-width="2"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#0F172A" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#0F172A"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#0F172A"/></svg>
    </div>
  </div>

  <div class="px-4 pt-4 pb-1 flex items-center gap-3">
    <button onclick="if(history.length>1){history.back()}else{location.href='home.html'}" class="w-10 h-10 rounded-full flex items-center justify-center" style="background:#FFFFFF;border:1px solid #E5E7EB"><i class="fa-solid fa-arrow-left text-[14px]" style="color:#0F172A"></i></button>
    <h1 class="flex-1 text-[18px] font-extrabold" style="color:#0F172A">My crops</h1>
  </div>

  <div class="crop-chips" id="cropChips"></div>

  <div class="empty" id="cropEmpty" style="display:none">
    <div class="ic"><i class="fa-solid fa-seedling"></i></div>
    <h2>Add your first crop</h2>
    <p>Pick the crops you grow to see their growth stages, common problems, and the exact products to use.</p>
    <button class="cta" id="emptyAdd"><i class="fa-solid fa-plus text-[12px]"></i> Add a crop</button>
  </div>

  <div id="cropContent">
    <div class="ident">
      <div class="ident-img" id="cIdImg"></div>
      <div class="flex-1 min-w-0"><h1 id="cIdName">—</h1><div class="sci" id="cIdSci">—</div></div>
    </div>
    <div class="ident-chips" id="cIdChips"></div>
    <div class="stats" id="cStats"></div>

    <div class="sec-title"><i class="fa-solid fa-seedling"></i> Growth stages · tap to expand</div>
    <div class="vstages" id="cStages"></div>

    <a href="advisory.html" class="expert-banner">
      <span class="ph-wrap"><img src="../assets/expert.png" class="ph" alt="Krishi expert"/><span class="vb"><i class="fa-solid fa-video"></i></span></span>
      <span class="flex-1 leading-tight"><span class="block a">Ask Expert</span><span class="block b">Free agronomist call · 5 mins</span></span>
      <span class="ar">→</span>
    </a>
  </div>

  <!-- Add-crop bottom sheet -->
  <div id="addBd" class="modal-bd"></div>
  <div id="addSheet" class="modal-sheet">
    <div style="width:40px;height:4px;border-radius:9999px;background:#E2E8F0;margin:10px auto 12px;flex-shrink:0"></div>
    <div class="px-5 flex items-center justify-between flex-shrink-0">
      <div class="leading-tight"><div class="text-[18px] font-extrabold text-[#0F172A]">All Crops</div><div class="text-[12px] mt-0.5" style="color:#64748B">Tap all crops you grow</div></div>
      <button id="addClose" class="w-9 h-9 rounded-full flex items-center justify-center" style="background:#F1F5F9;border:0"><i class="fa-solid fa-xmark text-[13px]" style="color:#475569"></i></button>
    </div>
    <div class="pick-grid mt-3" id="pickGrid" style="flex:1"></div>
    <button id="addApply" class="pick-apply"><i class="fa-solid fa-circle-check text-[13px]"></i> Done</button>
  </div>

  <!-- Bottom nav · Crop active -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white flex justify-around items-center px-2 py-2 z-50" style="height:68px;border-top:1px solid #F1F5F9;box-shadow:0 -4px 16px rgba(0,0,0,0.04)">
    <a href="home.html" class="flex flex-col items-center gap-1" style="color:#94A3B8;text-decoration:none"><i class="fa-solid fa-house text-[20px]"></i><span class="text-[12.5px] font-semibold">Home</span></a>
    <a href="crop-detail.html" class="flex flex-col items-center gap-1" style="text-decoration:none"><i class="fa-solid fa-seedling text-[20px]" style="color:#059669"></i><span class="text-[12.5px] font-bold" style="color:#0F172A">Crop</span></a>
    <a href="orders.html" class="flex flex-col items-center gap-1" style="color:#94A3B8;text-decoration:none"><i class="fa-solid fa-box text-[20px]"></i><span class="text-[12.5px] font-semibold">Orders</span></a>
    <a href="account.html" class="flex flex-col items-center gap-1" style="color:#94A3B8;text-decoration:none"><i class="fa-solid fa-user text-[20px]"></i><span class="text-[12.5px] font-semibold">Profile</span></a>
  </nav>

  <script>
    const IMG = {
      cotton:{u:'https://images.unsplash.com/photo-1591885503007-9b80d9c89a52?w=160&q=80', e:'🌿'},
      wheat:{u:'https://images.unsplash.com/photo-1574226516831-e1dff420e562?w=160&q=80', e:'🌾'},
      tomato:{u:'https://images.unsplash.com/photo-1592924357228-91a4daadcfea?w=160&q=80', e:'🍅'},
      chilli:{u:'https://images.unsplash.com/photo-1583852048850-31c0d0e7cdde?w=160&q=80', e:'🌶️'},
      maize:{u:'https://images.unsplash.com/photo-1551754655-cd27e38d2076?w=160&q=80', e:'🌽'},
      sugarcane:{u:'https://images.unsplash.com/photo-1597106776019-b4ecc878c202?w=160&q=80', e:'🎋'},
      paddy:{u:'https://images.unsplash.com/photo-1568347877321-f8935c7dc5a8?w=160&q=80', e:'🌱'},
      onion:{u:'https://images.unsplash.com/photo-1618512496248-a07fe83aa8cb?w=160&q=80', e:'🧅'},
      potato:{u:'https://images.unsplash.com/photo-1518977676601-b53f82aba655?w=160&q=80', e:'🥔'}
    };
    // Full crop catalog · identical to the homepage "All Crops" sheet (assets/crops/<key>.jpg) so the Add-crop modal matches it 1:1
    const CROP_IMG = '../assets/crops/';
    const CROP_META = {
      tomato:{label:'Tomato',emoji:'🍅',bg:'#FEE2E2',img:CROP_IMG+'tomato.jpg'},
      chilli:{label:'Chilli',emoji:'🌶',bg:'#FFEDD5',img:CROP_IMG+'chilli.jpg'},
      wheat:{label:'Wheat',emoji:'🌾',bg:'#FEF3C7',img:CROP_IMG+'wheat.jpg'},
      maize:{label:'Maize',emoji:'🌽',bg:'#FEF9C3',img:CROP_IMG+'maize.jpg'},
      onion:{label:'Onion',emoji:'🧅',bg:'#FCE7F3',img:CROP_IMG+'onion.jpg'},
      potato:{label:'Potato',emoji:'🥔',bg:'#FEF3C7',img:CROP_IMG+'potato.jpg'},
      sugarcane:{label:'Sugarcane',emoji:'🎋',bg:'#DCFCE7',img:CROP_IMG+'sugarcane.jpg'},
      banana:{label:'Banana',emoji:'🍌',bg:'#FEF9C3',img:CROP_IMG+'banana.jpg'},
      mango:{label:'Mango',emoji:'🥭',bg:'#FED7AA',img:CROP_IMG+'mango.jpg'},
      grapes:{label:'Grapes',emoji:'🍇',bg:'#F3E8FF',img:CROP_IMG+'grapes.jpg'},
      orange:{label:'Orange',emoji:'🍊',bg:'#FFEDD5',img:CROP_IMG+'orange.jpg'},
      watermelon:{label:'Watermelon',emoji:'🍉',bg:'#FECACA',img:CROP_IMG+'watermelon.jpg'},
      papaya:{label:'Papaya',emoji:'🥭',bg:'#FED7AA',img:CROP_IMG+'papaya.jpg'},
      pomegranate:{label:'Pomegranate',emoji:'🍎',bg:'#FEE2E2',img:CROP_IMG+'pomegranate.jpg'},
      brinjal:{label:'Brinjal',emoji:'🍆',bg:'#EDE9FE',img:CROP_IMG+'brinjal.jpg'},
      cauliflower:{label:'Cauliflower',emoji:'🥦',bg:'#FEF3C7',img:CROP_IMG+'cauliflower.jpg'},
      cabbage:{label:'Cabbage',emoji:'🥬',bg:'#DCFCE7',img:CROP_IMG+'cabbage.jpg'},
      okra:{label:'Okra',emoji:'🌿',bg:'#DCFCE7',img:CROP_IMG+'okra.jpg'},
      garlic:{label:'Garlic',emoji:'🧄',bg:'#F5F5F4',img:CROP_IMG+'garlic.jpg'},
      cumin:{label:'Cumin',emoji:'🌱',bg:'#FEF3C7',img:CROP_IMG+'cumin.jpg'},
      cardamom:{label:'Cardamom',emoji:'🌿',bg:'#D1FAE5',img:CROP_IMG+'cardamom.jpg'},
      chickpea:{label:'Chickpea',emoji:'🫘',bg:'#FEF3C7',img:CROP_IMG+'chickpea.jpg'},
      soyabean:{label:'Soyabean',emoji:'🫘',bg:'#DCFCE7',img:CROP_IMG+'soyabean.jpg'},
      blackgram:{label:'Black Gram',emoji:'🫘',bg:'#E5E7EB',img:CROP_IMG+'blackgram.jpg'}
    };
    function cropFallback(img, emoji, size){ img.outerHTML = '<div class="w-full h-full flex items-center justify-center" style="font-size:'+(size||32)+'px;line-height:1">'+emoji+'</div>'; }
    function cropImg(k, cls){
      const c = IMG[k];
      if (c) return '<img src="' + c.u + '" class="' + (cls||'') + '" onerror="this.parentNode.textContent=\'' + c.e + '\'"/>';
      const m = CROP_META[k];
      if (m) return '<img src="' + m.img + '" class="' + (cls||'') + '" onerror="this.parentNode.textContent=\'' + m.emoji + '\'"/>';
      return '🌱';
    }
    // Returns the full guide entry, or a graceful stub for catalog crops without a detailed guide yet
    function getCrop(k){
      if (CROPS[k]) return CROPS[k];
      const m = CROP_META[k] || { label:k };
      const cap = m.label.charAt(0).toUpperCase() + m.label.slice(1);
      return { name:cap, sci:'', chips:['Crop'], stats:{stages:'—',issues:'—',products:'—',dur:'—'}, on:1, stages:[], stub:true };
    }
    const P = {
      striker:{n:'STRIKER',c:'BK-548',t:'chem',p:'₹8,789',img:'https://katyayanikrishidirect.com/cdn/shop/files/Chakrawarti_2.webp'},
      hattrick:{n:'HATTRICK',c:'BK-996',t:'chem',p:'₹24,400',img:'https://katyayanikrishidirect.com/cdn/shop/files/Humic_1.jpg'},
      coc:{n:'COC 50',c:'BK-46',t:'chem',p:'₹2,800',img:'https://katyayanikrishidirect.com/cdn/shop/files/NPK_19-19-19_Front.webp'},
      zyme:{n:'ZYME PLUS',c:'BK-137',t:'bio',p:'₹14,850',img:'../assets/AntiVirus_nobg.png'},
      antivirus:{n:'ANTI VIRUS',c:'BK-116',t:'bio',p:'₹1,740',img:'../assets/AntiVirus_nobg.png'},
      kacepro:{n:'K-ACEPRO',c:'BK-5513',t:'chem',p:'₹550',img:'https://katyayanikrishidirect.com/cdn/shop/files/Triple_attack_1_2.webp'},
      metamanco:{n:'META-MANCO',c:'BK-144',t:'chem',p:'₹22,500',img:'https://katyayanikrishidirect.com/cdn/shop/files/Bhumiraja_2_1.webp'},
      neem:{n:'NEEM SHAKTI',c:'BK-208',t:'bio',p:'₹980',img:'https://katyayanikrishidirect.com/cdn/shop/files/ChakraveerNewMockup.webp'}
    };
    const PROB = {
      rootrot:{nm:'Root Rot',sev:'high',desc:'Black lesions on hypocotyls, girdling of stem and seedling death. The root system rots and plants pull out easily.',prods:['striker','hattrick','coc','zyme']},
      clcv:{nm:'Cotton Leaf Curl Virus',sev:'high',desc:'Deep downward cupping of young leaves with swelling/darkening of veins; later, curling of leaf margins.',prods:['antivirus','kacepro','neem']},
      cercospora:{nm:'Cercospora leaf spot',sev:'med',desc:'Brown flecks with reddish borders expand to circular ashy-grey spots; tissue turns thin and brittle.',prods:['metamanco','coc']},
      yellowrust:{nm:'Yellow Rust',sev:'high',desc:'Yellow stripes of powdery pustules along leaf veins; severe attacks shrivel grain and cut yield.',prods:['metamanco','coc','zyme']},
      aphid:{nm:'Aphid infestation',sev:'med',desc:'Colonies on leaves/ears suck sap, leaving plants weak and sticky with honeydew and sooty mould.',prods:['kacepro','neem']},
      earlyblight:{nm:'Early Blight',sev:'high',desc:'Concentric dark "target" rings on older leaves; spreads upward, defoliating the plant.',prods:['metamanco','coc','zyme']},
      tlcv:{nm:'Leaf Curl Virus',sev:'high',desc:'Upward curling, puckering and yellowing of leaves with stunted growth; whitefly-transmitted.',prods:['antivirus','neem','kacepro']},
      thrips:{nm:'Thrips & leaf curl',sev:'high',desc:'Thrips scrape leaves causing upward curling and a leathery look; flowers and fruit-set drop.',prods:['kacepro','antivirus','neem']},
      anthracnose:{nm:'Anthracnose (fruit rot)',sev:'med',desc:'Sunken, circular, water-soaked lesions on ripening fruit with pinkish spore masses.',prods:['metamanco','coc']},
      stemborer:{nm:'Stem borer',sev:'high',desc:'Larvae bore into the stem causing "dead hearts" in young plants and white-ears later; the central whorl dries up.',prods:['kacepro','striker','neem']},
      redrot:{nm:'Red Rot',sev:'high',desc:'Crown leaves dry; split canes show reddened internal tissue with crosswise white patches and a sour smell.',prods:['metamanco','coc','zyme']},
      blast:{nm:'Rice Blast',sev:'high',desc:'Spindle-shaped spots with grey centres on leaves; neck blast rots the panicle base and breaks the head.',prods:['metamanco','coc','zyme']},
      purpleblotch:{nm:'Purple Blotch',sev:'med',desc:'White sunken flecks enlarge to purple lesions with concentric zones; leaf tips dry and bulb size drops.',prods:['metamanco','coc']},
      lateblight:{nm:'Late Blight',sev:'high',desc:'Water-soaked dark patches on leaves with white mould underneath; spreads fast in cool, damp weather.',prods:['metamanco','coc','zyme']}
    };
    function S(n,nm,day,dur,pct,problems){ return {n,nm,day,dur,pct,problems:problems||[]}; }
    const CROPS = {
      cotton:{ name:'Cotton', sci:'Gossypium hirsutum', chips:['Fiber','Kharif','CR-8','180 days'], stats:{stages:9,issues:47,products:313,dur:'180d'}, on:3,
        stages:[S(1,'Sprouting','Day 0–1','1 day','0%'),S(2,'Sowing','Day 0–1','1 day','1%'),S(3,'Germination & Emergence','Day 8–15','8 days','4%',['rootrot']),S(4,'Vegetative & Branch Dev.','Day 15–25','11 days','6%',['rootrot','clcv']),S(5,'Squaring start','Day 30–40','11 days','20%',['clcv']),S(6,'Squaring','Day 40–50','11 days','27%',['cercospora']),S(7,'Bloom','Day 50–75','26 days','40%'),S(8,'Ball development','Day 90–100','11 days','55%'),S(9,'Maturity','Day 120–140','21 days','78%')] },
      wheat:{ name:'Wheat', sci:'Triticum aestivum', chips:['Cereal','Rabi','WH-1105','140 days'], stats:{stages:6,issues:31,products:210,dur:'140d'}, on:2,
        stages:[S(1,'Sowing','Day 0–1','1 day','0%'),S(2,'Germination','Day 4–10','6 days','5%'),S(3,'Tillering','Day 20–45','25 days','20%',['yellowrust']),S(4,'Jointing','Day 45–65','20 days','40%'),S(5,'Heading & flowering','Day 65–95','30 days','60%',['aphid']),S(6,'Grain fill & maturity','Day 95–140','45 days','80%')] },
      tomato:{ name:'Tomato', sci:'Solanum lycopersicum', chips:['Vegetable','All season','TM-842','120 days'], stats:{stages:6,issues:38,products:265,dur:'120d'}, on:3,
        stages:[S(1,'Nursery','Day 0–20','20 days','0%'),S(2,'Transplant','Day 20–25','5 days','15%'),S(3,'Vegetative','Day 25–45','20 days','30%',['earlyblight']),S(4,'Flowering','Day 45–60','15 days','45%',['tlcv']),S(5,'Fruit set','Day 60–85','25 days','60%'),S(6,'Ripening & harvest','Day 85–120','35 days','80%')] },
      chilli:{ name:'Chilli', sci:'Capsicum annuum', chips:['Vegetable','Kharif','CH-27','150 days'], stats:{stages:6,issues:29,products:198,dur:'150d'}, on:2,
        stages:[S(1,'Nursery','Day 0–25','25 days','0%'),S(2,'Transplant','Day 25–30','5 days','15%'),S(3,'Vegetative','Day 30–55','25 days','30%',['thrips']),S(4,'Flowering','Day 55–75','20 days','45%'),S(5,'Fruiting','Day 75–110','35 days','65%',['anthracnose']),S(6,'Harvest','Day 110–150','40 days','85%')] },
      maize:{ name:'Maize', sci:'Zea mays', chips:['Cereal','Kharif','MZ-900','110 days'], stats:{stages:6,issues:26,products:175,dur:'110d'}, on:2,
        stages:[S(1,'Sowing','Day 0–1','1 day','0%'),S(2,'Germination','Day 4–10','6 days','5%'),S(3,'Vegetative','Day 15–40','25 days','25%',['stemborer']),S(4,'Tasseling','Day 45–60','15 days','45%'),S(5,'Silking & grain fill','Day 60–90','30 days','65%',['aphid']),S(6,'Maturity','Day 90–110','20 days','85%')] },
      sugarcane:{ name:'Sugarcane', sci:'Saccharum officinarum', chips:['Cash crop','Annual','SC-238','12 months'], stats:{stages:5,issues:22,products:160,dur:'365d'}, on:2,
        stages:[S(1,'Planting','Day 0–1','1 day','0%'),S(2,'Germination','Day 10–40','30 days','8%',['stemborer']),S(3,'Tillering','Day 40–120','80 days','25%',['redrot']),S(4,'Grand growth','Day 120–270','150 days','55%',['redrot']),S(5,'Maturity & ripening','Day 270–365','95 days','85%')] },
      paddy:{ name:'Paddy', sci:'Oryza sativa', chips:['Cereal','Kharif','PB-1','135 days'], stats:{stages:6,issues:34,products:240,dur:'135d'}, on:3,
        stages:[S(1,'Nursery','Day 0–21','21 days','0%'),S(2,'Transplant','Day 21–25','4 days','15%'),S(3,'Tillering','Day 25–55','30 days','30%',['blast','stemborer']),S(4,'Panicle initiation','Day 55–75','20 days','50%',['blast']),S(5,'Flowering','Day 75–100','25 days','65%'),S(6,'Grain fill & harvest','Day 100–135','35 days','85%')] },
      onion:{ name:'Onion', sci:'Allium cepa', chips:['Vegetable','Rabi','ON-53','140 days'], stats:{stages:5,issues:24,products:150,dur:'140d'}, on:2,
        stages:[S(1,'Nursery','Day 0–35','35 days','0%'),S(2,'Transplant','Day 35–40','5 days','25%'),S(3,'Vegetative','Day 40–80','40 days','45%',['purpleblotch','thrips']),S(4,'Bulb development','Day 80–120','40 days','65%',['purpleblotch']),S(5,'Maturity & curing','Day 120–140','20 days','85%')] },
      potato:{ name:'Potato', sci:'Solanum tuberosum', chips:['Vegetable','Rabi','PT-3','100 days'], stats:{stages:5,issues:28,products:185,dur:'100d'}, on:2,
        stages:[S(1,'Planting','Day 0–1','1 day','0%'),S(2,'Sprouting','Day 10–25','15 days','15%'),S(3,'Vegetative','Day 25–45','20 days','35%',['lateblight','aphid']),S(4,'Tuber bulking','Day 45–75','30 days','60%',['lateblight']),S(5,'Maturity','Day 75–100','25 days','85%')] }
    };

    let userCrops = ['cotton','wheat'];
    let active = userCrops[0] || null;

    const chipsEl = document.getElementById('cropChips');
    const content = document.getElementById('cropContent');
    const emptyEl = document.getElementById('cropEmpty');

    function renderChips(){
      chipsEl.innerHTML = '';
      userCrops.forEach(k => {
        const b = document.createElement('button');
        b.className = 'crop-chip' + (k === active ? ' active' : '');
        b.innerHTML = '<span class="cimg">' + cropImg(k) + '</span><span>' + getCrop(k).name + '</span>';
        b.addEventListener('click', () => { active = k; renderChips(); renderCrop(); });
        chipsEl.appendChild(b);
      });
      const add = document.createElement('button');
      add.className = 'crop-add';
      add.innerHTML = '<i class="fa-solid fa-plus text-[10px]"></i> Add crop';
      add.addEventListener('click', openAdd);
      chipsEl.appendChild(add);
      chipsEl.style.display = userCrops.length ? 'flex' : 'none';
    }

    function prodRow(pk){ const p = P[pk]; return '<a href="pdp.html" class="prod-row"><div class="prod-thumb"><img src="' + p.img + '"/></div>'
      + '<div class="prod-meta"><div class="pn">' + p.n + '</div><div class="pc">' + p.c + '</div><span class="ptype ' + p.t + '">' + (p.t === 'chem' ? 'Chemical' : 'Biological') + '</span></div>'
      + '<div class="prod-price"><div class="amt tnum">' + p.p + '</div><span class="add">Add</span></div></a>'; }
    function probBlock(k){ const pr = PROB[k]; return '<div class="prob-block"><div class="prob-h"><span class="pic"><i class="fa-solid fa-shield-virus"></i></span>'
      + '<div><div class="pn">' + pr.nm + '</div><span class="sev ' + pr.sev + '">' + (pr.sev === 'high' ? 'High' : 'Medium') + ' · Disease</span></div></div>'
      + '<div class="prob-desc">' + pr.desc + '</div><div class="rp-title">Recommended products</div>' + pr.prods.map(prodRow).join('') + '</div>'; }

    function renderCrop(){
      if (!active) { content.style.display = 'none'; emptyEl.style.display = 'block'; return; }
      content.style.display = ''; emptyEl.style.display = 'none';
      const c = getCrop(active);
      document.getElementById('cIdImg').innerHTML = cropImg(active);
      document.getElementById('cIdName').textContent = c.name;
      document.getElementById('cIdSci').textContent = c.sci;
      const icons = ['fa-tag','fa-cloud-sun-rain','fa-barcode','fa-clock'];
      document.getElementById('cIdChips').innerHTML = c.chips.map((x,i) => '<span class="ident-chip"><i class="fa-solid ' + icons[i % icons.length] + '"></i> ' + x + '</span>').join('');
      const s = c.stats;
      document.getElementById('cStats').innerHTML =
        '<div class="stat"><div class="v tnum">' + s.stages + '</div><div class="k">Growth stages</div></div>'
        + '<div class="stat"><div class="v tnum">' + s.issues + '</div><div class="k">Known issues</div></div>'
        + '<div class="stat"><div class="v tnum">' + s.products + '</div><div class="k">Products</div></div>'
        + '<div class="stat"><div class="v tnum">' + s.dur + '</div><div class="k">Duration</div></div>';
      const onIdx = (c.on || 1) - 1;
      const stEl = document.getElementById('cStages');
      if (!c.stages || !c.stages.length) {
        stEl.innerHTML = '<div class="vstg-empty" style="margin:4px 0"><i class="fa-solid fa-seedling"></i> Detailed crop guide for ' + c.name + ' is coming soon. We\'re adding its growth stages, common problems and recommended products.</div>';
        return;
      }
      stEl.innerHTML = c.stages.map((g, i) => {
        const cls = i < onIdx ? 'done' : (i === onIdx ? 'on' : '');
        const probs = g.problems || [];
        const iss = probs.length
          ? '<span class="vstg-iss"><i class="fa-solid fa-triangle-exclamation"></i> ' + probs.length + ' issue' + (probs.length > 1 ? 's' : '') + '</span>'
          : '<span class="vstg-iss none"><i class="fa-solid fa-circle-check"></i> Healthy</span>';
        const body = probs.length ? probs.map(probBlock).join('')
          : '<div class="vstg-empty"><i class="fa-solid fa-circle-check"></i> No common problems reported at this stage</div>';
        return '<div class="vstg ' + cls + (i === onIdx ? ' open' : '') + '">'
          + '<button class="vstg-head"><span class="vstg-dot">' + (i < onIdx ? '<i class="fa-solid fa-check"></i>' : (i + 1)) + '</span>'
          + '<div class="vstg-info"><div class="nm">' + g.nm + '</div><div class="meta">' + g.day + ' · ' + g.dur + ' · ' + g.pct + ' of lifecycle</div></div>'
          + iss + '<i class="fa-solid fa-chevron-down vstg-chev"></i></button>'
          + '<div class="vstg-body">' + body + '</div></div>';
      }).join('');
      stEl.querySelectorAll('.vstg-head').forEach(h => h.addEventListener('click', () => h.closest('.vstg').classList.toggle('open')));
      stEl.querySelectorAll('.prod-price .add').forEach(b => b.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); b.textContent = 'Added ✓'; b.style.background = '#047857'; setTimeout(() => { b.textContent = 'Add'; b.style.background = '#059669'; }, 900); }));
    }

    // Add-crop sheet · identical layout + behaviour to the homepage "All Crops" bottom-sheet (photo tile + white check-circle, multi-select, Done)
    const addBd = document.getElementById('addBd'), addSheet = document.getElementById('addSheet');
    const applyBtn = document.getElementById('addApply');
    let picked = new Set();
    function renderPickGrid(){
      const grid = document.getElementById('pickGrid');
      grid.innerHTML = Object.keys(CROP_META).map(k => {
        const m = CROP_META[k];
        const sel = picked.has(k);
        const borderColor = sel ? '#059669' : '#E5E7EB';
        const shadow = sel ? '0 6px 14px -4px rgba(5,150,105,0.32)' : '0 1px 3px rgba(0,0,0,0.05)';
        const labelColor = sel ? '#047857' : '#0F172A';
        const tick = sel
          ? '<span class="absolute top-1.5 right-1.5 w-5 h-5 rounded-full flex items-center justify-center" style="background:#059669;box-shadow:0 2px 6px rgba(5,150,105,0.5);border:1.5px solid #fff;z-index:2"><i class="fa-solid fa-check text-white text-[9px]"></i></span>'
          : '<span class="absolute top-1.5 right-1.5 w-5 h-5 rounded-full" style="background:rgba(255,255,255,0.95);border:1.5px solid #CBD5E1;box-shadow:0 1px 3px rgba(15,23,42,0.18);z-index:2"></span>';
        return '<button type="button" data-k="' + k + '" class="rounded-xl overflow-hidden"'
          + ' style="background:#FFFFFF;border:1.5px solid ' + borderColor + ';box-shadow:' + shadow + ';height:120px;display:flex;flex-direction:column">'
          + '<div class="relative w-full" style="height:90px;background:' + m.bg + ';overflow:hidden;flex-shrink:0">'
          + '<img src="' + m.img + '" class="w-full h-full object-cover" style="display:block" onerror="cropFallback(this,\'' + m.emoji + '\',38)"/>'
          + tick + '</div>'
          + '<div class="flex-1 flex items-center justify-center px-1">'
          + '<span class="text-[12.5px] font-bold leading-none" style="color:' + labelColor + '">' + m.label + '</span>'
          + '</div></button>';
      }).join('');
      grid.querySelectorAll('[data-k]').forEach(b => b.addEventListener('click', () => {
        const k = b.dataset.k;
        if (picked.has(k)) picked.delete(k); else picked.add(k);
        renderPickGrid();
      }));
    }
    function openAdd(){
      picked = new Set(userCrops.filter(k => CROP_META[k]));   // pre-select crops already added (that exist in the catalog)
      renderPickGrid();
      addBd.classList.add('open'); addSheet.classList.add('open');
    }
    function closeAdd(){ addBd.classList.remove('open'); addSheet.classList.remove('open'); }
    applyBtn.addEventListener('click', () => {
      // Keep any non-catalog crops already present (e.g. cotton), then apply the catalog selection
      const keep = userCrops.filter(k => !CROP_META[k]);
      const arr = keep.concat(Array.from(picked));
      userCrops = arr;
      if (userCrops.indexOf(active) < 0) active = userCrops[0] || null;
      closeAdd(); renderChips(); renderCrop();
    });
    document.getElementById('addClose').addEventListener('click', closeAdd);
    addBd.addEventListener('click', closeAdd);
    document.getElementById('emptyAdd').addEventListener('click', openAdd);

    renderChips(); renderCrop();
  </script>
