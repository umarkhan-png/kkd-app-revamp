<!DOCTYPE html>

<script src="https://cdn.tailwindcss.com"></script>
<style>*{font-family:'Poppins',system-ui,sans-serif;-webkit-font-smoothing:antialiased}.hi{font-family:'Noto Sans Devanagari',sans-serif}html,body{margin:0;padding:0}body{min-height:100vh;background:linear-gradient(180deg,#021710,#062A1B 40%,#083D28 80%,#0A4A30);color:#fff;overflow:hidden}.tnum{font-variant-numeric:tabular-nums}@keyframes ringPulse{0%{transform:scale(1);opacity:0.5}100%{transform:scale(1.5);opacity:0}}.ring{position:absolute;inset:-12px;border-radius:999px;border:2px solid #D4A537;animation:ringPulse 1.6s linear infinite}.ring:nth-child(2){animation-delay:.5s}.ring:nth-child(3){animation-delay:1s}</style></head>

    <img src="https://images.unsplash.com/photo-1622253692010-333f2da6031d?w=400&q=80" class="w-[140px] h-[140px] rounded-full object-cover border-4 border-[#D4A537]"/>
  </div>

  <div class="hi text-[24px] font-extrabold mt-7 leading-tight">डॉ. प्रिया शर्मा</div>
