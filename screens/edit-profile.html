<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/><title>KKD · Edit Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  *{font-family:'Poppins',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  html,body{margin:0;padding:0}
  body{min-height:100vh;background:#F8F8F8;color:#0F172A;padding-bottom:96px}
  .sec-title{margin:18px 16px 8px;font-size:11.5px;font-weight:800;color:#64748B;text-transform:uppercase;letter-spacing:0.06em}
  .card{margin:0 16px;background:#FFFFFF;border:1px solid #E5E7EB;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(15,23,42,0.04)}
  .field{padding:14px;border-bottom:1px solid #F1F5F9}
  .field:last-child{border-bottom:0}
  .field .lbl{font-size:11.5px;font-weight:800;color:#94A3B8;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
  .field input{width:100%;border:0;outline:none;background:transparent;font-size:15px;font-weight:600;color:#0F172A}
  .field input::placeholder{color:#CBD5E1;font-weight:500}
</style></head>
<body>

  <div class="flex items-center justify-between px-4 pt-3 text-[11px] font-medium">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#0F172A" stroke-width="2.5"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#0F172A" stroke-width="2"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#0F172A" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#0F172A"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#0F172A"/></svg>
    </div>
  </div>

  <div class="px-4 pt-4 pb-3 flex items-center gap-3 bg-white">
    <button onclick="history.back()" class="w-10 h-10 rounded-full flex items-center justify-center" style="background:#FFFFFF;border:1px solid #E5E7EB">
      <i class="fa-solid fa-arrow-left text-[14px]" style="color:#0F172A"></i>
    </button>
    <h1 class="flex-1 text-[22px] font-extrabold leading-tight">Edit profile</h1>
  </div>

  <!-- Avatar · tap to change -->
  <div class="flex flex-col items-center mt-3">
    <div style="position:relative;width:96px;height:96px;border-radius:50%;overflow:hidden;border:3px solid #BBF7D0;background:linear-gradient(135deg,#ECFDF5,#D1FAE5);display:flex;align-items:center;justify-content:center">
      <span style="font-size:30px;font-weight:800;color:#258046">RP</span>
      <img src="https://images.unsplash.com/photo-1627638458498-71e9fdf12a05?w=200&q=80" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'"/>
    </div>
    <button class="mt-3 px-3 py-1.5 rounded-full text-[11.5px] font-medium" style="background:#ECFDF5;color:#258046;border:1px solid #BBF7D0"><i class="fa-solid fa-camera text-[10px]"></i> Change photo</button>
  </div>

  <div class="sec-title">Personal details</div>
  <div class="card">
    <div class="field">
      <div class="lbl">First name</div>
      <input id="firstName" type="text" value="Ramesh" autocomplete="given-name"/>
    </div>
    <div class="field">
      <div class="lbl">Last name</div>
      <input id="lastName" type="text" value="Patel" autocomplete="family-name"/>
    </div>
    <div class="field">
      <div class="lbl">Mobile</div>
      <input type="tel" value="+91 98765 43210" autocomplete="tel"/>
    </div>
    <div class="field">
      <div class="lbl">Alternate number <span style="color:#94A3B8;text-transform:none;letter-spacing:0;font-weight:600">(optional)</span></div>
      <div style="display:flex;align-items:center;gap:8px"><span style="font-size:15px;font-weight:600;color:#0F172A">+91</span><input id="altNumber" type="tel" maxlength="10" inputmode="numeric" placeholder="Add an alternate mobile number"/></div>
    </div>
    <div class="field">
      <div class="lbl">Email <span style="color:#94A3B8;text-transform:none;letter-spacing:0;font-weight:600">(optional)</span></div>
      <input type="email" placeholder="ramesh@example.com" autocomplete="email"/>
    </div>
  </div>

  <div class="sec-title">Location</div>
  <div class="card">
    <div class="field">
      <div class="lbl">Village / city</div>
      <input type="text" value="Indore, Madhya Pradesh"/>
    </div>
  </div>

  <!-- Sticky Save -->
  <div class="fixed bottom-0 left-0 right-0 bg-white px-4 py-4" style="border-top:1px solid #F1F5F9">
    <button id="saveBtn" class="w-full h-[52px] rounded-[12px] text-white text-[15px] font-semibold" style="background:#258046;border:0;box-shadow:0 8px 20px -6px rgba(5,150,105,0.45)">Save changes</button>
  </div>

  <script>
    (function(){
      var inp = document.getElementById('altNumber');
      try { var v = localStorage.getItem('kkd.altNumber'); if (v && inp) inp.value = v; } catch (e) {}
      if (inp) inp.addEventListener('input', function(){ inp.value = inp.value.replace(/[^0-9]/g, ''); });
      var save = document.getElementById('saveBtn');
      if (save) save.addEventListener('click', function(){ try { if (inp) localStorage.setItem('kkd.altNumber', inp.value.trim()); } catch (e) {} history.back(); });
    })();
  </script>

</body></html>
