<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/><title>KKD · No Internet</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  *{font-family:'Poppins',system-ui,sans-serif;-webkit-font-smoothing:antialiased;box-sizing:border-box}
  html,body{margin:0;padding:0;overflow-x:hidden;max-width:100%}
  body{min-height:100vh;background:#FFFFFF;color:#0F172A;position:relative}

  /* Watercolour green disc holding a broadcast-tower silhouette · soft layered radial blobs mimic the painted reference */
  .tower-disc{position:relative;width:208px;height:208px;border-radius:50%;
    background:
      radial-gradient(circle at 32% 30%, rgba(255,255,255,0.55) 0%, transparent 34%),
      radial-gradient(circle at 70% 64%, rgba(5,120,80,0.22) 0%, transparent 46%),
      radial-gradient(circle at 24% 74%, rgba(16,185,129,0.28) 0%, transparent 44%),
      radial-gradient(circle at 50% 50%, #C5EAD1 0%, #A7DCB6 55%, #93D1A6 100%);
    display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:inset 0 -10px 30px rgba(4,90,60,0.12)}
  /* soft hill shading at the base, like the reference */
  .tower-disc::after{content:"";position:absolute;left:0;right:0;bottom:0;height:46%;background:radial-gradient(120% 100% at 50% 120%, rgba(4,120,87,0.20) 0%, transparent 70%);pointer-events:none}
  .tower-disc svg{position:relative;z-index:1;width:150px;height:150px;filter:drop-shadow(0 3px 5px rgba(0,0,0,0.15))}

  /* Orange alert badge clipped to the top-right of the disc */
  .alert-badge{position:absolute;top:6px;right:2px;width:62px;height:62px;border-radius:50%;
    background:radial-gradient(circle at 36% 32%, #FDBA74 0%, #FB923C 45%, #F97316 100%);
    display:flex;align-items:center;justify-content:center;color:#FFFFFF;font-size:30px;font-weight:900;
    box-shadow:0 8px 18px -4px rgba(249,115,22,0.55), 0 0 0 5px #FFFFFF}

  .retry-btn{height:54px;padding:0 56px;border-radius:12px;background:#1A9E54;color:#FFFFFF;border:0;font-size:17px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;gap:9px;cursor:pointer;box-shadow:0 10px 24px -8px rgba(26,158,84,0.5)}
  .retry-btn:active{transform:scale(.98)}

  /* In-app bottom nav */
  .nav{position:fixed;bottom:0;left:0;right:0;height:68px;background:#FFFFFF;border-top:1px solid #F1F5F9;box-shadow:0 -4px 16px rgba(0,0,0,0.04);display:flex;justify-content:space-around;align-items:center;padding:0 8px}
  .nav a{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;color:#94A3B8;font-size:12px;font-weight:600}
  .nav a.on{color:#0F172A;font-weight:700}
  .nav a.on i{color:#258046}
  .nav i{font-size:19px}
</style></head>
<body>

  <!-- System status bar -->
  <div class="flex items-center justify-between px-4 pt-3 text-[11px] font-semibold">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2" stroke="#DC2626" stroke-width="2.5"/><path d="M14 7h2M18 4h2" stroke="#CBD5E1" stroke-width="2.5"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0" stroke="#CBD5E1" stroke-width="2"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#0F172A" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#0F172A"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#0F172A"/></svg>
    </div>
  </div>

  <!-- Centred No-Internet content -->
  <div class="flex flex-col items-center text-center px-8" style="margin-top:18vh">
    <div style="position:relative;display:inline-block">
    <div class="tower-disc">
      <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- signal arcs -->
        <g stroke="#3B3A36" stroke-width="3.4" stroke-linecap="round">
          <path d="M120 60 a15 15 0 0 1 0 22"/>
          <path d="M129 52 a27 27 0 0 1 0 38"/>
          <path d="M80 60 a15 15 0 0 0 0 22"/>
          <path d="M71 52 a27 27 0 0 0 0 38"/>
        </g>
        <!-- mast tip -->
        <line x1="100" y1="58" x2="100" y2="76" stroke="#3B3A36" stroke-width="4.2" stroke-linecap="round"/>
        <circle cx="100" cy="55" r="4.4" fill="#3B3A36"/>
        <!-- lattice X-braces -->
        <g stroke="#3B3A36" stroke-width="2.6" stroke-linecap="round">
          <path d="M88 76 L116 94 M112 76 L84 94"/>
          <path d="M84 94 L121 116 M116 94 L79 116"/>
          <path d="M79 116 L127 141 M121 116 L73 141"/>
          <path d="M73 141 L134 172 M127 141 L66 172"/>
        </g>
        <!-- legs + horizontal struts -->
        <g stroke="#3B3A36" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M88 76 L66 172"/>
          <path d="M112 76 L134 172"/>
          <path d="M84 94 H116"/>
          <path d="M79 116 H121"/>
          <path d="M73 141 H127"/>
          <path d="M66 172 H134"/>
          <path d="M66 172 L60 181"/>
          <path d="M134 172 L140 181"/>
        </g>
      </svg>
    </div>
      <span class="alert-badge"><i class="fa-solid fa-exclamation"></i></span>
    </div>

    <div class="text-[26px] font-extrabold mt-9 leading-tight text-[#0F172A]">No Internet</div>
    <p class="text-[16px] mt-3 max-w-[300px] leading-relaxed" style="color:#94A3B8">Please check your internet connection and try again</p>

    <button onclick="location.reload()" class="retry-btn mt-9">Try Again</button>
  </div>

  <!-- In-app bottom nav -->
  <nav class="nav">
    <a href="home.html" class="on"><i class="fa-solid fa-house"></i>Home</a>
    <a href="crop-detail.html"><i class="fa-solid fa-seedling"></i>Crop</a>
    <a href="orders.html"><i class="fa-solid fa-box"></i>Orders</a>
    <a href="account.html"><i class="fa-solid fa-user"></i>Profile</a>
  </nav>

  <script src="../assets/weight-ladder.js"></script>
</body></html>
