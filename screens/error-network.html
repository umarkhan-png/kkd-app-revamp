<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/><title>KKD · No Internet</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  *{font-family:'Poppins',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .hi{font-family:'Noto Sans Devanagari','Poppins',sans-serif}
  html,body{margin:0;padding:0;overflow-x:hidden}
  body{min-height:100vh;background:#F8F8F8;color:#0F172A;position:relative}
  /* Network-error illustration · emerald disc with a wifi-slash + ping rings */
  .neterr-ic{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,#ECFDF5 0%,#D1FAE5 100%);display:flex;align-items:center;justify-content:center;color:#047857;font-size:48px;position:relative;box-shadow:0 14px 30px -10px rgba(5,150,105,0.25)}
  .neterr-ic::before{content:"";position:absolute;inset:0;border-radius:50%;border:2px solid rgba(5,150,105,0.25);animation:nePing 1.8s ease-out infinite}
  @keyframes nePing{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.35);opacity:0}}
  .neterr-ic .slash{position:absolute;width:96px;height:3px;background:#DC2626;border-radius:9999px;transform:rotate(45deg);box-shadow:0 0 0 3px #ECFDF5}
  .retry-btn{height:54px;border-radius:14px;background:#059669;color:#FFFFFF;border:0;font-size:15px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;gap:9px;cursor:pointer;box-shadow:0 10px 24px -8px rgba(5,150,105,0.5);width:100%}
  .tip{display:flex;align-items:center;gap:10px;background:#FFFFFF;border:1px solid #E5E7EB;border-radius:14px;padding:12px 14px;box-shadow:0 1px 3px rgba(15,23,42,0.04)}
  .tip .ic{width:34px;height:34px;border-radius:10px;background:#FEF3C7;color:#B45309;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
</style></head>
<body>

  <div class="flex items-center justify-between px-4 pt-3 text-[11px] font-bold">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2" stroke="#DC2626" stroke-width="2.5"/><path d="M14 7h2M18 4h2" stroke="#CBD5E1" stroke-width="2.5"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0" stroke="#CBD5E1" stroke-width="2"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#0F172A" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#0F172A"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#0F172A"/></svg>
    </div>
  </div>

  <!-- Back bar -->
  <div class="px-4 pt-4 flex items-center gap-3">
    <button onclick="if(history.length>1){history.back()}else{location.href='home.html'}" class="w-10 h-10 rounded-full flex items-center justify-center" style="background:#FFFFFF;border:1px solid #E5E7EB"><i class="fa-solid fa-arrow-left text-[14px]" style="color:#0F172A"></i></button>
  </div>

  <!-- Centred error content -->
  <div class="flex flex-col items-center text-center px-8" style="margin-top:14vh">
    <div class="neterr-ic">
      <i class="fa-solid fa-wifi"></i>
      <span class="slash"></span>
    </div>

    <div class="hi text-[24px] font-black mt-7 leading-tight text-[#0F172A]">Internet नहीं चल रहा</div>
    <p class="text-[13.5px] mt-2 max-w-[290px] leading-relaxed" style="color:#64748B">We couldn't load this page. Check your Wi-Fi or mobile data and try again.</p>

    <div class="mt-4 inline-flex items-center gap-2 px-3 py-1.5 rounded-full" style="background:#FEF2F2;border:1px solid #FECACA">
      <span class="w-2 h-2 rounded-full" style="background:#DC2626"></span>
      <span class="text-[11px] font-extrabold uppercase tracking-wider" style="color:#DC2626">No connection</span>
    </div>

    <div class="w-full mt-8" style="max-width:300px">
      <button onclick="location.reload()" class="retry-btn">
        <i class="fa-solid fa-rotate-right text-[14px]"></i> <span class="hi">फिर से कोशिश करें</span>
      </button>
      <a href="home.html" class="block text-center mt-3 text-[13px] font-bold" style="color:#64748B;text-decoration:none">Go to home</a>
    </div>
  </div>

  <!-- Offline tip -->
  <div class="px-6" style="position:fixed;left:0;right:0;bottom:24px">
    <div class="tip" style="max-width:340px;margin:0 auto">
      <span class="ic"><i class="fa-solid fa-lightbulb"></i></span>
      <div class="text-[11.5px] leading-snug" style="color:#475569">Some things work offline too — <span class="font-bold text-[#0F172A]">saved orders, addresses &amp; crop calendar</span>.</div>
    </div>
  </div>

</body></html>
