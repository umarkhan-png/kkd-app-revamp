<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/><title>KKD · Payment Failed</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  *{font-family:'Poppins',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  html,body{margin:0;padding:0;font-family:'Poppins',system-ui,sans-serif}
  body{min-height:100vh;background:#F8F8F8;color:#0F172A}
  .tnum{font-variant-numeric:tabular-nums}
  a{text-decoration:none}
  .btn{width:100%;max-width:320px;height:52px;border-radius:12px;font-size:15px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;gap:9px;border:0;cursor:pointer;font-family:inherit}
  .btn.primary{background:#258046;color:#fff;box-shadow:0 8px 20px -6px rgba(5,150,105,0.45)}
  .btn.ghost{height:48px;background:#fff;color:#0F172A;border:1px solid #E2E8F0;font-weight:700;font-size:14px}
</style></head>
<body class="flex flex-col min-h-screen pb-8">

  <div class="flex items-center justify-between px-4 pt-3 text-[11px] font-semibold">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#0F172A" stroke-width="2.5"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#0F172A" stroke-width="2"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#0F172A" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#0F172A"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#0F172A"/></svg>
    </div>
  </div>

  <div class="flex-1 flex flex-col items-center justify-center px-7 text-center">
    <div class="w-24 h-24 rounded-full flex items-center justify-center" style="background:#FEE2E2;border:1px solid #FECACA">
      <i class="fa-solid fa-circle-xmark" style="font-size:46px;color:#DC2626"></i>
    </div>
    <div class="text-[24px] font-extrabold mt-6 leading-tight">Payment failed</div>
    <p class="text-[13px] mt-2 max-w-[290px] leading-relaxed" style="color:#64748B">Your bank didn't process the payment. <b class="text-[#0F172A] font-bold">No money was deducted.</b> Please try again or choose another method.</p>

    <div class="mt-6 bg-white rounded-[14px] p-4 w-full max-w-[320px] text-left" style="border:1px solid #E5E7EB;box-shadow:0 1px 3px rgba(15,23,42,0.04)">
      <div class="flex items-center justify-between text-[12.5px] py-1"><span style="color:#64748B">Order amount</span><span class="font-extrabold tnum text-[#0F172A]">₹1,900</span></div>
      <div class="flex items-center justify-between text-[12.5px] py-1"><span style="color:#64748B">Method</span><span class="font-bold text-[#0F172A]">UPI · oksbi</span></div>
      <div class="flex items-center justify-between text-[12.5px] py-1"><span style="color:#64748B">Reason</span><span class="font-bold" style="color:#DC2626">Insufficient balance</span></div>
    </div>

    <button onclick="location.href='checkout.html'" class="btn primary mt-7"><i class="fa-solid fa-rotate-right text-[14px]"></i> Retry payment</button>
    <button onclick="location.href='checkout.html'" class="btn ghost mt-3">Use Cash on Delivery instead</button>
    <a href="help.html" class="mt-5 text-[12px] font-bold uppercase tracking-wide" style="color:#64748B">Need help? Contact support <i class="fa-solid fa-arrow-right text-[10px]"></i></a>
  </div>

  <script src="../assets/weight-ladder.js"></script>
</body></html>
