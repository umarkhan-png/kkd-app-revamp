<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>KKD · Language</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@500;600;700;800&family=Noto+Sans+Bengali:wght@500;700;800&family=Noto+Sans+Telugu:wght@500;700;800&family=Noto+Sans+Tamil:wght@500;700;800&family=Noto+Sans+Kannada:wght@500;700;800&family=Noto+Sans+Gujarati:wght@500;700;800&family=Noto+Sans+Gurmukhi:wght@500;700;800&family=Noto+Sans+Malayalam:wght@500;700;800&family=Noto+Sans+Oriya:wght@500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .hi { font-family: 'Noto Sans Devanagari', sans-serif; }
  .bn { font-family: 'Noto Sans Bengali', sans-serif; }
  .te { font-family: 'Noto Sans Telugu', sans-serif; }
  .ta { font-family: 'Noto Sans Tamil', sans-serif; }
  .kn { font-family: 'Noto Sans Kannada', sans-serif; }
  .gu { font-family: 'Noto Sans Gujarati', sans-serif; }
  .pa { font-family: 'Noto Sans Gurmukhi', sans-serif; }
  .ml { font-family: 'Noto Sans Malayalam', sans-serif; }
  .od { font-family: 'Noto Sans Oriya', sans-serif; }
  html, body { margin: 0; padding: 0; }
  /* Page · off-white background like orders/category so the tiles stand off as clear cards · matches app design system, no warm-cream tint */
  body { background:#F8F8F8; color:#0F172A; min-height:100vh; }
  /* Tile · white card on the slate page · neutral border + soft shadow that mirrors home product-card aesthetic · NO cream/yellow borders */
  .lang-tile { background:#FFFFFF; border:1px solid #E5E7EB; border-radius:14px; padding:16px; text-align:left; box-shadow:0 1px 3px rgba(15,23,42,0.04); transition: transform .12s ease, border-color .15s ease, box-shadow .15s ease; cursor:pointer; }
  .lang-tile:active { transform: scale(.97); border-color:#258046; box-shadow:0 4px 14px -4px rgba(4,120,87,0.18); }
</style>
</head>
<body class="min-h-screen pb-6 relative">

  <!-- Status bar -->
  <div class="flex items-center justify-between px-6 pt-3 text-[11px] font-semibold text-[#0F172A]">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#0F172A" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#0F172A"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#0F172A"/></svg>
    </div>
  </div>

  <!-- Back -->
  <div class="px-6 pt-4">
    <a href="splash.html" class="w-10 h-10 rounded-full border border-[#E5E7EB] flex items-center justify-center bg-white">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </a>
  </div>

  <!-- Title -->
  <div class="px-6 pt-3 pb-5">
    <h1 class="text-[26px] font-extrabold leading-tight text-[#0F172A]">Choose your language</h1>
  </div>

  <!-- 12-language grid · 2 columns · tap → persist + jump to phone.html -->
  <div class="px-5">
    <div class="grid grid-cols-2 gap-3">

      <button data-code="hi" class="lang-tile">
        <div class="hi text-[20px] font-extrabold">हिंदी</div>
        <div class="text-[12.5px] text-[#64748B] mt-0.5">Hindi</div>
      </button>

      <button data-code="en" class="lang-tile">
        <div class="text-[20px] font-extrabold">English</div>
        <div class="text-[12.5px] text-[#64748B] mt-0.5">English</div>
      </button>

      <button data-code="hien" class="lang-tile">
        <div class="text-[20px] font-extrabold">Hinglish</div>
        <div class="text-[12.5px] text-[#64748B] mt-0.5">English + Hindi</div>
      </button>

      <button data-code="mr" class="lang-tile">
        <div class="hi text-[20px] font-extrabold">मराठी</div>
        <div class="text-[12.5px] text-[#64748B] mt-0.5">Marathi</div>
      </button>

      <button data-code="gu" class="lang-tile">
        <div class="gu text-[20px] font-extrabold">ગુજરાતી</div>
        <div class="text-[12.5px] text-[#64748B] mt-0.5">Gujarati</div>
      </button>

      <button data-code="pa" class="lang-tile">
        <div class="pa text-[20px] font-extrabold">ਪੰਜਾਬੀ</div>
        <div class="text-[12.5px] text-[#64748B] mt-0.5">Punjabi</div>
      </button>

      <button data-code="te" class="lang-tile">
        <div class="te text-[20px] font-extrabold">తెలుగు</div>
        <div class="text-[12.5px] text-[#64748B] mt-0.5">Telugu</div>
      </button>

      <button data-code="ta" class="lang-tile">
        <div class="ta text-[20px] font-extrabold">தமிழ்</div>
        <div class="text-[12.5px] text-[#64748B] mt-0.5">Tamil</div>
      </button>

      <button data-code="kn" class="lang-tile">
        <div class="kn text-[20px] font-extrabold">ಕನ್ನಡ</div>
        <div class="text-[12.5px] text-[#64748B] mt-0.5">Kannada</div>
      </button>

      <button data-code="ml" class="lang-tile">
        <div class="ml text-[20px] font-extrabold">മലയാളം</div>
        <div class="text-[12.5px] text-[#64748B] mt-0.5">Malayalam</div>
      </button>

      <button data-code="od" class="lang-tile">
        <div class="od text-[20px] font-extrabold">ଓଡ଼ିଆ</div>
        <div class="text-[12.5px] text-[#64748B] mt-0.5">Odia</div>
      </button>

      <button data-code="bn" class="lang-tile">
        <div class="bn text-[20px] font-extrabold">বাংলা</div>
        <div class="text-[12.5px] text-[#64748B] mt-0.5">Bengali</div>
      </button>

    </div>
  </div>

  <script>
    // Tap a tile · persist + jump straight to phone (no modal)
    document.querySelectorAll('.lang-tile').forEach(t => {
      t.addEventListener('click', () => {
        try { localStorage.setItem('kkd.lang', t.dataset.code); } catch(e) {}
        window.location.href = 'phone.html';
      });
    });
  </script>

</body>
</html>
