<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>KKD · Language</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@500;600;700;800&family=Noto+Sans+Bengali:wght@500;700&family=Noto+Sans+Telugu:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .hi { font-family: 'Noto Sans Devanagari', sans-serif; }
  .bn { font-family: 'Noto Sans Bengali', sans-serif; }
  .te { font-family: 'Noto Sans Telugu', sans-serif; }
  html, body { margin: 0; padding: 0; }
  body { min-height: 100vh; background: #fff; color: #1C1C1C; }
  .lang-tile { transition: all 0.18s ease; }
  .lang-tile:hover { transform: translateY(-2px); }
  .lang-tile.active { background: #F0FDF5; border-color: #0E7A4E; box-shadow: 0 0 0 4px rgba(14,122,78,0.1); }
  .lang-tile.active .check { opacity: 1; transform: scale(1); }
  .check { opacity: 0; transform: scale(0.6); transition: all .2s ease; }
</style>
</head>
<body class="min-h-screen pb-32 relative">

  <!-- Status bar -->
  <div class="flex items-center justify-between px-6 pt-3 text-[11px] font-bold text-[#1C1C1C]">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#1C1C1C" stroke-width="2.5" stroke-linecap="round"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#1C1C1C" stroke-width="2" stroke-linecap="round"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#1C1C1C" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#1C1C1C"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#1C1C1C"/></svg>
    </div>
  </div>

  <!-- Header -->
  <div class="px-6 pt-6">
    <div class="hi text-[26px] font-extrabold leading-tight">अपनी भाषा चुनें</div>
    <div class="text-[14px] font-medium text-[#606060] mt-1">Choose your language</div>
  </div>

  <!-- Language tiles -->
  <div class="px-6 mt-7 space-y-3">

    <button onclick="select(this)" class="lang-tile active w-full flex items-center gap-4 p-4 rounded-[10px] border-2 border-[#EDEDED] bg-white text-left" data-code="hi">
      <div class="w-12 h-12 rounded-[10px] bg-[#FFF8E6] text-[#8B6914] flex items-center justify-center font-extrabold text-[20px]">अ</div>
      <div class="flex-1">
        <div class="hi text-[19px] font-extrabold">हिंदी</div>
        <div class="hi text-[12px] text-[#606060] mt-0.5">नमस्ते, स्वागत है</div>
      </div>
      <svg class="check w-6 h-6" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" fill="#0C831F"/><path d="M8 12l3 3 5-5" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <button onclick="select(this)" class="lang-tile w-full flex items-center gap-4 p-4 rounded-[10px] border-2 border-[#EDEDED] bg-white text-left" data-code="en">
      <div class="w-12 h-12 rounded-[10px] bg-[#FFF8E6] text-[#8B6914] flex items-center justify-center font-extrabold text-[20px]">A</div>
      <div class="flex-1">
        <div class="text-[19px] font-extrabold">English</div>
        <div class="text-[12px] text-[#606060] mt-0.5">Hello, welcome</div>
      </div>
      <svg class="check w-6 h-6" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" fill="#0C831F"/><path d="M8 12l3 3 5-5" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <button onclick="select(this)" class="lang-tile w-full flex items-center gap-4 p-4 rounded-[10px] border-2 border-[#EDEDED] bg-white text-left" data-code="bn">
      <div class="w-12 h-12 rounded-[10px] bg-[#FFF8E6] text-[#8B6914] flex items-center justify-center font-extrabold text-[20px] bn">অ</div>
      <div class="flex-1">
        <div class="bn text-[19px] font-extrabold">বাংলা</div>
        <div class="bn text-[12px] text-[#606060] mt-0.5">নমস্কার, স্বাগতম</div>
      </div>
      <svg class="check w-6 h-6" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" fill="#0C831F"/><path d="M8 12l3 3 5-5" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <button onclick="select(this)" class="lang-tile w-full flex items-center gap-4 p-4 rounded-[10px] border-2 border-[#EDEDED] bg-white text-left" data-code="mr">
      <div class="w-12 h-12 rounded-[10px] bg-[#FFF8E6] text-[#8B6914] flex items-center justify-center font-extrabold text-[20px]">अ</div>
      <div class="flex-1">
        <div class="hi text-[19px] font-extrabold">मराठी</div>
        <div class="hi text-[12px] text-[#606060] mt-0.5">नमस्कार, स्वागत आहे</div>
      </div>
      <svg class="check w-6 h-6" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" fill="#0C831F"/><path d="M8 12l3 3 5-5" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <button onclick="select(this)" class="lang-tile w-full flex items-center gap-4 p-4 rounded-[10px] border-2 border-[#EDEDED] bg-white text-left" data-code="te">
      <div class="w-12 h-12 rounded-[10px] bg-[#FFF8E6] text-[#8B6914] flex items-center justify-center font-extrabold text-[20px] te">అ</div>
      <div class="flex-1">
        <div class="te text-[19px] font-extrabold">తెలుగు</div>
        <div class="te text-[12px] text-[#606060] mt-0.5">నమస్తే, స్వాగతం</div>
      </div>
      <svg class="check w-6 h-6" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" fill="#0C831F"/><path d="M8 12l3 3 5-5" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

  </div>

  <!-- Hint -->
  <div class="px-6 mt-6 flex items-start gap-2">
    <svg class="flex-shrink-0 mt-0.5" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9E9E9E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
    <p class="hi text-[12px] text-[#606060] leading-relaxed">बाद में सेटिंग्स से बदल सकते हैं · <span lang="en">You can change this later in settings</span></p>
  </div>

  <!-- Sticky CTA -->
  <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-[#EDEDED] px-6 py-4">
    <button onclick="location.href='welcome.html'" class="w-full h-[54px] rounded-[10px] bg-[#0C831F] text-white text-[16px] font-extrabold flex items-center justify-center gap-2">
      <span class="hi">आगे बढ़ें</span>
      <span class="opacity-70">·</span>
      <span>Continue</span>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    </button>
  </div>

  <script>
    function select(btn){
      document.querySelectorAll('.lang-tile').forEach(t=>t.classList.remove('active'));
      btn.classList.add('active');
    }
  </script>
</body>
</html>
