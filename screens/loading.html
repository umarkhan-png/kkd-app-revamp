<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/><title>KKD · Loading</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  *{font-family:'Poppins',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  html,body{margin:0;padding:0;height:100%}
  body{min-height:100vh;background:#FFFFFF;color:#0F172A;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;position:relative;overflow:hidden}
  body::before{content:"";position:absolute;top:-60px;right:-50px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(16,185,129,0.12) 0%,transparent 70%)}
  body::after{content:"";position:absolute;bottom:-60px;left:-50px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(251,191,36,0.12) 0%,transparent 70%)}
  .logo{width:74px;height:74px;border-radius:20px;background:linear-gradient(135deg,#047857,#10B981);display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 14px 30px -8px rgba(5,150,105,0.5);animation:pulse 1.4s ease-in-out infinite;position:relative;z-index:1}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  .spin{width:30px;height:30px;border-radius:50%;border:3px solid #D1FAE5;border-top-color:#059669;animation:spin .8s linear infinite;position:relative;z-index:1}
  @keyframes spin{to{transform:rotate(360deg)}}
  .txt{font-size:14px;font-weight:800;color:#0F172A;position:relative;z-index:1;transition:opacity .3s ease}
  .sub{font-size:11.5px;color:#94A3B8;margin-top:-10px;position:relative;z-index:1}
  .dots{display:flex;gap:6px;position:relative;z-index:1}
  .dots span{width:7px;height:7px;border-radius:50%;background:#A7F3D0;animation:dot 1.2s ease-in-out infinite}
  .dots span:nth-child(2){animation-delay:.2s}
  .dots span:nth-child(3){animation-delay:.4s}
  @keyframes dot{0%,100%{background:#A7F3D0;transform:scale(1)}50%{background:#059669;transform:scale(1.3)}}
</style></head>
<body>
  <div class="logo">🌱</div>
  <div class="spin"></div>
  <div class="txt" id="txt">Taking you to your fields…</div>
  <div class="sub">Please wait a moment</div>
  <div class="dots"><span></span><span></span><span></span></div>
  <script>
    // Rotating loading copy · shown during slow network / page transitions
    const MSGS = ['Taking you to your fields…','Loading fresh prices…','Getting the best deals…','Warming up the mandi…','Almost there…'];
    let i = 0; const el = document.getElementById('txt');
    setInterval(() => { i = (i + 1) % MSGS.length; el.style.opacity = '0'; setTimeout(() => { el.textContent = MSGS[i]; el.style.opacity = '1'; }, 300); }, 1800);
  </script>
</body></html>
