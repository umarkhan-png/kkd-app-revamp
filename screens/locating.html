<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>KKD · Locating</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .hi { font-family: 'Noto Sans Devanagari', sans-serif; }
  html, body { margin: 0; padding: 0; overflow: hidden; }
  body { min-height: 100vh; background: linear-gradient(180deg, #ECFDF5 0%, #FAF7F2 60%, #ECFDF5 100%); color: #0F172A; }

  /* Map background · faint dotted grid that lives behind the radar so it reads as an actual map · pure CSS, no asset */
  .map-grid { background-image:
      radial-gradient(circle at 1px 1px, rgba(4,120,87,0.18) 1px, transparent 1px),
      radial-gradient(circle at 1px 1px, rgba(4,120,87,0.10) 1px, transparent 1px);
    background-size: 24px 24px, 8px 8px;
    background-position: 0 0, 12px 12px; }

  /* Radar · concentric rings + sweeping conic-gradient that rotates · plus a center pin · drives the locating feel */
  @keyframes radarSweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .radar-sweep { background: conic-gradient(from 0deg, rgba(4,120,87,0) 0deg, rgba(4,120,87,0.6) 45deg, rgba(4,120,87,0) 60deg); animation: radarSweep 1.8s linear infinite; }
  @keyframes ringPulse { 0% { transform: scale(.6); opacity: .65; } 100% { transform: scale(2.0); opacity: 0; } }
  .ring-pulse { animation: ringPulse 2.4s ease-out infinite; }
  .ring-pulse.r2 { animation-delay: 1.2s; }

  /* Pin found state · scales in with a bounce + fades the radar · driven by the .found class on body */
  @keyframes pinIn { 0% { transform: translate(-50%,-100%) scale(.4); opacity: 0; } 60% { transform: translate(-50%,-46%) scale(1.15); opacity: 1; } 100% { transform: translate(-50%,-50%) scale(1); opacity: 1; } }
  .pin-found { display:none; }
  body.found .pin-found { display: block; animation: pinIn .65s cubic-bezier(.34,1.56,.64,1) both; }
  body.found .radar-sweep, body.found .ring-pulse { display: none; }
  body.found .radar-center { background: linear-gradient(135deg,#047857 0%,#10B981 100%); transition: background .35s ease; }

  /* Status label · cross-fades between 'Detecting' and 'Found' */
  .status-line { transition: opacity .3s ease; }
  body.found .status-detect { opacity: 0; pointer-events: none; }
  body.found .status-found  { opacity: 1; pointer-events: auto; }
  .status-found { opacity: 0; pointer-events: none; transition: opacity .3s ease; }

  /* Confetti / leaf burst on found · tiny green leaves drift up from the pin */
  @keyframes leafFly { 0% { transform: translate(0,0) rotate(0deg); opacity: 0; } 15% { opacity: 1; } 100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)); opacity: 0; } }
  body.found .leaf { animation: leafFly 1.4s ease-out both; }
</style>
</head>
<body class="min-h-screen relative flex flex-col items-center">

  <!-- Status bar -->
  <div class="w-full flex items-center justify-between px-6 pt-3 text-[11px] font-bold text-[#0F172A]">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#0F172A" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#0F172A"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#0F172A"/></svg>
    </div>
  </div>

  <!-- Radar/map stage · centred · fills the upper half of the screen -->
  <div class="relative flex-1 w-full flex items-center justify-center" style="max-height:60vh">
    <!-- Map dotted grid -->
    <div class="absolute inset-0 map-grid"></div>

    <!-- Concentric pulse rings (during detect) -->
    <span class="absolute ring-pulse rounded-full" style="width:260px;height:260px;background:rgba(4,120,87,0.16)"></span>
    <span class="absolute ring-pulse r2 rounded-full" style="width:260px;height:260px;background:rgba(4,120,87,0.16)"></span>

    <!-- Radar circle · holds the sweep + center pin -->
    <div class="relative rounded-full flex items-center justify-center" style="width:240px;height:240px;background:radial-gradient(circle,rgba(4,120,87,0.10) 0%,rgba(4,120,87,0.04) 60%,rgba(4,120,87,0) 75%);box-shadow:0 0 0 1.5px rgba(4,120,87,0.18), 0 0 0 60px rgba(4,120,87,0.04)">
      <!-- Sweep -->
      <div class="absolute rounded-full radar-sweep" style="width:100%;height:100%;mask:radial-gradient(circle,transparent 25%,#000 26%);-webkit-mask:radial-gradient(circle,transparent 25%,#000 26%)"></div>

      <!-- Center · while detecting it's a faint emerald ring · turns into the found pin (below) -->
      <div class="radar-center relative rounded-full flex items-center justify-center" style="width:64px;height:64px;background:#FFFFFF;border:2px solid #047857;z-index:2">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#047857" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
      </div>

      <!-- "Found" pin (only renders when body.found is set) -->
      <div class="pin-found absolute" style="top:50%;left:50%;transform:translate(-50%,-50%);z-index:3">
        <div class="relative">
          <div class="w-[80px] h-[80px] rounded-full flex items-center justify-center" style="background:linear-gradient(135deg,#047857 0%,#10B981 100%);box-shadow:0 14px 30px -8px rgba(4,120,87,0.55)">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-7 8-13a8 8 0 1 0-16 0c0 6 8 13 8 13z"/><circle cx="12" cy="9" r="3"/></svg>
          </div>
          <!-- Tick badge tucked at top-right · signals successful detection -->
          <span class="absolute -top-1 -right-1 w-8 h-8 rounded-full flex items-center justify-center" style="background:#FBBF24;border:2.5px solid #FFFFFF;box-shadow:0 4px 10px rgba(251,191,36,0.5)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg>
          </span>
        </div>
      </div>

      <!-- Leaf burst · 5 small leaves fly outward when location is found -->
      <span class="leaf absolute text-[18px]" style="top:50%;left:50%;--dx:-90px;--dy:-110px;--rot:-180deg">🌱</span>
      <span class="leaf absolute text-[18px]" style="top:50%;left:50%;--dx:90px;--dy:-100px;--rot:160deg">🌾</span>
      <span class="leaf absolute text-[18px]" style="top:50%;left:50%;--dx:-100px;--dy:80px;--rot:-120deg">🌿</span>
      <span class="leaf absolute text-[18px]" style="top:50%;left:50%;--dx:100px;--dy:90px;--rot:140deg">🌱</span>
      <span class="leaf absolute text-[18px]" style="top:50%;left:50%;--dx:0;--dy:-130px;--rot:0deg">✨</span>
    </div>
  </div>

  <!-- Status copy · cross-fades from detecting → found -->
  <div class="relative w-full px-6 pb-6 text-center" style="min-height:120px">
    <div class="status-line status-detect absolute left-0 right-0">
      <div class="hi text-[22px] font-extrabold leading-tight" style="color:#0F172A">गांव ढूंढ रहे हैं…</div>
      <div class="text-[14px] mt-1" style="color:#64748B">Detecting your village…</div>
      <div class="inline-flex items-center gap-1.5 mt-3 px-3 py-1.5 rounded-full" style="background:rgba(4,120,87,0.08);color:#047857">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#047857" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        <span class="text-[11.5px] font-extrabold">Reading GPS · this takes 2–3 seconds</span>
      </div>
    </div>
    <div class="status-line status-found absolute left-0 right-0">
      <div class="hi text-[13px] font-extrabold tracking-[0.14em] uppercase" style="color:#047857">✓ लोकेशन मिल गई</div>
      <div class="text-[24px] font-extrabold leading-tight mt-1" style="color:#0F172A" id="villageName">Mahidpur</div>
      <div class="text-[13px] mt-1" style="color:#64748B">Ujjain, Madhya Pradesh · 456440</div>
    </div>
  </div>

  <!-- Sticky bottom CTA · revealed when found · 'Continue to home' -->
  <div id="locCta" class="fixed bottom-0 left-0 right-0 bg-white border-t border-[#EEE5D8] px-6 py-4" style="transform:translateY(110%);transition:transform .4s cubic-bezier(.34,1.56,.64,1)">
    <button onclick="location.href='home.html'" class="w-full h-[54px] rounded-lg bg-[#059669] text-white text-[16px] font-extrabold flex items-center justify-center gap-2">
      <span class="hi">होम पर जाएं</span>
      <span class="opacity-70">·</span>
      <span>Go to Home</span>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    </button>
  </div>

  <script>
    // Auto-flip from detecting → found after ~2.4s · in real app this fires on a successful geolocation callback
    setTimeout(() => {
      document.body.classList.add('found');
      // Slide the Continue CTA into view
      const cta = document.getElementById('locCta');
      cta.style.transform = 'translateY(0)';
      // Persist the detected location so home.html can pick it up
      try { localStorage.setItem('kkd.village', 'Mahidpur'); localStorage.setItem('kkd.district', 'Ujjain'); } catch (e) {}
    }, 2400);
    // After another 2.5s of the found state, auto-route to home so the user doesn't have to tap if they're happy with the detection
    setTimeout(() => { window.location.href = 'home.html'; }, 5500);
  </script>
</body>
</html>
