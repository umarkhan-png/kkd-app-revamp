<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>KKD · Locating</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { margin: 0; padding: 0; overflow: hidden; }
  /* Design-system page bg · no busy dotted map grid · a single soft emerald glow sits behind the pin (.ground-glow) so the eye lands there naturally */
  body { min-height: 100vh; background:#F8F8F8; color:#0F172A; }

  /* Gentle radial glow under the pin · replaces the previous dotted map background · single soft layer, no harsh stripes */
  .ground-glow { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:380px; height:380px; border-radius:50%; background:radial-gradient(circle, rgba(16,185,129,0.18) 0%, rgba(16,185,129,0.07) 40%, transparent 72%); pointer-events:none; }

  /* Soft expanding rings · lighter alpha + slower pulse · no aggressive scale-up · easing matches the permissions screen */
  @keyframes ringPulse { 0% { transform: scale(.7); opacity: .35; } 100% { transform: scale(1.7); opacity: 0; } }
  .ring-pulse { animation: ringPulse 3.4s cubic-bezier(.22,1,.36,1) infinite; transition: opacity .6s ease; border-radius:50%; }
  .ring-pulse.r2 { animation-delay: 1.7s; }
  body.found .ring-pulse { opacity: 0; pointer-events: none; }

  /* Pin · gentle scale-up fade · no spring, no bounce */
  .pin-core { transition: transform .55s cubic-bezier(.22,1,.36,1), box-shadow .55s ease; }
  body.found .pin-core { transform: scale(1.06); box-shadow:0 18px 36px -10px rgba(4,120,87,0.45); }

  /* Status label · longer cross-fade so the swap reads smooth, not abrupt */
  .status-line { transition: opacity .55s ease; }
  body.found .status-detect { opacity: 0; pointer-events: none; }
  body.found .status-found  { opacity: 1; pointer-events: auto; }
  .status-found { opacity: 0; pointer-events: none; transition: opacity .55s ease .15s; }

  @keyframes dotPulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .55; transform: scale(.8); } }
</style>
</head>
<body class="min-h-screen relative flex flex-col items-center">

  <!-- Status bar -->
  <div class="w-full flex items-center justify-between px-6 pt-3 text-[11px] font-semibold text-[#0F172A]">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#0F172A" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#0F172A"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#0F172A"/></svg>
    </div>
  </div>

  <!-- Pin stage · centred · upper half of the screen · clean, no map-grid clutter -->
  <div class="relative flex-1 w-full flex items-center justify-center" style="max-height:60vh">
    <!-- Soft emerald glow behind the pin · replaces the dotted-grid map -->
    <span class="ground-glow"></span>

    <!-- Two slow ring pulses · lighter alpha so the screen feels calm, not radar-aggressive -->
    <span class="absolute ring-pulse" style="width:240px;height:240px;background:rgba(16,185,129,0.16)"></span>
    <span class="absolute ring-pulse r2" style="width:240px;height:240px;background:rgba(16,185,129,0.10)"></span>

    <!-- Central pin · same emerald gradient as permissions hero · scales up gently when location is found -->
    <div class="pin-core relative rounded-full flex items-center justify-center" style="width:112px;height:112px;background:linear-gradient(135deg,#258046 0%,#10B981 100%);box-shadow:0 14px 28px -10px rgba(4,120,87,0.35);z-index:2">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-7 8-13a8 8 0 1 0-16 0c0 6 8 13 8 13z"/><circle cx="12" cy="9" r="3"/></svg>
    </div>
  </div>

  <!-- Status copy · cross-fades from detecting → found · English-only -->
  <div class="relative w-full px-6 pb-12 text-center" style="min-height:120px">
    <div class="status-line status-detect absolute left-0 right-0">
      <div class="text-[22px] font-extrabold leading-tight" style="color:#0F172A">Detecting your location…</div>
      <div class="inline-flex items-center gap-1.5 mt-4 px-3 py-1.5 rounded-full" style="background:rgba(4,120,87,0.08);color:#258046">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#258046" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        <span class="text-[11.5px] font-semibold">Reading GPS · 2–3 seconds</span>
      </div>
    </div>
    <div class="status-line status-found absolute left-0 right-0">
      <div class="text-[13px] font-semibold tracking-[0.14em] uppercase" style="color:#258046">Location detected</div>
      <div class="text-[24px] font-extrabold leading-tight mt-1" style="color:#0F172A" id="villageName">Mahidpur</div>
      <div class="text-[13px] mt-1" style="color:#64748B">Ujjain, Madhya Pradesh · 456440</div>
      <div class="inline-flex items-center gap-1.5 mt-4 text-[11.5px] font-semibold" style="color:#64748B">
        <span class="w-2 h-2 rounded-full" style="background:#10B981;animation:dotPulse 1.4s ease-in-out infinite"></span>
        Taking you home…
      </div>
    </div>
  </div>

  <script>
    // Auto-flip from detecting → found after ~2.4s · in real app this fires on a successful geolocation callback · auto-routes home with a soft 'Taking you home…' line
    setTimeout(() => {
      document.body.classList.add('found');
      try { localStorage.setItem('kkd.village', 'Mahidpur'); localStorage.setItem('kkd.district', 'Ujjain'); } catch (e) {}
    }, 2400);
    setTimeout(() => { window.location.href = 'home.html'; }, 5500);
  </script>
  <script src="../assets/weight-ladder.js"></script>
</body>
</html>
