<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/><title>KKD · Merge Payment</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="../assets/appstate.js"></script>
<script src="../assets/merge-core.js"></script>
<style>
  *{font-family:'Poppins',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  html,body{margin:0;padding:0;font-family:'Poppins',system-ui,sans-serif}
  input,button,select,textarea,optgroup{font-family:inherit}
  body{min-height:100vh;background:#F8F8F8;color:#0F172A;padding-bottom:110px}
  .tnum{font-variant-numeric:tabular-nums}
  .sec-title{margin:22px 18px 10px;font-size:12.5px;font-weight:800;color:#64748B;text-transform:uppercase;letter-spacing:0.06em}

  /* Deliver-to card · EXACT same tile as cart.html */
  .addr-card{margin:0 18px;background:#FFFFFF;border:1px solid #E5E7EB;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(15,23,42,0.04)}
  .addr-top{display:flex;align-items:center;gap:10px;padding:12px 14px}
  .addr-ic{width:34px;height:34px;border-radius:10px;background:#ECFDF5;color:#258046;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
  .addr-body{flex:1;line-height:1.3;min-width:0}
  .addr-row-bottom{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#F8FAFC;border-top:1px solid #F1F5F9}
  .addr-change{font-size:12px;font-weight:800;color:#258046;background:transparent;border:0;cursor:pointer;letter-spacing:0.02em;text-transform:uppercase;text-decoration:none;flex-shrink:0}

  /* Bill summary · same pattern as checkout.html (the amount breakdown lives here) */
  .card{margin:0 18px;background:#FFFFFF;border:1px solid #E5E7EB;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(15,23,42,0.04)}
  .bill-row{display:flex;align-items:center;justify-content:space-between;font-size:13px;padding:3px 0}
  .bill-row .lbl{color:#64748B}
  .bill-row .val{color:#0F172A;font-weight:600;font-variant-numeric:tabular-nums}
  .bill-row .val.green{color:#258046;font-weight:700}
  .bill-total{border-top:1px dashed #CBD5E1;margin-top:8px;padding-top:10px;display:flex;align-items:baseline;justify-content:space-between}
  .bill-total .lbl{font-size:14px;font-weight:800}
  .bill-total .val{font-size:18px;font-weight:800;color:#258046;font-variant-numeric:tabular-nums}

  /* Payment method · EXACT same UI as checkout.html (rows + partial %-tray + COD sub-lines) */
  .pay-card{margin:0 18px;background:#FFFFFF;border:1px solid #E5E7EB;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(15,23,42,0.04)}
  .pay{position:relative;padding:14px;cursor:pointer;border-bottom:1px solid #F1F5F9;transition:background .15s ease;display:block}
  .pay:last-child{border-bottom:0}
  .pay.active{background:#ECFDF5}
  .pay.disabled{opacity:.6}
  .pay.disabled .pay-radio{border-color:#CBD5E1;background:transparent}
  /* COD-disabled inline reason · slides open under the COD row when tapped (contextual, not a floating toast) */
  .cod-reason{max-height:0;overflow:hidden;transition:max-height .3s ease;background:#FFF7ED;border-top:1px solid #FED7AA}
  .cod-reason.open{max-height:220px}
  .cod-reason-in{padding:12px 14px 13px}
  .cod-reason-top{display:flex;gap:9px;align-items:flex-start;font-size:12px;font-weight:600;color:#9A3412;line-height:1.5}
  .cod-reason-top i{color:#EA580C;font-size:13px;margin-top:1px;flex-shrink:0}
  .cod-reason-top b{font-weight:800}
  .cod-reason .act{margin-top:10px;width:100%;height:40px;border-radius:10px;border:0;background:#258046;color:#fff;font-size:13px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:inherit}
  .cod-reason .act:active{transform:scale(.985)}
  @keyframes codShake{0%,100%{transform:translateX(0)}18%{transform:translateX(-5px)}38%{transform:translateX(5px)}58%{transform:translateX(-3px)}78%{transform:translateX(3px)}}
  .pay.shake{animation:codShake .36s ease}
  .pay-head{display:flex;align-items:flex-start;gap:12px}
  .pay-radio{width:20px;height:20px;border-radius:9999px;border:2px solid #CBD5E1;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s ease;margin-top:4px}
  .pay.active .pay-radio{border-color:#258046;background:#258046}
  .pay.active .pay-radio::after{content:'';width:8px;height:8px;border-radius:9999px;background:#FFFFFF}
  .pay-body{flex:1;min-width:0;line-height:1.3}
  .pay-toprow{display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .pay-name-row{display:inline-flex;align-items:center;gap:7px;flex-wrap:wrap}
  .pay-name{font-size:14.5px;font-weight:800;color:#0F172A;line-height:1.1}
  .pay-amt{font-size:14.5px;font-weight:800;color:#0F172A;line-height:1;font-variant-numeric:tabular-nums;margin-left:auto}
  .pay.active .pay-amt{color:#258046}
  .pay-sub{font-size:11.5px;color:#64748B;margin-top:3px}
  .pay-bene{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:4px 9px;border-radius:9999px;background:#ECFDF5;border:1px solid #A7F3D0;color:#258046;font-size:10.5px;font-weight:800;letter-spacing:0.02em}
  .pay-bene i{font-size:9px}
  .pay-bene.gold{background:#FEF3C7;border-color:#FDE68A;color:#B45309}
  .pay-best{display:inline-block;background:#FBBF24;color:#0F172A;font-size:9px;font-weight:900;letter-spacing:0.08em;padding:2px 7px;border-radius:9999px;box-shadow:0 2px 6px rgba(251,191,36,0.4)}
  /* Partial expansion tray · shows ONLY when the Partial row is active */
  .partial-tray{display:none;padding:0 14px 14px 46px;background:#ECFDF5}
  .pay.active.partial-row + .partial-tray{display:block}
  .pp-head{font-size:11px;font-weight:800;color:#64748B;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
  .pp-opts{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
  .pp-opt{padding:9px 4px;border-radius:10px;border:1.5px solid #BBF7D0;background:#FFFFFF;color:#0F172A;font-size:13px;font-weight:800;cursor:pointer;transition:all .15s ease;text-align:center}
  .pp-opt.active{background:#258046;color:#FFFFFF;border-color:#258046;box-shadow:0 4px 10px -2px rgba(4,120,87,0.45)}
  .pp-split{background:#FFFFFF;border:1px solid #BBF7D0;border-radius:10px;padding:10px 12px}
  .pp-split .row{display:flex;align-items:baseline;justify-content:space-between;font-size:12.5px;padding:3px 0}
  .pp-split .row .lbl{color:#64748B}
  .pp-split .row .val{font-weight:800;color:#0F172A;font-variant-numeric:tabular-nums}
  .pp-split .row .val.green{color:#258046}

  /* Sticky CTA bar · EXACT same as cart.html */
  .sticky-cta{position:fixed;bottom:0;left:0;right:0;background:#FFFFFF;border-top:1px solid #F1F5F9;padding:12px 14px;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 12px);z-index:50;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .sticky-sum{display:flex;flex-direction:column;line-height:1.15;flex-shrink:0;min-width:90px}
  .sticky-sum .ttl{font-size:11px;color:#64748B;font-weight:500}
  .sticky-sum .amt{font-size:20px;font-weight:700;color:#0F172A;letter-spacing:-0.01em;font-variant-numeric:tabular-nums}
  .sticky-cta-btn{flex:2;height:52px;padding:0 18px;border-radius:12px;background:#258046;color:#FFFFFF;border:0;font-size:15px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;box-shadow:0 8px 20px -6px rgba(5,150,105,0.45);font-family:inherit}
  .sticky-cta-btn:active{transform:scale(.985)}
</style></head>
<body>

  <div class="flex items-center justify-between px-4 pt-3 text-[11px] font-semibold">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#0F172A" stroke-width="2.5"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#0F172A" stroke-width="2"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#0F172A" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#0F172A"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#0F172A"/></svg>
    </div>
  </div>

  <div class="px-4 pt-4 pb-1 flex items-center gap-3 bg-white">
    <button type="button" onclick="history.back()" class="w-10 h-10 rounded-full flex items-center justify-center" style="background:#FFFFFF;border:1px solid #E5E7EB">
      <i class="fa-solid fa-arrow-left text-[14px]" style="color:#0F172A"></i>
    </button>
    <h1 class="text-[22px] font-extrabold leading-tight" style="color:#0F172A">Payment</h1>
  </div>

  <!-- Deliver to · same tile as cart (replaces the previous-order recap) -->
  <div class="sec-title">Deliver to</div>
  <div class="addr-card">
    <div class="addr-top">
      <div class="addr-ic"><i class="fa-solid fa-truck-fast"></i></div>
      <div class="addr-body">
        <div class="flex items-center gap-1.5">
          <span class="text-[14.5px] font-semibold text-[#0F172A]">Tomorrow, 28 May</span>
          <span class="text-[9px] font-semibold text-[#258046] bg-[#ECFDF5] border border-[#A7F3D0] px-1.5 py-0.5 rounded uppercase tracking-wider">Free</span>
        </div>
        <div class="text-[11.5px] text-[#64748B] mt-0.5">Order before <span class="font-bold text-[#0F172A]">6 PM</span> for next-day dispatch</div>
      </div>
    </div>
    <div class="addr-row-bottom">
      <i class="fa-solid fa-location-dot text-[14px]" style="color:#94A3B8"></i>
      <div class="flex-1 min-w-0 text-[12.5px] font-medium truncate" style="color:#475569">Ramesh Patel · Mahidpur, Ujjain · 456440</div>
      <a href="addresses.html" class="addr-change">Change</a>
    </div>
  </div>

  <!-- Payment method · complete UI like checkout.html -->
  <div class="sec-title">Payment method</div>
  <div class="pay-card">
    <!-- Pay Now -->
    <label class="pay active" data-pay="paynow">
      <span class="pay-head">
        <span class="pay-radio"></span>
        <span class="pay-body">
          <span class="pay-toprow">
            <span class="pay-name-row"><span class="pay-name">Pay Now</span><span class="pay-best">RECOMMENDED</span></span>
            <span class="pay-amt tnum" id="payNowAmt">₹0</span>
          </span>
          <div class="pay-sub">UPI &middot; Cards &middot; Net banking &middot; Wallets</div>
          <div style="display:flex;gap:7px;flex-wrap:wrap;margin-top:5px">
            <span id="payNowDiscPill" style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:#258046;background:#ECFDF5;border:1px solid #BBF7D0;padding:3px 9px;border-radius:9999px"><i class="fa-solid fa-tag text-[9px]"></i> 5% instant off · save ₹0</span>
            <span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:#258046;background:#ECFDF5;border:1px solid #BBF7D0;padding:3px 9px;border-radius:9999px"><i class="fa-solid fa-bolt text-[9px]"></i> Faster order processing</span>
          </div>
        </span>
      </span>
    </label>

    <!-- Partial payment · expandable %-tray -->
    <label class="pay partial-row" data-pay="partial">
      <span class="pay-head">
        <span class="pay-radio"></span>
        <span class="pay-body">
          <span class="pay-toprow"><span class="pay-name">Partial payment</span></span>
          <div class="pay-sub">Pay part now · balance on delivery</div>
          <span class="pay-bene gold"><i class="fa-solid fa-coins"></i> Earn 2% coins on prepaid amount</span>
        </span>
      </span>
    </label>
    <div class="partial-tray" id="partialTray">
      <div class="pp-head">Choose prepaid %</div>
      <div class="pp-opts">
        <button type="button" class="pp-opt active" data-pct="10">10%</button>
        <button type="button" class="pp-opt" data-pct="25">25%</button>
        <button type="button" class="pp-opt" data-pct="50">50%</button>
        <button type="button" class="pp-opt" data-pct="75">75%</button>
      </div>
      <div class="pp-split">
        <div class="row"><span class="lbl">Pay now</span><span class="val tnum" id="ppPayNow">₹0</span></div>
        <div class="row"><span class="lbl">On delivery (cash)</span><span class="val tnum" id="ppOnDelivery">₹0</span></div>
        <div class="row"><span class="lbl">Coins earned</span><span class="val green tnum" id="ppCoins">+0 coins</span></div>
      </div>
    </div>

    <!-- Cash on Delivery -->
    <label class="pay" data-pay="cod" id="codRow">
      <span class="pay-head">
        <span class="pay-radio"></span>
        <span class="pay-body">
          <span class="pay-toprow">
            <span class="pay-name">Cash on Delivery</span>
            <span class="pay-amt tnum" id="codAmt">₹0</span>
          </span>
          <div class="pay-sub" id="codSub">Pay in cash when the order arrives</div>
          <div class="pay-sub" id="codCallLine" style="color:#B45309;margin-top:3px"><i class="fa-solid fa-phone-volume text-[10px]"></i> We'll call to confirm — please pick up calls starting from 92019</div>
          <div id="codExtra" style="display:none;margin-top:9px;padding:10px 12px;border-radius:10px;background:#FFF7ED;border:1px solid #FED7AA;color:#9A3412;font-size:11.5px;font-weight:600;line-height:1.55">
            <i class="fa-solid fa-circle-info" style="color:#EA580C"></i> COD costs <b id="codExtraAmt" class="tnum">₹0</b> more — prepaid orders get 5% off. <span id="codSwitchPay" role="button" tabindex="0" style="color:#258046;font-weight:800;cursor:pointer;text-decoration:underline;white-space:nowrap">Pay now &amp; save</span>
          </div>
        </span>
      </span>
    </label>
    <!-- COD-disabled reason · reveals under the COD row on tap -->
    <div class="cod-reason" id="codReason">
      <div class="cod-reason-in">
        <div class="cod-reason-top"><i class="fa-solid fa-circle-info"></i> <span id="codReasonText"></span></div>
        <button type="button" class="act" id="codSwitchBtn"><i class="fa-solid fa-bolt text-[11px]"></i> Switch to Pay Now</button>
      </div>
    </div>
  </div>

  <!-- Bill summary · the amount breakdown lives here (no separate Amount section) -->
  <div class="sec-title">Bill summary</div>
  <div class="card"><div style="padding:14px" id="bill"></div></div>

  <div class="sticky-cta">
    <div class="sticky-sum">
      <div class="ttl" id="ctaCount">0 items</div>
      <div class="amt tnum" id="ctaAmt">₹0</div>
    </div>
    <button type="button" class="sticky-cta-btn" id="payBtn">Pay &amp; Merge <i class="fa-solid fa-arrow-right text-[12px]"></i></button>
  </div>

  <script>
    (function(){
      var m = window.kkdMerge && window.kkdMerge.compute();
      if (!m){ location.replace('home.html'); return; }
      var rupee = window.kkdMerge.rupee;

      var bill = document.getElementById('bill');
      var payBtn = document.getElementById('payBtn');
      var payLabels = document.querySelectorAll('.pay');
      var ppOpts = document.querySelectorAll('.pp-opt');

      // Sticky left · item count after merge (no amount on the CTA)
      document.getElementById('ctaCount').textContent = m.mergedCount + ' item' + (m.mergedCount > 1 ? 's' : '');

      // Amount due in THIS step: normal = the newly added amount · advance = remaining after what's already paid
      var dueNow = m.advanceRegime ? Math.max(0, m.mergedOrderValue - m.alreadyPaid) : m.extra;
      var onlineDisc = m.advanceRegime ? 0 : m.onlineDiscount;   // 5% prepaid discount only in the normal regime
      var payNowAmount = Math.max(0, dueNow - onlineDisc);

      var selected = 'paynow';
      var pct = 10;

      // ---- Static row figures ----
      document.getElementById('payNowAmt').textContent = rupee(payNowAmount);
      var discPill = document.getElementById('payNowDiscPill');
      if (onlineDisc > 0) { discPill.innerHTML = '<i class="fa-solid fa-tag text-[9px]"></i> 5% instant off · save ' + rupee(onlineDisc); discPill.style.display = ''; }
      else { discPill.style.display = 'none'; }
      // COD · available only in the normal regime
      var codRow = document.getElementById('codRow');
      if (m.advanceRegime){
        codRow.classList.add('disabled');
        document.getElementById('codAmt').textContent = '';
        var cs = document.getElementById('codSub');
        cs.innerHTML = '<i class="fa-solid fa-circle-xmark"></i> Not available above ₹10,000';
        cs.style.color = '#DC2626'; cs.style.fontWeight = '700';
        document.getElementById('codCallLine').style.display = 'none';
      } else {
        document.getElementById('codAmt').textContent = rupee(dueNow);
        document.getElementById('codExtraAmt').textContent = rupee(onlineDisc);
      }

      // Advance regime: the prepaid % is of the TOTAL order, less whatever was already paid (so 10% of ₹21,000 − ₹1,000 paid = ₹1,100).
      // Normal regime: the % is of the newly-added amount.
      function partialNow(){
        if (m.advanceRegime) return Math.max(0, Math.round(m.mergedOrderValue * pct / 100) - m.alreadyPaid);
        return Math.round(dueNow * pct / 100);
      }

      function renderPartialTray(){
        var pn = partialNow();
        document.getElementById('ppPayNow').textContent = rupee(pn);
        document.getElementById('ppOnDelivery').textContent = rupee(Math.max(0, dueNow - pn));
        document.getElementById('ppCoins').textContent = '+' + Math.round(pn * 0.02) + ' coins';
      }

      function currentPayNow(){
        if (selected === 'partial') return partialNow();
        if (selected === 'cod') return dueNow;
        return payNowAmount;   // paynow
      }

      // ---- Bill summary · holds the amount breakdown (checkout-style rows + total) ----
      function renderBill(){
        var pn = currentPayNow();
        var html = '';
        if (m.advanceRegime){
          html += '<div class="bill-row"><span class="lbl">Total order value</span><span class="val">' + rupee(m.mergedOrderValue) + '</span></div>';
          if (m.alreadyPaid > 0) html += '<div class="bill-row"><span class="lbl">Already paid earlier</span><span class="val green">− ' + rupee(m.alreadyPaid) + '</span></div>';
          html += '<div class="bill-row"><span class="lbl">Remaining</span><span class="val">' + rupee(dueNow) + '</span></div>';
          if (selected === 'partial') html += '<div class="bill-row"><span class="lbl">Balance on delivery (cash)</span><span class="val">' + rupee(Math.max(0, dueNow - pn)) + '</span></div>';
        } else {
          html += '<div class="bill-row"><span class="lbl">New items added</span><span class="val">' + rupee(m.extra) + '</span></div>';
          if (selected === 'paynow' && onlineDisc > 0) html += '<div class="bill-row"><span class="lbl">Online payment discount (5%)</span><span class="val green">− ' + rupee(onlineDisc) + '</span></div>';
          if (selected === 'partial') html += '<div class="bill-row"><span class="lbl">Balance on delivery (cash)</span><span class="val">' + rupee(Math.max(0, dueNow - pn)) + '</span></div>';
        }
        html += '<div class="bill-total"><span class="lbl">You pay now</span><span class="val">' + rupee(pn) + '</span></div>';
        bill.innerHTML = html;
        var ca = document.getElementById('ctaAmt'); if (ca) ca.textContent = rupee(pn);   // sticky amount tracks the selection (like checkout)
      }
      var renderCalc = renderBill;   // payment-row handlers call renderCalc()

      // ---- COD-disabled inline reason (contextual, opens under the row) ----
      var codReason = document.getElementById('codReason');
      var codReasonText = document.getElementById('codReasonText');
      if (codReasonText) codReasonText.innerHTML = 'This order is <b>' + rupee(m.mergedOrderValue) + '</b> after merge. Cash on Delivery is available only up to <b>₹10,000</b> — pick Pay Now or Partial to continue.';
      function closeReason(){ if (codReason) codReason.classList.remove('open'); }

      // ---- Wire payment-row selection ----
      payLabels.forEach(function(lbl){
        lbl.addEventListener('click', function(){
          if (lbl.classList.contains('disabled')){
            // COD disabled above ₹10,000 → reveal the contextual reason right under the row + a nudge shake
            if (codReason) codReason.classList.add('open');
            lbl.classList.remove('shake'); void lbl.offsetWidth; lbl.classList.add('shake');
            return;
          }
          closeReason();
          selected = lbl.dataset.pay;
          payLabels.forEach(function(x){ x.classList.toggle('active', x === lbl); });
          renderCalc();
        });
      });
      // ---- "Switch to Pay Now" inside the reason ----
      var codSwitchBtn = document.getElementById('codSwitchBtn');
      if (codSwitchBtn) codSwitchBtn.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); closeReason(); document.querySelector('.pay[data-pay="paynow"]').click(); });
      // ---- Wire partial %-pills ----
      ppOpts.forEach(function(b){
        b.addEventListener('click', function(e){
          e.preventDefault(); e.stopPropagation();
          pct = parseInt(b.dataset.pct, 10) || 10;
          ppOpts.forEach(function(x){ x.classList.toggle('active', x === b); });
          renderPartialTray();
          if (selected === 'partial') renderCalc();
        });
      });
      // ---- COD note "Pay now & save" → jump to Pay Now ----
      var codSwitch = document.getElementById('codSwitchPay');
      if (codSwitch) codSwitch.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); document.querySelector('.pay[data-pay="paynow"]').click(); });

      renderPartialTray();
      renderCalc();

      payBtn.addEventListener('click', function(){
        var method = selected === 'partial' ? 'partial' : selected;   // paynow | partial | cod
        var pn = currentPayNow();
        try {
          localStorage.setItem('kkd.mergeInfo', JSON.stringify({
            ts: Date.now(), orderId: m.oid,
            updated: m.updatedIds.slice(), added: m.newIds.slice(), unchanged: m.unchangedIds.slice(),
            prevQtys: m.prevQtys, method: method, amountPaid: pn
          }));
        } catch(e){}
