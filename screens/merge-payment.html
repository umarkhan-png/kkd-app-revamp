<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/><title>KKD · Merge Payment</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="../assets/appstate.js"></script>
<script src="../assets/merge-core.js"></script>
<style>
  *{font-family:'Poppins',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  html,body{margin:0;padding:0;font-family:'Poppins',system-ui,sans-serif}
  input,button,select,textarea,optgroup{font-family:inherit}
  body{min-height:100vh;background:#F8F8F8;color:#0F172A;padding-bottom:110px}
  .tnum{font-variant-numeric:tabular-nums}
  .sec-title{margin:22px 18px 10px;font-size:12.5px;font-weight:800;color:#64748B;text-transform:uppercase;letter-spacing:0.06em}

  /* Deliver-to card · EXACT same tile as cart.html */
  .addr-card{margin:0 18px;background:#FFFFFF;border:1px solid #E5E7EB;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(15,23,42,0.04)}
  .addr-top{display:flex;align-items:center;gap:10px;padding:12px 14px}
  .addr-ic{width:34px;height:34px;border-radius:10px;background:#ECFDF5;color:#258046;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
  .addr-body{flex:1;line-height:1.3;min-width:0}
  .addr-row-bottom{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#F8FAFC;border-top:1px solid #F1F5F9}
  .addr-change{font-size:12px;font-weight:800;color:#258046;background:transparent;border:0;cursor:pointer;letter-spacing:0.02em;text-transform:uppercase;text-decoration:none;flex-shrink:0}

  /* Simple amount-calculation card */
  .calc{margin:0 18px;background:#FFFFFF;border:1px solid #E5E7EB;border-radius:14px;padding:15px 16px;box-shadow:0 1px 3px rgba(15,23,42,0.04)}
  .calc .lead{font-size:13px;color:#475569;font-weight:600;line-height:1.5;margin-bottom:12px}
  .calc .lead b{color:#0F172A;font-weight:800}
  .calc .r{display:flex;justify-content:space-between;align-items:baseline;font-size:14px;color:#475569;font-weight:600;padding:5px 0}
  .calc .r .v{font-weight:700;color:#0F172A;font-variant-numeric:tabular-nums}
  .calc .r .v.minus{color:#258046}
  .calc .div{margin:9px 0 5px;border-top:1px dashed #E2E8F0}
  .calc .paynow{display:flex;justify-content:space-between;align-items:center;padding-top:3px}
  .calc .paynow .l{font-size:15px;font-weight:800;color:#0F172A}
  .calc .paynow .v{font-size:24px;font-weight:900;color:#258046;font-variant-numeric:tabular-nums}
  .calc .note{font-size:12px;color:#64748B;font-weight:500;margin-top:11px;line-height:1.5;display:flex;gap:7px;align-items:flex-start;background:#F8FAFC;border:1px solid #EEF2F6;border-radius:10px;padding:10px 11px}
  .calc .note i{color:#258046;font-size:12px;margin-top:2px;flex-shrink:0}

  /* Payment method · EXACT same rows as checkout.html */
  .pay-card{margin:0 18px;background:#FFFFFF;border:1px solid #E5E7EB;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(15,23,42,0.04)}
  .pay{position:relative;padding:14px;cursor:pointer;border-bottom:1px solid #F1F5F9;transition:background .15s ease;display:block}
  .pay:last-child{border-bottom:0}
  .pay.active{background:#ECFDF5}
  .pay.disabled{opacity:.55;pointer-events:none}
  .pay-head{display:flex;align-items:flex-start;gap:12px}
  .pay-radio{width:20px;height:20px;border-radius:9999px;border:2px solid #CBD5E1;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s ease;margin-top:4px}
  .pay.active .pay-radio{border-color:#258046;background:#258046}
  .pay.active .pay-radio::after{content:'';width:8px;height:8px;border-radius:9999px;background:#FFFFFF}
  .pay-body{flex:1;min-width:0;line-height:1.3}
  .pay-toprow{display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .pay-name-row{display:inline-flex;align-items:center;gap:7px;flex-wrap:wrap}
  .pay-name{font-size:14.5px;font-weight:800;color:#0F172A;line-height:1.1}
  .pay-amt{font-size:14.5px;font-weight:800;color:#0F172A;line-height:1;font-variant-numeric:tabular-nums;margin-left:auto}
  .pay.active .pay-amt{color:#258046}
  .pay-sub{font-size:11.5px;color:#64748B;margin-top:3px}
  .pay-bene{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:4px 9px;border-radius:9999px;background:#ECFDF5;border:1px solid #A7F3D0;color:#258046;font-size:10.5px;font-weight:800;letter-spacing:0.02em}
  .pay-bene i{font-size:9px}
  .pay-bene.gold{background:#FEF3C7;border-color:#FDE68A;color:#B45309}
  .pay-best{display:inline-block;background:#FBBF24;color:#0F172A;font-size:9px;font-weight:900;letter-spacing:0.08em;padding:2px 7px;border-radius:9999px;box-shadow:0 2px 6px rgba(251,191,36,0.4)}

  /* Sticky CTA bar · EXACT same as cart.html */
  .sticky-cta{position:fixed;bottom:0;left:0;right:0;background:#FFFFFF;border-top:1px solid #F1F5F9;padding:12px 14px;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 12px);z-index:50;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .sticky-sum{display:flex;flex-direction:column;line-height:1.15;flex-shrink:0;min-width:90px}
  .sticky-sum .ttl{font-size:11px;color:#64748B;font-weight:500}
  .sticky-sum .amt{font-size:20px;font-weight:700;color:#0F172A;letter-spacing:-0.01em;font-variant-numeric:tabular-nums}
  .sticky-cta-btn{flex:2;height:52px;padding:0 18px;border-radius:12px;background:#258046;color:#FFFFFF;border:0;font-size:15px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;box-shadow:0 8px 20px -6px rgba(5,150,105,0.45);font-family:inherit}
  .sticky-cta-btn:active{transform:scale(.985)}
</style></head>
<body>

  <div class="flex items-center justify-between px-4 pt-3 text-[11px] font-semibold">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#0F172A" stroke-width="2.5"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#0F172A" stroke-width="2"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#0F172A" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#0F172A"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#0F172A"/></svg>
    </div>
  </div>

  <div class="px-4 pt-4 pb-1 flex items-center gap-3 bg-white">
    <button type="button" onclick="history.back()" class="w-10 h-10 rounded-full flex items-center justify-center" style="background:#FFFFFF;border:1px solid #E5E7EB">
      <i class="fa-solid fa-arrow-left text-[14px]" style="color:#0F172A"></i>
    </button>
    <h1 class="text-[22px] font-extrabold leading-tight" style="color:#0F172A">Payment</h1>
  </div>

  <!-- Deliver to · same tile as cart (replaces the previous-order recap) -->
  <div class="sec-title">Deliver to</div>
  <div class="addr-card">
    <div class="addr-top">
      <div class="addr-ic"><i class="fa-solid fa-truck-fast"></i></div>
      <div class="addr-body">
        <div class="flex items-center gap-1.5">
          <span class="text-[14.5px] font-semibold text-[#0F172A]">Tomorrow, 28 May</span>
          <span class="text-[9px] font-semibold text-[#258046] bg-[#ECFDF5] border border-[#A7F3D0] px-1.5 py-0.5 rounded uppercase tracking-wider">Free</span>
        </div>
        <div class="text-[11.5px] text-[#64748B] mt-0.5">Order before <span class="font-bold text-[#0F172A]">6 PM</span> for next-day dispatch</div>
      </div>
    </div>
    <div class="addr-row-bottom">
      <i class="fa-solid fa-location-dot text-[14px]" style="color:#94A3B8"></i>
      <div class="flex-1 min-w-0 text-[12.5px] font-medium truncate" style="color:#475569">Ramesh Patel · Mahidpur, Ujjain · 456440</div>
      <a href="addresses.html" class="addr-change">Change</a>
    </div>
  </div>

  <div class="sec-title">Amount</div>
  <div class="calc" id="calc"></div>

  <div class="sec-title">Payment method</div>
  <div class="pay-card" id="payCard"></div>

  <div class="sticky-cta">
    <div class="sticky-sum">
      <div class="ttl">You pay now</div>
      <div class="amt tnum" id="ctaAmt">₹0</div>
    </div>
    <button type="button" class="sticky-cta-btn" id="payBtn">Pay &amp; Merge <i class="fa-solid fa-arrow-right text-[12px]"></i></button>
  </div>

  <script>
    (function(){
      var m = window.kkdMerge && window.kkdMerge.compute();
      if (!m){ location.replace('home.html'); return; }
      var rupee = window.kkdMerge.rupee;

      var calc = document.getElementById('calc');
      var payCard = document.getElementById('payCard');
      var ctaAmt = document.getElementById('ctaAmt');
      var payBtn = document.getElementById('payBtn');

      // ---- Build the payment-method rows (checkout style) for this regime ----
      var rows;
      if (m.advanceRegime){
        rows = [
          { pay:'paynow', name:'Pay Now', best:true, amt:m.fullPrepaidNow, sub:'Prepaid · pay the full remaining now', bene:'<span class="pay-bene"><i class="fa-solid fa-bolt"></i> Fastest order processing</span>' },
          { pay:'advpartial', name:'Partial payment', amt:m.advanceMin, sub:'Pay 10% advance now · balance on delivery', bene:'<span class="pay-bene gold"><i class="fa-solid fa-coins"></i> Earn 2% coins on prepaid amount</span>' },
          { pay:'cod', name:'Cash on Delivery', amt:null, sub:'Not available above ₹10,000', disabled:true }
        ];
      } else {
        rows = [
          { pay:'paynow', name:'Pay Now', best:true, amt:m.onlineTotal, sub:'UPI · Cards · Net banking · Wallets', bene:'<span class="pay-bene"><i class="fa-solid fa-tag"></i> 5% instant off · save ' + rupee(m.onlineDiscount) + '</span>' },
          { pay:'cod', name:'Cash on Delivery', amt:m.extra, sub:'Pay in cash when the order arrives' }
        ];
      }
      payCard.innerHTML = rows.map(function(r, i){
        return '<label class="pay' + (i===0?' active':'') + (r.disabled?' disabled':'') + '" data-pay="' + r.pay + '">'
          + '<span class="pay-head"><span class="pay-radio"></span><span class="pay-body">'
          +   '<span class="pay-toprow"><span class="pay-name-row"><span class="pay-name">' + r.name + '</span>'
          +     (r.best?'<span class="pay-best">RECOMMENDED</span>':'') + '</span>'
          +     (r.amt!=null?'<span class="pay-amt tnum">' + rupee(r.amt) + '</span>':'') + '</span>'
          +   '<div class="pay-sub"' + (r.disabled?' style="color:#B45309"':'') + '>' + r.sub + '</div>'
          +   (r.bene||'')
          + '</span></span></label>';
      }).join('');

      // ---- Selected payment method ----
      var selected = 'paynow';

      // ---- Render the simple amount breakdown for the current selection ----
      function renderCalc(){
        var html = '', payNow;
        if (m.advanceRegime){
          payNow = (selected === 'advpartial') ? m.advanceMin : m.fullPrepaidNow;
          html += '<div class="lead">Your total order after merge is <b>' + rupee(m.mergedOrderValue) + '</b>'
                + (m.alreadyPaid > 0 ? ', and <b>' + rupee(m.alreadyPaid) + '</b> is already paid on the earlier order.' : '.') + '</div>';
          html += '<div class="r"><span>Total order value</span><span class="v">' + rupee(m.mergedOrderValue) + '</span></div>';
          if (m.alreadyPaid > 0) html += '<div class="r"><span>Already paid earlier</span><span class="v minus">− ' + rupee(m.alreadyPaid) + '</span></div>';
          html += '<div class="div"></div>';
          html += '<div class="paynow"><span class="l">You pay now</span><span class="v">' + rupee(payNow) + '</span></div>';
          html += '<div class="note"><i class="fa-solid fa-circle-info"></i> <span>'
                + (selected === 'advpartial'
                    ? 'Paying 10% advance now (' + rupee(payNow) + '). The remaining balance is collected on delivery.'
                    : 'Paying the full remaining amount now. Cash on Delivery isn’t available above ₹10,000.')
                + '</span></div>';
        } else {
          var disc = (selected === 'paynow') ? m.onlineDiscount : 0;
          payNow = (selected === 'paynow') ? m.onlineTotal : m.extra;
          html += '<div class="lead">You’re adding <b>' + rupee(m.extra) + '</b> of items to order <b>#' + m.oid + '</b>. Your earlier total stays as placed — you only pay for what’s new.</div>';
          html += '<div class="r"><span>New items added</span><span class="v">' + rupee(m.extra) + '</span></div>';
          if (disc > 0) html += '<div class="r"><span>Online payment discount (5%)</span><span class="v minus">− ' + rupee(disc) + '</span></div>';
          html += '<div class="div"></div>';
          html += '<div class="paynow"><span class="l">You pay now</span><span class="v">' + rupee(payNow) + '</span></div>';
          html += '<div class="note"><i class="fa-solid fa-circle-info"></i> <span>'
                + (selected === 'cod' ? 'You’ll pay ' + rupee(m.extra) + ' in cash on delivery for the added items.' : 'Pay online now and save ' + rupee(m.onlineDiscount) + ' with the 5% discount.')
                + '</span></div>';
        }
        calc.innerHTML = html;
        ctaAmt.textContent = rupee(payNow);
        payBtn.innerHTML = 'Pay ' + rupee(payNow) + ' &amp; Merge <i class="fa-solid fa-arrow-right text-[12px]"></i>';
        return payNow;
      }

      // ---- Wire payment-row selection ----
      var payLabels = payCard.querySelectorAll('.pay');
      payLabels.forEach(function(lbl){
        lbl.addEventListener('click', function(){
          if (lbl.classList.contains('disabled')) return;
          selected = lbl.dataset.pay;
          payLabels.forEach(function(x){ x.classList.toggle('active', x === lbl); });
          renderCalc();
        });
      });
      renderCalc();

      payBtn.addEventListener('click', function(){
        var method = m.advanceRegime ? (selected === 'advpartial' ? 'partial' : 'paynow') : selected;
        var payNow = renderCalc();
        try {
          localStorage.setItem('kkd.mergeInfo', JSON.stringify({
            ts: Date.now(), orderId: m.oid,
            updated: m.updatedIds.slice(), added: m.newIds.slice(), unchanged: m.unchangedIds.slice(),
            prevQtys: m.prevQtys, method: method, amountPaid: payNow
          }));
        } catch(e){}
        window.kkdMerge.clearMergeCart();
        location.href = 'order-success.html?merged=1&mode=' + method;
      });
    })();
  </script>
  <script src="../assets/weight-ladder.js"></script>
</body></html>
