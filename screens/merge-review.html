<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/><title>KKD · Review Merge</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="../assets/appstate.js"></script>
<script src="../assets/merge-core.js"></script>
<style>
  *{font-family:'Poppins',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  html,body{margin:0;padding:0;font-family:'Poppins',system-ui,sans-serif}
  input,button,select,textarea,optgroup{font-family:inherit}
  body{min-height:100vh;background:#F8F8F8;color:#0F172A;padding-bottom:120px}
  .tnum{font-variant-numeric:tabular-nums}
  .sec-title{margin:22px 18px 10px;font-size:12.5px;font-weight:800;color:#64748B;text-transform:uppercase;letter-spacing:0.06em}

  /* Prominent "After merge" section heading */
  .big-sec{margin:24px 18px 12px;display:flex;align-items:center;justify-content:space-between}
  .big-sec .t{font-size:18px;font-weight:800;color:#0F172A;display:flex;align-items:center;gap:9px}
  .big-sec .t i{color:#258046;font-size:16px}
  .big-sec .ct{font-size:12px;font-weight:800;color:#258046;background:#ECFDF5;border:1px solid #BBF7D0;padding:4px 11px;border-radius:9999px}

  /* Recap tile */
  .om-recap-tile{margin:18px 18px 0;background:#FFFFFF;border:1px solid #E2E8F0;border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(15,23,42,0.04)}
  .om-recap-id{flex:1;min-width:0;display:flex;align-items:center;gap:11px;line-height:1.25}
  .om-recap-id i{width:38px;height:38px;border-radius:10px;background:#F8FAFC;color:#475569;display:flex;align-items:center;justify-content:center;font-size:15px;border:1px solid #E2E8F0;flex-shrink:0}
  .om-recap-id b{display:block;font-size:15px;color:#0F172A;font-weight:800}
  .om-recap-id em{display:block;font-size:12.5px;color:#64748B;font-weight:600;font-style:normal;margin-top:2px}
  .om-recap-view{flex-shrink:0;display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:9999px;background:#FFFFFF;border:1.5px solid #258046;color:#258046;font-size:13px;font-weight:800;text-decoration:none}

  /* Unified item list */
  .om-list{margin:0 18px;background:#FFFFFF;border:1px solid #E5E7EB;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(15,23,42,0.04)}
  .om-row{display:flex;align-items:center;gap:13px;padding:14px 15px;border-top:1px solid #F1F5F9;position:relative}
  .om-row:first-child{border-top:0}
  .om-row[data-state="unchanged"]{background:#FAFBFC}
  .om-row[data-state="unchanged"] .om-row-body .n{color:#475569}
  .om-row[data-state="updated"]{background:#FFFBEB}
  .om-row[data-state="new"]{background:#F0FDF4}
  .om-row-img{width:54px;height:54px;border-radius:11px;background:#FFFFFF;border:1px solid #E2E8F0;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:4px}
  .om-row-img img{max-width:100%;max-height:100%;object-fit:contain}
  .om-row-body{flex:1;min-width:0;line-height:1.3}
  .om-row-body .n{font-size:15px;font-weight:800;color:#0F172A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .om-row-body .s{font-size:12.5px;color:#94A3B8;font-weight:600;margin-top:2px}
  .om-row-body .qty{margin-top:6px;display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:#475569;font-variant-numeric:tabular-nums}
  .om-row-body .qty .prev{color:#94A3B8;text-decoration:line-through}
  .om-row-body .qty .arrow{font-size:11px;color:#B45309;font-weight:900}
  .om-row-body .qty .next{color:#0F172A;font-weight:900}
  .om-row-right{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:5px;text-align:right}
  .om-tag{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:800;padding:4px 10px;border-radius:9999px;line-height:1.4;white-space:nowrap}
  .om-tag.new{background:#ECFDF5;color:#258046;border:1px solid #BBF7D0}
  .om-tag.unchanged{background:#F1F5F9;color:#64748B;border:1px solid #E2E8F0}
  .om-row-price{font-size:15px;font-weight:800;color:#258046;font-variant-numeric:tabular-nums}
  .om-row-price.none{color:#94A3B8;font-weight:600;font-size:12.5px}

  /* Deliver-to card · EXACT same tile as cart.html */
  .addr-card{margin:0 18px;background:#FFFFFF;border:1px solid #E5E7EB;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(15,23,42,0.04)}
  .addr-top{display:flex;align-items:center;gap:10px;padding:12px 14px}
  .addr-ic{width:34px;height:34px;border-radius:10px;background:#ECFDF5;color:#258046;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
  .addr-body{flex:1;line-height:1.3;min-width:0}
  .addr-row-bottom{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#F8FAFC;border-top:1px solid #F1F5F9}
  .addr-change{font-size:12px;font-weight:800;color:#258046;background:transparent;border:0;cursor:pointer;letter-spacing:0.02em;text-transform:uppercase;text-decoration:none;flex-shrink:0}

  /* Sticky CTA bar · EXACT same as cart.html */
  .sticky-cta{position:fixed;bottom:0;left:0;right:0;background:#FFFFFF;border-top:1px solid #F1F5F9;padding:12px 14px;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 12px);z-index:50;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .sticky-sum{display:flex;flex-direction:column;line-height:1.15;flex-shrink:0;min-width:90px}
  .sticky-sum .ttl{font-size:11px;color:#64748B;font-weight:500}
  .sticky-sum .amt{font-size:20px;font-weight:700;color:#0F172A;letter-spacing:-0.01em;font-variant-numeric:tabular-nums}
  .sticky-cta-btn{flex:2;height:52px;padding:0 18px;border-radius:12px;background:#258046;color:#FFFFFF;border:0;font-size:15px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;box-shadow:0 8px 20px -6px rgba(5,150,105,0.45);font-family:inherit}
  .sticky-cta-btn:active{transform:scale(.985)}
</style></head>
<body>

  <div class="flex items-center justify-between px-4 pt-3 text-[11px] font-semibold">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#0F172A" stroke-width="2.5"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#0F172A" stroke-width="2"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#0F172A" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#0F172A"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#0F172A"/></svg>
    </div>
  </div>

  <div class="px-4 pt-4 pb-1 flex items-center gap-3 bg-white">
    <button onclick="history.back()" class="w-10 h-10 rounded-full flex items-center justify-center" style="background:#FFFFFF;border:1px solid #E5E7EB">
      <i class="fa-solid fa-arrow-left text-[14px]" style="color:#0F172A"></i>
    </button>
    <h1 class="text-[22px] font-extrabold leading-tight" style="color:#0F172A">Merge Order</h1>
  </div>

  <div class="sec-title">Previous order</div>
  <div class="om-recap-tile">
    <div class="om-recap-id">
      <i class="fa-solid fa-receipt"></i>
      <span><b id="omOrderId">#KKD-26194</b><em id="omOrderCount">Not shipped yet</em></span>
    </div>
    <a href="order-details.html" class="om-recap-view">View <i class="fa-solid fa-arrow-right text-[10px]"></i></a>
  </div>

  <div class="big-sec">
    <div class="t"><i class="fa-solid fa-code-merge"></i> After merge</div>
    <div class="ct" id="omAfterCt">0 items</div>
  </div>
  <div class="om-list" id="omList"></div>

  <div class="sec-title">Deliver to</div>
  <div class="addr-card">
    <div class="addr-top">
      <div class="addr-ic"><i class="fa-solid fa-truck-fast"></i></div>
      <div class="addr-body">
        <div class="flex items-center gap-1.5">
          <span class="text-[14.5px] font-semibold text-[#0F172A]">Tomorrow, 28 May</span>
          <span class="text-[9px] font-semibold text-[#258046] bg-[#ECFDF5] border border-[#A7F3D0] px-1.5 py-0.5 rounded uppercase tracking-wider">Free</span>
        </div>
        <div class="text-[11.5px] text-[#64748B] mt-0.5">Order before <span class="font-bold text-[#0F172A]">6 PM</span> for next-day dispatch</div>
      </div>
    </div>
    <div class="addr-row-bottom">
      <i class="fa-solid fa-location-dot text-[14px]" style="color:#94A3B8"></i>
      <div class="flex-1 min-w-0 text-[12.5px] font-medium truncate" style="color:#475569">Ramesh Patel · Mahidpur, Ujjain · 456440</div>
      <a href="addresses.html" class="addr-change">Change</a>
    </div>
  </div>

  <div class="sticky-cta">
    <div class="sticky-sum">
      <div class="ttl">Merged order value</div>
      <div class="amt tnum" id="ctaAmt">₹0</div>
    </div>
    <button type="button" class="sticky-cta-btn" id="mergeBtn">Merge &amp; continue <i class="fa-solid fa-arrow-right text-[12px]"></i></button>
  </div>

  <script>
    (function(){
      var m = window.kkdMerge && window.kkdMerge.compute();
      if (!m){
        // Nothing to merge → no recent order seeded · bounce to home
        location.replace('home.html');
        return;
      }
      var rupee = window.kkdMerge.rupee;

      // Previous-order tile
      document.getElementById('omOrderId').textContent = '#' + m.oid;
      document.getElementById('omOrderCount').textContent = m.recent.items.length + ' item' + (m.recent.items.length > 1 ? 's' : '') + ' · not shipped yet';

      // After-merge list + count
      window.kkdMerge.renderList(document.getElementById('omList'), m);
      document.getElementById('omAfterCt').textContent = m.mergedCount + ' item' + (m.mergedCount > 1 ? 's' : '');

      // Sticky bar · order value
      document.getElementById('ctaAmt').textContent = rupee(m.mergedOrderValue);

      document.getElementById('mergeBtn').addEventListener('click', function(){ location.href = 'checkout.html?merge=1'; });
    })();
  </script>
  <script src="../assets/weight-ladder.js"></script>
</body></html>
