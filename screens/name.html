<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>KKD · Name</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .hi { font-family: 'Noto Sans Devanagari', sans-serif; }
  html, body { margin: 0; padding: 0; }
  body { min-height: 100vh; background:#FFFFFF; color:#0F172A; }
  .name-input { transition: border-color .15s ease, box-shadow .15s ease; }
  .name-input:focus-within { border-color:#047857; box-shadow:0 0 0 3px rgba(4,120,87,0.10); }
  /* Language chip · matches the phone/otp pattern · white pill with slate border + globe + Hindi label + chevron */
  .lang-pill { display:inline-flex; align-items:center; gap:7px; padding:8px 12px; border-radius:9999px; background:#FFFFFF; border:1px solid #E5E7EB; color:#0F172A; font-size:12.5px; font-weight:700; text-decoration:none; transition:border-color .15s ease, transform .12s ease; }
  .lang-pill:active { transform:scale(.97); border-color:#047857; }
  .lang-pill .globe { font-size:12px; color:#475569; }
  .lang-pill .chev { font-size:9px; color:#94A3B8; }
</style>
</head>
<body class="min-h-screen pb-32 relative">

  <!-- Status bar -->
  <div class="flex items-center justify-between px-6 pt-3 text-[11px] font-bold text-[#0F172A]">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#0F172A" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#0F172A"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#0F172A"/></svg>
    </div>
  </div>

  <!-- Top bar · back routes directly to the mobile number page (OTP is already verified by the time the user lands here, no need to step back through it) · Katyayani wordmark dropped · language chip added for consistency with phone/otp -->
  <div class="px-4 pt-4 flex items-center justify-between">
    <button onclick="location.href='phone.html'" class="w-10 h-10 rounded-full border border-[#E5E7EB] flex items-center justify-center bg-white" aria-label="Back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <a href="language.html" class="lang-pill">
      <i class="fa-solid fa-language globe"></i>
      <span class="hi" id="langCurrent">हिंदी</span>
      <i class="fa-solid fa-chevron-down chev"></i>
    </a>
  </div>

  <!-- Heading · subtitle dropped per spec -->
  <div class="px-6 mt-10">
    <h1 class="text-[26px] font-extrabold leading-tight text-[#0F172A]">What's your name?</h1>
  </div>

  <!-- Inputs · First Name + Last Name -->
  <div class="px-6 mt-8 space-y-3">
    <div class="name-input flex items-center gap-3 h-[58px] px-4 rounded-lg border-2 border-[#E5E7EB] bg-white">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c1-5 5-7 8-7s7 2 8 7"/></svg>
      <input id="firstName" type="text" placeholder="First name" autocomplete="given-name" class="flex-1 outline-none text-[18px] font-semibold bg-transparent placeholder:font-medium placeholder:text-[#CBD5E1]"/>
    </div>
    <div class="name-input flex items-center gap-3 h-[58px] px-4 rounded-lg border-2 border-[#E5E7EB] bg-white">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c1-5 5-7 8-7s7 2 8 7"/></svg>
      <input id="lastName" type="text" placeholder="Last name" autocomplete="family-name" class="flex-1 outline-none text-[18px] font-semibold bg-transparent placeholder:font-medium placeholder:text-[#CBD5E1]"/>
    </div>
  </div>

  <!-- Sticky CTA -->
  <div class="fixed bottom-0 left-0 right-0 bg-white px-6 py-4" style="border-top:0">
    <button id="cta" onclick="location.href='permissions.html'" class="w-full h-[52px] rounded-[12px] text-white text-[15px] font-extrabold flex items-center justify-center gap-2" style="background:#059669;box-shadow:0 8px 20px -6px rgba(5,150,105,0.45)">
      Continue
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    </button>
  </div>

  <script>
    // Persist names so later screens / settings can greet the farmer · also restores field state on back-nav
    const f = document.getElementById('firstName');
    const l = document.getElementById('lastName');
    try {
      f.value = localStorage.getItem('kkd.firstName') || '';
      l.value = localStorage.getItem('kkd.lastName')  || '';
    } catch (e) {}
    document.getElementById('cta').addEventListener('click', () => {
      try {
        localStorage.setItem('kkd.firstName', f.value.trim());
        localStorage.setItem('kkd.lastName',  l.value.trim());
      } catch (e) {}
    });

    // Reflect saved language in the chip
    (function(){
      const map = { hi:'हिंदी', en:'English', hien:'Hinglish', mr:'मराठी', gu:'ગુજરાતી', pa:'ਪੰਜਾਬੀ', te:'తెలుగు', ta:'தமிழ்', kn:'ಕನ್ನಡ', ml:'മലയാളം', od:'ଓଡ଼ିଆ', bn:'বাংলা' };
      let code = 'hi';
      try { code = localStorage.getItem('kkd.lang') || 'hi'; } catch (e) {}
      const el = document.getElementById('langCurrent');
      if (el && map[code]) el.textContent = map[code];
    })();
  </script>
</body>
</html>
