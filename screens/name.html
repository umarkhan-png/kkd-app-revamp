<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>KKD · Name</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .hi { font-family: 'Noto Sans Devanagari', sans-serif; }
  html, body { margin: 0; padding: 0; }
  body { min-height: 100vh; background:#F8F8F8; color:#0F172A; }
  .name-input { transition: border-color .15s ease, box-shadow .15s ease; }
  .name-input:focus-within { border-color:#258046; box-shadow:0 0 0 3px rgba(4,120,87,0.10); }
  /* Back + Language pills · white card style with hairline E5E7EB border + soft shadow (matches the rest of the design system) */
  .back-btn { width:40px; height:40px; border-radius:50%; background:#FFFFFF; border:1px solid #E5E7EB; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 1px 3px rgba(15,23,42,0.04); }
  .back-btn i { font-size:14px; color:#0F172A; }
  .lang-pill { display:inline-flex; align-items:center; gap:7px; padding:8px 14px; border-radius:9999px; background:#FFFFFF; border:1px solid #E5E7EB; color:#0F172A; font-size:13px; font-weight:700; text-decoration:none; box-shadow:0 1px 3px rgba(15,23,42,0.04); transition:transform .12s ease; }
  .lang-pill:active { transform:scale(.97); }
  .lang-pill .chev { font-size:10px; color:#94A3B8; }
</style>
</head>
<body class="min-h-screen pb-32 relative">

  <!-- Status bar -->
  <div class="flex items-center justify-between px-6 pt-3 text-[11px] font-semibold text-[#0F172A]">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#0F172A" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#0F172A"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#0F172A"/></svg>
    </div>
  </div>

  <!-- Top bar · back routes directly to phone (OTP is already verified) · back + language pills are white floating elements, no grey filled feel · globe icon dropped from language chip -->
  <div class="px-4 pt-4 flex items-center justify-between">
    <button onclick="location.href='phone.html'" class="back-btn" aria-label="Back">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
    <a href="language.html" class="lang-pill">
      <span class="hi" id="langCurrent">हिंदी</span>
      <i class="fa-solid fa-chevron-down chev"></i>
    </a>
  </div>

  <!-- Heading · subtitle dropped per spec -->
  <div class="px-6 mt-10">
    <h1 class="text-[26px] font-extrabold leading-tight text-[#0F172A]">What's your name?</h1>
  </div>

  <!-- Inputs · First Name + Last Name -->
  <div class="px-6 mt-8 space-y-3">
    <div class="name-input flex items-center gap-3 h-[58px] px-4 rounded-[12px] bg-white" style="box-shadow:0 1px 3px rgba(15,23,42,0.04);border:1px solid #E5E7EB">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c1-5 5-7 8-7s7 2 8 7"/></svg>
      <input id="firstName" type="text" placeholder="First name" autocomplete="given-name" class="flex-1 outline-none text-[18px] font-bold bg-transparent placeholder:font-medium placeholder:text-[#CBD5E1]"/>
    </div>
    <div class="name-input flex items-center gap-3 h-[58px] px-4 rounded-[12px] bg-white" style="box-shadow:0 1px 3px rgba(15,23,42,0.04);border:1px solid #E5E7EB">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c1-5 5-7 8-7s7 2 8 7"/></svg>
      <input id="lastName" type="text" placeholder="Last name" autocomplete="family-name" class="flex-1 outline-none text-[18px] font-bold bg-transparent placeholder:font-medium placeholder:text-[#CBD5E1]"/>
    </div>
  </div>

  <!-- Sticky CTA · lifts above the keyboard via visualViewport -->
  <div id="stickyCta" class="fixed bottom-0 left-0 right-0 px-6 py-4" style="background:#F8F8F8;border-top:0;transition:transform .15s ease;will-change:transform">
    <button id="cta" onclick="location.href='welcome-aboard.html'" class="w-full h-[52px] rounded-[12px] text-white text-[15px] font-semibold flex items-center justify-center gap-2" style="background:#258046;box-shadow:0 8px 20px -6px rgba(5,150,105,0.45)">
      Continue
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    </button>
  </div>

  <script>
    // Persist names so later screens / settings can greet the farmer · also restores field state on back-nav
    const f = document.getElementById('firstName');
    const l = document.getElementById('lastName');
    try {
      f.value = localStorage.getItem('kkd.firstName') || '';
      l.value = localStorage.getItem('kkd.lastName')  || '';
    } catch (e) {}
    document.getElementById('cta').addEventListener('click', () => {
      try {
        localStorage.setItem('kkd.firstName', f.value.trim());
        localStorage.setItem('kkd.lastName',  l.value.trim());
      } catch (e) {}
    });

    // Reflect saved language in the chip
    (function(){
      const map = { hi:'हिंदी', en:'English', hien:'Hinglish', mr:'मराठी', gu:'ગુજરાતી', pa:'ਪੰਜਾਬੀ', te:'తెలుగు', ta:'தமிழ்', kn:'ಕನ್ನಡ', ml:'മലയാളം', od:'ଓଡ଼ିଆ', bn:'বাংলা' };
      let code = 'hi';
      try { code = localStorage.getItem('kkd.lang') || 'hi'; } catch (e) {}
      const el = document.getElementById('langCurrent');
      if (el && map[code]) el.textContent = map[code];
    })();

    // Keyboard-aware sticky CTA · lift above the keyboard via visualViewport
    (function(){
      if (!window.visualViewport) return;
      const cta = document.getElementById('stickyCta');
      if (!cta) return;
      function reposition(){
        const offset = Math.max(0, window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop);
        cta.style.transform = offset > 0 ? 'translateY(-' + offset + 'px)' : '';
      }
      window.visualViewport.addEventListener('resize', reposition);
      window.visualViewport.addEventListener('scroll', reposition);
    })();
  </script>
</body>
</html>
