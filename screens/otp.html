<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>KKD · OTP</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Outfit:wght@900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .wordmark { font-family: 'Outfit', sans-serif; font-style: italic; font-weight: 900; letter-spacing: -0.04em; }
  html, body { margin: 0; padding: 0; }
  body { min-height: 100vh; background: #FFFFFF; color: #0F172A; }
  .tnum { font-variant-numeric: tabular-nums; }
  /* OTP cell · larger + airy gap · soft border, emerald on focus, filled state has emerald-light bg */
  .otp-box { width: 60px; height: 64px; border: 2px solid #E5E7EB; border-radius: 12px; font-size: 28px; font-weight: 800; text-align: center; outline: none; background: #FFFFFF; transition: border-color .15s, background .15s, box-shadow .15s; font-variant-numeric: tabular-nums; color:#0F172A; }
  .otp-box.filled { border-color: #047857; background: #ECFDF5; }
  .otp-box.active { border-color: #059669; box-shadow: 0 0 0 3px rgba(5,150,105,0.15); }
  /* Resend buttons · small + understated · they only render when the timer expires */
  .resend-btn { display:inline-flex; align-items:center; gap:6px; height:38px; padding:0 14px; border-radius:9999px; font-size:12.5px; font-weight:700; border:1.5px solid; transition:transform .12s ease; cursor:pointer; text-decoration:none; }
  .resend-btn:active { transform: scale(.97); }
  .resend-wa { background:#FFFFFF; color:#25D366; border-color:rgba(37,211,102,0.55); }
  .resend-sms{ background:#FFFFFF; color:#047857; border-color:rgba(4,120,87,0.35); }
  /* Resend states · 'live' shows the timer, 'expired' shows the buttons · JS toggles which is visible */
  .resend-live    { display:flex; }
  .resend-expired { display:none; }
  body.resend-expired .resend-live { display: none; }
  body.resend-expired .resend-expired { display: flex; }
</style>
</head>
<body class="min-h-screen pb-32 relative">

  <!-- Status bar -->
  <div class="flex items-center justify-between px-6 pt-3 text-[11px] font-bold text-[#0F172A]">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#0F172A" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#0F172A"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#0F172A"/></svg>
    </div>
  </div>

  <!-- Top bar · back + Katyayani wordmark -->
  <div class="px-6 pt-4 flex items-center justify-between">
    <button onclick="history.back()" class="w-10 h-10 rounded-full border border-[#E5E7EB] flex items-center justify-center bg-white" aria-label="Back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <div class="wordmark text-[16px]" style="color:#047857">Katyayani</div>
    <div class="w-10"></div>
  </div>

  <!-- Heading · English only · single info line below -->
  <div class="px-6 mt-10">
    <h1 class="text-[26px] font-extrabold leading-tight text-[#0F172A]">Enter OTP</h1>
    <div class="text-[13.5px] text-[#64748B] mt-1.5 flex items-center gap-2 flex-wrap">
      Code sent to <span class="font-bold text-[#0F172A]">+91 98765 43210</span>
      <button onclick="location.href='phone.html'" class="text-[11.5px] font-bold uppercase tracking-wide" style="color:#047857">Change</button>
    </div>
  </div>

  <!-- 4-digit OTP boxes · auto-fill pill removed per spec -->
  <div class="px-6 mt-10">
    <div class="flex items-center justify-center gap-3">
      <input class="otp-box" maxlength="1" inputmode="numeric" autocomplete="one-time-code" data-otp="1"/>
      <input class="otp-box" maxlength="1" inputmode="numeric" data-otp="2"/>
      <input class="otp-box" maxlength="1" inputmode="numeric" data-otp="3"/>
      <input class="otp-box" maxlength="1" inputmode="numeric" data-otp="4"/>
    </div>
  </div>

  <!-- Resend block · ONE compact line · while timer is live it shows 'Resend in 00:30', once expired it swaps to the two pill buttons · no extra hint copy -->
  <div class="px-6 mt-10 text-center">
    <p class="text-[12.5px] text-[#64748B] mb-2.5">Didn't receive the code?</p>
    <div class="resend-live flex items-center justify-center gap-1.5 text-[13px]">
      <span class="text-[#94A3B8]">Resend in</span>
      <span class="font-extrabold text-[#0F172A] tnum" id="resendTimer">00:30</span>
    </div>
    <div class="resend-expired items-center justify-center gap-2 flex-wrap">
      <button class="resend-btn resend-wa">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#25D366"><path d="M17.5 14.4c-.3-.1-1.7-.8-1.9-.9-.3-.1-.5-.1-.7.1-.2.3-.7.9-.9 1.1-.2.2-.3.2-.6.1-.3-.1-1.2-.4-2.3-1.4-.8-.7-1.4-1.7-1.6-1.9-.2-.3 0-.5.1-.6.1-.1.3-.3.4-.5.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5 0-.1-.7-1.7-.9-2.3-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.5 0 1.4 1 2.8 1.2 3 .1.2 2 3 4.8 4.2.7.3 1.2.5 1.6.6.7.2 1.3.2 1.8.1.6-.1 1.7-.7 1.9-1.3.2-.7.2-1.2.2-1.3-.1-.1-.3-.2-.5-.3zM12 2C6.5 2 2 6.5 2 12c0 1.7.4 3.3 1.2 4.7L2 22l5.5-1.2c1.4.7 2.9 1.1 4.5 1.1 5.5 0 10-4.5 10-10S17.5 2 12 2z"/></svg>
        WhatsApp
      </button>
      <button class="resend-btn resend-sms">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#047857" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        SMS
      </button>
    </div>
  </div>

  <!-- Sticky CTA · English only -->
  <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-[#F1F5F9] px-6 py-4">
    <button onclick="location.href='name.html'" class="w-full h-[54px] rounded-lg text-white text-[16px] font-extrabold flex items-center justify-center gap-2" style="background:#059669;box-shadow:0 8px 20px -6px rgba(5,150,105,0.45)">
      Verify
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    </button>
  </div>

  <script>
    // Resend timer · starts on page load (first OTP send) · counts down from 30s · when it hits zero, switch to the WhatsApp + SMS pill buttons
    (function(){
      const t = document.getElementById('resendTimer');
      let s = 30;
      const iv = setInterval(() => {
        s -= 1;
        if (s <= 0) {
          clearInterval(iv);
          document.body.classList.add('resend-expired');
          return;
        }
        const ss = s < 10 ? '0' + s : '' + s;
        t.textContent = '00:' + ss;
      }, 1000);
    })();

    // OTP cell auto-advance · typing a digit jumps focus to the next box; backspace on an empty cell jumps back
    (function(){
      const cells = Array.from(document.querySelectorAll('[data-otp]'));
      cells.forEach((c, i) => {
        c.addEventListener('focus', () => { cells.forEach(x => x.classList.remove('active')); c.classList.add('active'); });
        c.addEventListener('input', () => {
          c.value = c.value.replace(/[^0-9]/g, '').slice(0,1);
          c.classList.toggle('filled', !!c.value);
          if (c.value && i < cells.length - 1) cells[i + 1].focus();
        });
        c.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !c.value && i > 0) cells[i - 1].focus();
        });
      });
      // Focus the first cell on load
      if (cells[0]) cells[0].focus();
    })();
  </script>
</body>
</html>
