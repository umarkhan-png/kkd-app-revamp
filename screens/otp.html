<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>KKD · OTP</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .hi { font-family: 'Noto Sans Devanagari', sans-serif; }
  html, body { margin: 0; padding: 0; }
  body { min-height: 100vh; background: #FAF7F2; color: #0F172A; }
  .otp-box { width: 48px; height: 60px; border: 2px solid #E5E7EB; border-radius: 10px; font-size: 26px; font-weight: 800; text-align: center; outline: none; background: #fff; transition: all .15s; font-variant-numeric: tabular-nums; }
  .otp-box.filled { border-color: #047857; background: #ECFDF5; }
  .otp-box.active { border-color: #059669; box-shadow: 0 0 0 3px rgba(14,122,78,0.12); }
  @keyframes shimmer { 0% { background-position: -200px 0; } 100% { background-position: 200px 0; } }
  .auto-pill { background: linear-gradient(90deg, #ECFDF5 0%, #E8F8EE 50%, #ECFDF5 100%); background-size: 400px 100%; animation: shimmer 2s linear infinite; }
</style>
</head>
<body class="min-h-screen pb-32 relative">

  <!-- Status bar -->
  <div class="flex items-center justify-between px-6 pt-3 text-[11px] font-bold text-[#0F172A]">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#0F172A" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#0F172A"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#0F172A"/></svg>
    </div>
  </div>

  <!-- Back -->
  <div class="px-6 pt-4">
    <button onclick="history.back()" class="w-10 h-10 rounded-full border border-[#EEE5D8] flex items-center justify-center bg-white">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
  </div>

  <!-- Heading -->
  <div class="px-6 mt-6">
    <div class="hi text-[26px] font-extrabold leading-tight">OTP डालें</div>
    <div class="text-[14px] text-[#64748B] mt-1">Enter the 6-digit code sent to</div>
    <div class="text-[15px] font-bold text-[#0F172A] mt-1.5 flex items-center gap-2">
      +91 98765 43210
      <button onclick="location.href='phone.html'" class="text-[11px] font-bold text-[#047857] uppercase">Change</button>
    </div>
  </div>

  <!-- OTP boxes -->
  <div class="px-6 mt-8">
    <div class="flex items-center justify-between gap-2">
      <input class="otp-box filled" value="4" readonly/>
      <input class="otp-box filled" value="8" readonly/>
      <input class="otp-box filled" value="1" readonly/>
      <input class="otp-box filled" value="2" readonly/>
      <input class="otp-box filled" value="9" readonly/>
      <input class="otp-box filled active" value="7" readonly/>
    </div>
    <!-- Auto-fetched pill -->
    <div class="mt-3 flex justify-center">
      <div class="auto-pill inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full border border-[#047857]/30">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
        <span class="text-[10.5px] font-bold text-[#059669]">OTP auto-filled from SMS</span>
      </div>
    </div>
  </div>

  <!-- Resend block · two clear paths · WhatsApp (preferred, green-filled) + SMS (outline) · timer hint above -->
  <div class="px-6 mt-8">
    <div class="text-center">
      <p class="text-[12.5px] text-[#64748B]">
        <span class="hi">कोड नहीं मिला?</span>
        <span class="opacity-50">·</span>
        Didn't get the code?
      </p>
      <div class="mt-1.5 flex items-center justify-center gap-1.5 text-[12.5px]">
        <span class="text-[#94A3B8]">Resend in</span>
        <span class="font-bold text-[#0F172A] tabular-nums" id="resendTimer">00:27</span>
      </div>
    </div>

    <!-- Two resend buttons stacked · WhatsApp is the loud one because OTP delivery via WhatsApp lands faster in low-SMS-coverage villages -->
    <div class="mt-4 space-y-2.5">
      <button id="resendWA" class="w-full h-[48px] rounded-lg text-[14px] font-extrabold flex items-center justify-center gap-2.5" style="background:#25D366;color:#FFFFFF;box-shadow:0 6px 14px -4px rgba(37,211,102,0.45)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#FFFFFF"><path d="M17.5 14.4c-.3-.1-1.7-.8-1.9-.9-.3-.1-.5-.1-.7.1-.2.3-.7.9-.9 1.1-.2.2-.3.2-.6.1-.3-.1-1.2-.4-2.3-1.4-.8-.7-1.4-1.7-1.6-1.9-.2-.3 0-.5.1-.6.1-.1.3-.3.4-.5.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5 0-.1-.7-1.7-.9-2.3-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.5 0 1.4 1 2.8 1.2 3 .1.2 2 3 4.8 4.2.7.3 1.2.5 1.6.6.7.2 1.3.2 1.8.1.6-.1 1.7-.7 1.9-1.3.2-.7.2-1.2.2-1.3-.1-.1-.3-.2-.5-.3zM12 2C6.5 2 2 6.5 2 12c0 1.7.4 3.3 1.2 4.7L2 22l5.5-1.2c1.4.7 2.9 1.1 4.5 1.1 5.5 0 10-4.5 10-10S17.5 2 12 2z"/></svg>
        <span>Resend via WhatsApp</span>
      </button>
      <button id="resendSMS" class="w-full h-[48px] rounded-lg text-[14px] font-extrabold flex items-center justify-center gap-2.5" style="background:#FFFFFF;color:#047857;border:1.5px solid #047857">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#047857" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Resend via SMS</span>
      </button>
    </div>
    <p class="text-center text-[10.5px] text-[#94A3B8] mt-3"><span class="hi">WhatsApp पर तेज़ मिलता है</span> · WhatsApp arrives faster in low-network areas</p>
  </div>

  <!-- Sticky CTA -->
  <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-[#EEE5D8] px-6 py-4">
    <button onclick="location.href='name.html'" class="w-full h-[54px] rounded-lg bg-[#059669] text-white text-[16px] font-extrabold flex items-center justify-center gap-2">
      <span class="hi">सत्यापित करें</span>
      <span class="opacity-70">·</span>
      <span>Verify</span>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    </button>
  </div>

  <script>
    // Countdown · ticks down every second · once it hits zero, the timer line is replaced by a "Resend now" hint
    (function(){
      const t = document.getElementById('resendTimer');
      let s = 27;
      const iv = setInterval(() => {
        s -= 1;
        if (s <= 0) { clearInterval(iv); t.parentElement.innerHTML = '<span class="text-[#94A3B8]">You can resend now</span>'; return; }
        t.textContent = '00:' + (s < 10 ? '0' : '') + s;
      }, 1000);
    })();
  </script>
</body>
</html>
