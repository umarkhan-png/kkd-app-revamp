<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>KKD · OTP</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .hi { font-family: 'Noto Sans Devanagari', sans-serif; }
  html, body { margin: 0; padding: 0; overflow-x: hidden; }
  body { min-height: 100vh; background: #FFFFFF; color: #0F172A; }
  .tnum { font-variant-numeric: tabular-nums; }

  /* Top bar · KKD logo (image only, no white squircle, no 'Katyayani' wordmark) + language chip · clean and minimal */
  .topbar { padding: 12px 16px 4px; display: flex; align-items: center; justify-content: space-between; }
  .brand-logo img { width: 36px; height: 36px; object-fit: contain; display: block; }
  .lang-pill { display: inline-flex; align-items: center; gap: 7px; padding: 8px 12px; border-radius: 9999px; background: #FFFFFF; border: 1px solid #E5E7EB; color: #0F172A; font-size: 12.5px; font-weight: 700; text-decoration: none; transition: border-color .15s ease, transform .12s ease; }
  .lang-pill:active { transform: scale(.97); border-color: #047857; }
  .lang-pill .globe { font-size: 12px; color: #475569; }
  .lang-pill .chev { font-size: 9px; color: #94A3B8; }

  /* OTP cell · airy 64px boxes with soft border + focus ring · filled state stays emerald */
  .otp-box { width: 64px; height: 68px; border: 2px solid #E5E7EB; border-radius: 14px; font-size: 30px; font-weight: 800; text-align: center; outline: none; background: #FFFFFF; transition: border-color .15s, background .15s, box-shadow .15s; font-variant-numeric: tabular-nums; color:#0F172A; }
  .otp-box.filled { border-color: #047857; background: #ECFDF5; }
  .otp-box.active { border-color: #059669; box-shadow: 0 0 0 3px rgba(5,150,105,0.15); }

  /* Resend pill buttons · both use the SAME emerald outline treatment so the styling sits in the design system · only the icons differ (WhatsApp icon stays in its brand green) */
  .resend-btn { display:inline-flex; align-items:center; gap:6px; height:38px; padding:0 14px; border-radius:9999px; font-size:12.5px; font-weight:700; border:1.5px solid #BBF7D0; background:#FFFFFF; color:#047857; transition:transform .12s ease; cursor:pointer; text-decoration:none; }
  .resend-btn:active { transform: scale(.97); border-color:#047857; }
  .resend-live    { display:flex; }
  .resend-options { display:none; }
  body.timer-done .resend-live    { display:none; }
  body.timer-done .resend-options { display:flex; }

  /* Rotating fact / news rotator · bare text, no card box, no slider dots · sits lower in the layout so it's clearly secondary to the OTP cells */
  .fact-rotator { margin: 28px 24px 0; position:relative; min-height:36px; }
  .fact-item { display:flex; align-items:center; justify-content:center; gap:8px; opacity:0; pointer-events:none; position:absolute; inset:0; transition:opacity .35s ease; text-align:center; }
  .fact-item.on { opacity:1; pointer-events:auto; position:relative; }
  .fact-item i { font-size:13px; color:#047857; flex-shrink:0; }
  .fact-item span { font-size:12.5px; font-weight:600; color:#64748B; line-height:1.4; }
</style>
</head>
<body class="min-h-screen pb-28">

  <!-- Status bar -->
  <div class="flex items-center justify-between px-6 pt-3 text-[11px] font-bold text-[#0F172A]">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#0F172A" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#0F172A"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#0F172A"/></svg>
    </div>
  </div>

  <!-- Top bar · just the KKD logo image (Katyayani wordmark dropped) + language chip · matches the phone-screen pattern -->
  <div class="topbar">
    <div class="brand-logo">
      <img src="../assets/kkd-logo.png" alt="KKD" onerror="this.onerror=null;this.src='https://www.katyayaniorganics.com/wp-content/uploads/2022/06/cropped-logo-3.webp'"/>
    </div>
    <a href="language.html" class="lang-pill">
      <i class="fa-solid fa-language globe"></i>
      <span class="hi" id="langCurrent">हिंदी</span>
      <i class="fa-solid fa-chevron-down chev"></i>
    </a>
  </div>

  <!-- Heading + Mobile-number row · moved OUT of any hero band per spec · 'Code sent to' + 'Change' inline so the user sees their number cleanly -->
  <div class="px-6 mt-8">
    <h1 class="text-[26px] font-extrabold leading-tight text-[#0F172A]">Enter OTP</h1>
    <div class="flex items-center gap-2 mt-2">
      <span class="text-[13px]" style="color:#64748B">Code sent to</span>
      <span class="text-[13px] font-extrabold tnum">+91 98765 43210</span>
      <a href="phone.html" class="text-[11.5px] font-extrabold uppercase tracking-wide" style="color:#047857;text-decoration:none">Change</a>
    </div>
  </div>

  <!-- 4-digit OTP cells -->
  <div class="px-6 mt-7">
    <div class="flex items-center justify-center gap-3">
      <input class="otp-box" maxlength="1" inputmode="numeric" autocomplete="one-time-code" data-otp="1"/>
      <input class="otp-box" maxlength="1" inputmode="numeric" data-otp="2"/>
      <input class="otp-box" maxlength="1" inputmode="numeric" data-otp="3"/>
      <input class="otp-box" maxlength="1" inputmode="numeric" data-otp="4"/>
    </div>
  </div>

  <!-- Resend block · while live: 'Resend in MM:SS' · after expiry: two compact pill buttons (WhatsApp + SMS) · uses body.timer-done as the toggle (NOT .resend-expired which used to collide with the descendant class and blank the page) -->
  <div class="px-6 mt-6 text-center">
    <p class="text-[12.5px] mb-2.5" style="color:#64748B">Didn't receive the code?</p>
    <div class="resend-live flex items-center justify-center gap-1.5 text-[13px]">
      <span style="color:#94A3B8">Resend in</span>
      <span class="font-extrabold tnum" style="color:#0F172A" id="resendTimer">00:30</span>
    </div>
    <div class="resend-options items-center justify-center gap-2 flex-wrap">
      <button class="resend-btn resend-wa">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#25D366"><path d="M17.5 14.4c-.3-.1-1.7-.8-1.9-.9-.3-.1-.5-.1-.7.1-.2.3-.7.9-.9 1.1-.2.2-.3.2-.6.1-.3-.1-1.2-.4-2.3-1.4-.8-.7-1.4-1.7-1.6-1.9-.2-.3 0-.5.1-.6.1-.1.3-.3.4-.5.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5 0-.1-.7-1.7-.9-2.3-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.5 0 1.4 1 2.8 1.2 3 .1.2 2 3 4.8 4.2.7.3 1.2.5 1.6.6.7.2 1.3.2 1.8.1.6-.1 1.7-.7 1.9-1.3.2-.7.2-1.2.2-1.3-.1-.1-.3-.2-.5-.3zM12 2C6.5 2 2 6.5 2 12c0 1.7.4 3.3 1.2 4.7L2 22l5.5-1.2c1.4.7 2.9 1.1 4.5 1.1 5.5 0 10-4.5 10-10S17.5 2 12 2z"/></svg>
        WhatsApp
      </button>
      <button class="resend-btn resend-sms">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#047857" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        SMS
      </button>
    </div>
  </div>

  <!-- Rotating fact / news rotator · bare centred text, no card box, no progress dots · sits lower so it doesn't compete with the OTP cells -->
  <div class="fact-rotator" id="factStrip">
    <div class="fact-item on">
      <i class="fa-solid fa-truck-fast"></i><span>Free shipping on every order above &#8377;500</span>
    </div>
    <div class="fact-item">
      <i class="fa-solid fa-headset"></i><span>Krishi Doctor expert calls &middot; free, 7am – 10pm</span>
    </div>
    <div class="fact-item">
      <i class="fa-solid fa-sparkles"></i><span>New launch: Humic + Fulvic 98 &middot; stronger roots</span>
    </div>
    <div class="fact-item">
      <i class="fa-solid fa-shield-halved"></i><span>CIB-CR licensed &middot; sealed straight from the factory</span>
    </div>
  </div>

  <!-- Sticky CTA · design-system primary -->
  <div class="fixed bottom-0 left-0 right-0 bg-white px-6 py-4" style="border-top:0">
    <button onclick="location.href='name.html'" class="w-full h-[52px] rounded-[12px] text-white text-[15px] font-extrabold flex items-center justify-center gap-2" style="background:#059669;box-shadow:0 8px 20px -6px rgba(5,150,105,0.45)">
      Verify
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    </button>
  </div>

  <script>
    // Reflect saved language in the lang pill
    (function(){
      const map = { hi:'हिंदी', en:'English', hien:'Hinglish', mr:'मराठी', gu:'ગુજરાતી', pa:'ਪੰਜਾਬੀ', te:'తెలుగు', ta:'தமிழ்', kn:'ಕನ್ನಡ', ml:'മലയാളം', od:'ଓଡ଼ିଆ', bn:'বাংলা' };
      let code = 'hi';
      try { code = localStorage.getItem('kkd.lang') || 'hi'; } catch (e) {}
      const el = document.getElementById('langCurrent');
      if (el && map[code]) el.textContent = map[code];
    })();

    // Resend timer · one-shot · on zero, flip body.timer-done so the resend pill buttons surface · we use 'timer-done' NOT 'resend-expired' because the descendant div has class .resend-expired/.resend-options and a body class with the same name as the descendant accidentally matches `.resend-expired { display:none }` on the body and blanks the page
    (function(){
      const t = document.getElementById('resendTimer');
      let s = 30;
      const iv = setInterval(() => {
        s -= 1;
        if (s <= 0) { clearInterval(iv); document.body.classList.add('timer-done'); return; }
        const ss = s < 10 ? '0' + s : '' + s;
        if (t) t.textContent = '00:' + ss;
      }, 1000);
    })();

    // OTP auto-advance · safe focus on load · backspace navigates back
    (function(){
      const cells = Array.from(document.querySelectorAll('[data-otp]'));
      cells.forEach((c, i) => {
        c.addEventListener('focus', () => { cells.forEach(x => x.classList.remove('active')); c.classList.add('active'); });
        c.addEventListener('input', () => {
          c.value = c.value.replace(/[^0-9]/g, '').slice(0,1);
          c.classList.toggle('filled', !!c.value);
          if (c.value && i < cells.length - 1) cells[i + 1].focus();
        });
        c.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !c.value && i > 0) cells[i - 1].focus();
        });
      });
      try { if (cells[0]) cells[0].focus({ preventScroll: true }); } catch (e) {}
    })();

    // Rotating fact strip · plain text rotator · cycles every 4s (no progress dots)
    (function(){
      const items = Array.from(document.querySelectorAll('.fact-item'));
      let i = 0;
      setInterval(() => {
        items[i].classList.remove('on');
        i = (i + 1) % items.length;
        items[i].classList.add('on');
      }, 4000);
    })();
  </script>
</body>
</html>
