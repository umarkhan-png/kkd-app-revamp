<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>KKD · OTP</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .hi { font-family: 'Noto Sans Devanagari', sans-serif; }
  html, body { margin: 0; padding: 0; overflow-x: hidden; }
  body { min-height: 100vh; background: #FFFFFF; color: #0F172A; }
  .tnum { font-variant-numeric: tabular-nums; }

  /* Premium hero · same emerald gradient + decoration treatment as phone screen · OTP-relevant security visual replaces the product line-up */
  .hero-card {
    position: relative; overflow: hidden;
    background: linear-gradient(165deg, #022C22 0%, #047857 38%, #059669 72%, #10B981 100%);
    border-radius: 0 0 28px 28px;
    padding: 52px 20px 22px;
    box-shadow: 0 12px 30px -12px rgba(4,120,87,0.5);
  }
  .hero-card::before {
    content: ""; position: absolute; pointer-events: none;
    top: -30px; right: -30px; width: 200px; height: 200px; border-radius: 50%;
    background: radial-gradient(circle, rgba(251,191,36,0.35) 0%, transparent 65%);
  }
  .hero-card::after {
    content: ""; position: absolute; pointer-events: none;
    bottom: -40px; left: -40px; width: 180px; height: 180px; border-radius: 50%;
    background: radial-gradient(circle, rgba(16,185,129,0.6) 0%, transparent 70%);
  }

  /* Security shield · central hero element with a soft pulse · communicates trust/verification */
  .shield {
    position: relative; z-index: 2; margin: 8px auto 0;
    width: 84px; height: 84px;
    border-radius: 24px;
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.32);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(6px);
    animation: shieldPulse 2.6s ease-in-out infinite;
  }
  @keyframes shieldPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(251,191,36,0.0); }
    50% { box-shadow: 0 0 0 12px rgba(251,191,36,0.18); }
  }
  .shield i { font-size: 36px; color: #FBBF24; }

  .hero-tagline { position: relative; z-index: 2; text-align: center; }

  /* Brand mark · 52px squircle with gold ring · identical to phone screen */
  .brand-mark {
    width: 52px; height: 52px;
    border-radius: 16px;
    background: #FFFFFF;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 10px 22px -8px rgba(4,120,87,0.45), 0 4px 10px -4px rgba(251,191,36,0.35);
    position: relative;
  }
  .brand-mark::after {
    content: ""; position: absolute; inset: -2px;
    border-radius: 18px;
    border: 1.5px solid rgba(251,191,36,0.5);
    pointer-events: none;
  }
  .brand-mark img { width: 40px; height: 40px; object-fit: contain; }

  /* Language chip · same pattern as phone */
  .lang-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 12px; border-radius: 9999px;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.30);
    backdrop-filter: blur(6px);
    color: #FFFFFF; font-size: 11.5px; font-weight: 600;
    text-decoration: none;
    transition: background .15s ease;
  }
  .lang-chip:active { background: rgba(255,255,255,0.28); }
  .lang-chip i { font-size: 11px; opacity: .85; }
  .lang-chip b { font-weight: 800; color: #FBBF24; }

  /* OTP cell · airy 60px boxes with soft border + focus ring · filled state stays emerald */
  .otp-box { width: 64px; height: 68px; border: 2px solid #E5E7EB; border-radius: 14px; font-size: 30px; font-weight: 800; text-align: center; outline: none; background: #FFFFFF; transition: border-color .15s, background .15s, box-shadow .15s; font-variant-numeric: tabular-nums; color:#0F172A; }
  .otp-box.filled { border-color: #047857; background: #ECFDF5; }
  .otp-box.active { border-color: #059669; box-shadow: 0 0 0 3px rgba(5,150,105,0.15); }

  /* Resend · small pill buttons surface only after the timer expires */
  .resend-btn { display:inline-flex; align-items:center; gap:6px; height:38px; padding:0 14px; border-radius:9999px; font-size:12.5px; font-weight:700; border:1.5px solid; transition:transform .12s ease; cursor:pointer; text-decoration:none; }
  .resend-btn:active { transform: scale(.97); }
  .resend-wa { background:#FFFFFF; color:#25D366; border-color:rgba(37,211,102,0.55); }
  .resend-sms{ background:#FFFFFF; color:#047857; border-color:rgba(4,120,87,0.35); }
  .resend-live    { display:flex; }
  .resend-expired { display:none; }
  body.resend-expired .resend-live { display: none; }
  body.resend-expired .resend-expired { display: flex; }
</style>
</head>
<body class="min-h-screen pb-28 relative">

  <!-- Status bar · white-tinted since the hero band fills the top -->
  <div class="flex items-center justify-between px-6 pt-3 text-[11px] font-bold" style="color:#FFFFFF;position:absolute;top:0;left:0;right:0;z-index:5">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#FFFFFF" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#FFFFFF"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#FFFFFF"/></svg>
    </div>
  </div>

  <!-- Premium hero · same identity as phone screen · OTP-relevant content (shield icon + verify tagline + phone number being verified) replaces the product line-up -->
  <section class="hero-card">
    <!-- KKD brand-mark · top-LEFT (matches phone screen) · anchors the brand at the leading position -->
    <div class="brand-mark" style="position:absolute;top:30px;left:16px;z-index:4">
      <img src="../assets/kkd-logo.png" alt="KKD" onerror="this.onerror=null;this.src='https://www.katyayaniorganics.com/wp-content/uploads/2022/06/cropped-logo-3.webp'"/>
    </div>

    <!-- Language chip · top-RIGHT (matches phone screen) · routes back to language picker -->
    <a href="language.html" class="lang-chip" style="position:absolute;top:36px;right:16px;z-index:4">
      <i class="fa-solid fa-language"></i>
      <span><span id="langCurrent" class="hi">हिंदी</span> &middot; <b>Change</b></span>
    </a>

    <!-- Security shield · soft gold pulse · OTP-relevant visual -->
    <div class="shield"><i class="fa-solid fa-shield-halved"></i></div>

    <!-- Hero copy · verification-relevant, not product -->
    <div class="hero-tagline" style="margin-top:16px">
      <div class="text-[20px] font-extrabold leading-tight" style="color:#FFFFFF">Verify your number</div>
      <div class="text-[12.5px] mt-1" style="color:rgba(255,255,255,0.85)">We sent a 4-digit code to <span class="font-bold" style="color:#FFFFFF">+91 98765 43210</span></div>
      <a href="phone.html" class="inline-flex items-center gap-1.5 mt-2.5 px-2.5 py-1 rounded-full text-[10.5px] font-extrabold" style="background:rgba(255,255,255,0.95);color:#047857;text-decoration:none">
        <i class="fa-solid fa-pen-to-square text-[9px]"></i> Change number
      </a>
    </div>
  </section>

  <!-- 4-digit OTP boxes · sits in the white area below the hero · auto-fill pill removed per spec -->
  <div class="px-6 mt-8">
    <div class="flex items-center justify-center gap-3">
      <input class="otp-box" maxlength="1" inputmode="numeric" autocomplete="one-time-code" data-otp="1"/>
      <input class="otp-box" maxlength="1" inputmode="numeric" data-otp="2"/>
      <input class="otp-box" maxlength="1" inputmode="numeric" data-otp="3"/>
      <input class="otp-box" maxlength="1" inputmode="numeric" data-otp="4"/>
    </div>
  </div>

  <!-- Resend block · timer counts down for 30s · once expired, two compact pill buttons appear (WhatsApp + SMS) -->
  <div class="px-6 mt-7 text-center">
    <p class="text-[12.5px] text-[#64748B] mb-2.5">Didn't receive the code?</p>
    <div class="resend-live flex items-center justify-center gap-1.5 text-[13px]">
      <span class="text-[#94A3B8]">Resend in</span>
      <span class="font-extrabold text-[#0F172A] tnum" id="resendTimer">00:30</span>
    </div>
    <div class="resend-expired items-center justify-center gap-2 flex-wrap">
      <button class="resend-btn resend-wa">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#25D366"><path d="M17.5 14.4c-.3-.1-1.7-.8-1.9-.9-.3-.1-.5-.1-.7.1-.2.3-.7.9-.9 1.1-.2.2-.3.2-.6.1-.3-.1-1.2-.4-2.3-1.4-.8-.7-1.4-1.7-1.6-1.9-.2-.3 0-.5.1-.6.1-.1.3-.3.4-.5.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5 0-.1-.7-1.7-.9-2.3-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.5 0 1.4 1 2.8 1.2 3 .1.2 2 3 4.8 4.2.7.3 1.2.5 1.6.6.7.2 1.3.2 1.8.1.6-.1 1.7-.7 1.9-1.3.2-.7.2-1.2.2-1.3-.1-.1-.3-.2-.5-.3zM12 2C6.5 2 2 6.5 2 12c0 1.7.4 3.3 1.2 4.7L2 22l5.5-1.2c1.4.7 2.9 1.1 4.5 1.1 5.5 0 10-4.5 10-10S17.5 2 12 2z"/></svg>
        WhatsApp
      </button>
      <button class="resend-btn resend-sms">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#047857" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        SMS
      </button>
    </div>
  </div>

  <!-- Sticky CTA · matches design-system primary spec (52px, 12px radius, 15px font-extrabold, soft emerald glow) -->
  <div class="fixed bottom-0 left-0 right-0 bg-white px-6 py-4" style="border-top:0">
    <button onclick="location.href='name.html'" class="w-full h-[52px] rounded-[12px] text-white text-[15px] font-extrabold flex items-center justify-center gap-2" style="background:#059669;box-shadow:0 8px 20px -6px rgba(5,150,105,0.45)">
      Verify
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    </button>
  </div>

  <script>
    // Reflect saved language in the hero chip
    (function(){
      const map = { hi:'हिंदी', en:'English', hien:'Hinglish', mr:'मराठी', gu:'ગુજરાતી', pa:'ਪੰਜਾਬੀ', te:'తెలుగు', ta:'தமிழ்', kn:'ಕನ್ನಡ', ml:'മലയാളം', od:'ଓଡ଼ିଆ', bn:'বাংলা' };
      let code = 'hi';
      try { code = localStorage.getItem('kkd.lang') || 'hi'; } catch (e) {}
      const el = document.getElementById('langCurrent');
      if (el && map[code]) el.textContent = map[code];
    })();

    // Resend timer · counts down from 30 · ONE-SHOT (interval is cleared on hit-zero, never re-runs) so the screen doesn't drift to a blank state after sitting idle
    (function(){
      const t = document.getElementById('resendTimer');
      let s = 30;
      const iv = setInterval(() => {
        s -= 1;
        if (s <= 0) { clearInterval(iv); document.body.classList.add('resend-expired'); return; }
        const ss = s < 10 ? '0' + s : '' + s;
        if (t) t.textContent = '00:' + ss;
      }, 1000);
    })();

    // OTP cell auto-advance · focus the first cell once on load (no autofocus attribute, no aggressive re-focus) so iframe / idle states stay stable
    (function(){
      const cells = Array.from(document.querySelectorAll('[data-otp]'));
      cells.forEach((c, i) => {
        c.addEventListener('focus', () => { cells.forEach(x => x.classList.remove('active')); c.classList.add('active'); });
        c.addEventListener('input', () => {
          c.value = c.value.replace(/[^0-9]/g, '').slice(0,1);
          c.classList.toggle('filled', !!c.value);
          if (c.value && i < cells.length - 1) cells[i + 1].focus();
        });
        c.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !c.value && i > 0) cells[i - 1].focus();
        });
      });
      // One-time focus on load · wrapped in try so it never breaks the page if iframe focus is denied
      try { if (cells[0]) cells[0].focus({ preventScroll: true }); } catch (e) {}
    })();
  </script>
</body>
</html>
