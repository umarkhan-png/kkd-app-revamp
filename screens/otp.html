<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>KKD · OTP</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .hi { font-family: 'Noto Sans Devanagari', sans-serif; }
  html, body { margin: 0; padding: 0; overflow-x: hidden; }
  body { min-height: 100vh; background: #F8F8F8; color: #0F172A; }
  .tnum { font-variant-numeric: tabular-nums; }

  /* Top bar · back arrow (replaces logo) + language chip · clean and minimal · chip has no globe icon */
  .topbar { padding: 12px 16px 4px; display: flex; align-items: center; justify-content: space-between; }
  .back-btn { width: 40px; height: 40px; border-radius: 50%; background: #FFFFFF; border: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 1px 3px rgba(15,23,42,0.06); }
  .back-btn i { font-size: 14px; color: #0F172A; }
  .lang-pill { display: inline-flex; align-items: center; gap: 7px; padding: 8px 14px; border-radius: 9999px; background: #FFFFFF; border: 0; color: #0F172A; font-size: 13px; font-weight: 700; text-decoration: none; cursor: pointer; box-shadow: 0 1px 3px rgba(15,23,42,0.06); transition: transform .12s ease; }
  .lang-pill:active { transform: scale(.97); }
  .lang-pill .chev { font-size: 10px; color: #94A3B8; }

  /* OTP cell · pure white, no slate border · soft shadow for elevation, emerald focus + filled states */
  .otp-box { width: 64px; height: 68px; border: 2px solid transparent; border-radius: 14px; font-size: 30px; font-weight: 800; text-align: center; outline: none; background: #FFFFFF; box-shadow: 0 1px 3px rgba(15,23,42,0.06); transition: border-color .15s, background .15s, box-shadow .15s; font-variant-numeric: tabular-nums; color:#0F172A; }
  .otp-box.filled { border-color: #047857; background: #ECFDF5; }
  .otp-box.active { border-color: #059669; box-shadow: 0 0 0 3px rgba(5,150,105,0.15); }

  /* Resend pill buttons · primary emerald borders (per design-system) · WhatsApp + SMS share the same outline treatment */
  .resend-btn { display:inline-flex; align-items:center; gap:7px; height:40px; padding:0 16px; border-radius:9999px; font-size:13px; font-weight:700; border:1.5px solid #059669; background:#FFFFFF; color:#047857; transition:transform .12s ease, background .12s ease; cursor:pointer; text-decoration:none; }
  .resend-btn:active { transform: scale(.97); background:#ECFDF5; }
  .resend-btn .wa-ic { font-size:15px; color:#059669; }
  .resend-btn .sms-ic { font-size:13px; color:#047857; }
  .resend-live    { display:flex; }
  .resend-options { display:none; }
  body.timer-done .resend-live    { display:none; }
  body.timer-done .resend-options { display:flex; }

  /* Rotating fact / news rotator · slide-up + fade transition (was a flat opacity swap that read as static text) · soft emerald accent dot pulses with each new item for motion */
  .fact-rotator { margin: 32px 24px 0; position:relative; min-height:46px; }
  .fact-item { display:flex; align-items:center; justify-content:center; gap:10px; opacity:0; transform:translateY(8px); pointer-events:none; position:absolute; inset:0; transition:opacity .45s ease, transform .45s cubic-bezier(.4,0,.2,1); text-align:center; }
  .fact-item.on { opacity:1; transform:translateY(0); pointer-events:auto; position:relative; }
  @keyframes factDot { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(.7); opacity: .6; } }
  .fact-dot { width: 6px; height: 6px; border-radius: 9999px; background: #10B981; flex-shrink: 0; animation: factDot 1.6s ease-in-out infinite; }
  .fact-item i { font-size:14px; color:#047857; flex-shrink:0; }
  .fact-item span { font-size:12.5px; font-weight:600; color:#475569; line-height:1.4; }
</style>
</head>
<body class="min-h-screen pb-28">

  <!-- Status bar -->
  <div class="flex items-center justify-between px-6 pt-3 text-[11px] font-bold text-[#0F172A]">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#0F172A" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#0F172A"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#0F172A"/></svg>
    </div>
  </div>

  <!-- Top bar · back arrow (KKD logo removed per spec) + language chip (no globe icon) · both as white floating pills -->
  <div class="topbar">
    <button onclick="location.href='phone.html'" class="back-btn" aria-label="Back">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
    <a href="language.html" class="lang-pill">
      <span class="hi" id="langCurrent">हिंदी</span>
      <i class="fa-solid fa-chevron-down chev"></i>
    </a>
  </div>

  <!-- Heading + Mobile-number row · moved OUT of any hero band per spec · 'Code sent to' + 'Change' inline so the user sees their number cleanly -->
  <div class="px-6 mt-8">
    <h1 class="text-[26px] font-extrabold leading-tight text-[#0F172A]">Enter OTP</h1>
    <div class="flex items-center gap-2 mt-2">
      <span class="text-[13px]" style="color:#64748B">Code sent to</span>
      <span class="text-[13px] font-extrabold tnum">+91 98765 43210</span>
      <a href="phone.html" class="text-[12px] font-extrabold" style="color:#047857;text-decoration:none">Change</a>
    </div>
  </div>

  <!-- 4-digit OTP cells -->
  <div class="px-6 mt-7">
    <div class="flex items-center justify-center gap-3">
      <input class="otp-box" maxlength="1" inputmode="numeric" autocomplete="one-time-code" data-otp="1"/>
      <input class="otp-box" maxlength="1" inputmode="numeric" data-otp="2"/>
      <input class="otp-box" maxlength="1" inputmode="numeric" data-otp="3"/>
      <input class="otp-box" maxlength="1" inputmode="numeric" data-otp="4"/>
    </div>
  </div>

  <!-- Resend block · while live: 'Resend in MM:SS' · after expiry: two compact pill buttons (WhatsApp + SMS) · uses body.timer-done as the toggle (NOT .resend-expired which used to collide with the descendant class and blank the page) -->
  <div class="px-6 mt-6 text-center">
    <p class="text-[12.5px] mb-2.5" style="color:#64748B">Didn't receive the code?</p>
    <div class="resend-live flex items-center justify-center gap-1.5 text-[13px]">
      <span style="color:#94A3B8">Resend in</span>
      <span class="font-extrabold tnum" style="color:#0F172A" id="resendTimer">00:30</span>
    </div>
    <div class="resend-options items-center justify-center gap-2 flex-wrap">
      <button class="resend-btn"><i class="fa-brands fa-whatsapp wa-ic"></i> WhatsApp</button>
      <button class="resend-btn"><i class="fa-solid fa-comment-sms sms-ic"></i> SMS</button>
    </div>
  </div>

  <!-- Rotating fact / news rotator · bare centred text, no card box, no progress dots · sits lower so it doesn't compete with the OTP cells -->
  <div class="fact-rotator" id="factStrip">
    <div class="fact-item on">
      <span class="fact-dot"></span><i class="fa-solid fa-truck-fast"></i><span>Free shipping on every order above &#8377;500</span>
    </div>
    <div class="fact-item">
      <span class="fact-dot"></span><i class="fa-solid fa-headset"></i><span>Krishi Doctor expert calls &middot; free, 7am – 10pm</span>
    </div>
    <div class="fact-item">
      <span class="fact-dot"></span><i class="fa-solid fa-sparkles"></i><span>New launch: Humic + Fulvic 98 &middot; stronger roots</span>
    </div>
    <div class="fact-item">
      <span class="fact-dot"></span><i class="fa-solid fa-shield-halved"></i><span>CIB-CR licensed &middot; sealed straight from the factory</span>
    </div>
  </div>

  <!-- Sticky CTA · design-system primary · lifts with the keyboard via visualViewport (script below) -->
  <div id="stickyCta" class="fixed bottom-0 left-0 right-0 px-6 py-4" style="background:#F8F8F8;border-top:0;transition:transform .15s ease;will-change:transform">
    <button onclick="location.href='name.html'" class="w-full h-[52px] rounded-[12px] text-white text-[15px] font-extrabold flex items-center justify-center gap-2" style="background:#059669;box-shadow:0 8px 20px -6px rgba(5,150,105,0.45)">
      Verify
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    </button>
  </div>

  <script>
    // Reflect saved language in the lang pill
    (function(){
      const map = { hi:'हिंदी', en:'English', hien:'Hinglish', mr:'मराठी', gu:'ગુજરાતી', pa:'ਪੰਜਾਬੀ', te:'తెలుగు', ta:'தமிழ்', kn:'ಕನ್ನಡ', ml:'മലയാളം', od:'ଓଡ଼ିଆ', bn:'বাংলা' };
      let code = 'hi';
      try { code = localStorage.getItem('kkd.lang') || 'hi'; } catch (e) {}
      const el = document.getElementById('langCurrent');
      if (el && map[code]) el.textContent = map[code];
    })();

    // Resend timer · one-shot · on zero, flip body.timer-done so the resend pill buttons surface · we use 'timer-done' NOT 'resend-expired' because the descendant div has class .resend-expired/.resend-options and a body class with the same name as the descendant accidentally matches `.resend-expired { display:none }` on the body and blanks the page
    (function(){
      const t = document.getElementById('resendTimer');
      let s = 30;
      const iv = setInterval(() => {
        s -= 1;
        if (s <= 0) { clearInterval(iv); document.body.classList.add('timer-done'); return; }
        const ss = s < 10 ? '0' + s : '' + s;
        if (t) t.textContent = '00:' + ss;
      }, 1000);
    })();

    // OTP auto-advance · safe focus on load · backspace navigates back
    (function(){
      const cells = Array.from(document.querySelectorAll('[data-otp]'));
      cells.forEach((c, i) => {
        c.addEventListener('focus', () => { cells.forEach(x => x.classList.remove('active')); c.classList.add('active'); });
        c.addEventListener('input', () => {
          c.value = c.value.replace(/[^0-9]/g, '').slice(0,1);
          c.classList.toggle('filled', !!c.value);
          if (c.value && i < cells.length - 1) cells[i + 1].focus();
        });
        c.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !c.value && i > 0) cells[i - 1].focus();
        });
      });
      try { if (cells[0]) cells[0].focus({ preventScroll: true }); } catch (e) {}
    })();

    // Rotating fact strip · plain text rotator · cycles every 4s (no progress dots)
    (function(){
      const items = Array.from(document.querySelectorAll('.fact-item'));
      let i = 0;
      setInterval(() => {
        items[i].classList.remove('on');
        i = (i + 1) % items.length;
        items[i].classList.add('on');
      }, 4000);
    })();

    // Keyboard-aware sticky CTA · lift the CTA above the on-screen keyboard via visualViewport
    (function(){
      if (!window.visualViewport) return;
      const cta = document.getElementById('stickyCta');
      if (!cta) return;
      function reposition(){
        const offset = Math.max(0, window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop);
        cta.style.transform = offset > 0 ? 'translateY(-' + offset + 'px)' : '';
      }
      window.visualViewport.addEventListener('resize', reposition);
      window.visualViewport.addEventListener('scroll', reposition);
    })();
  </script>
</body>
</html>
