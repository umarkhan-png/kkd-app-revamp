<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>KKD · Location</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { margin: 0; padding: 0; }
  body { min-height: 100vh; background: #FFFFFF; color: #0F172A; }
  /* Pin drop + saturated emerald radar rings · clearly green now (not the muted 15%-alpha rings) */
  @keyframes pinDrop { 0% { transform: translateY(-26px); opacity: 0; } 60% { transform: translateY(6px); opacity: 1; } 100% { transform: translateY(0); opacity: 1; } }
  .pin-hero { animation: pinDrop .9s ease-out .15s both; }
  @keyframes ringPulse { 0% { transform: scale(.55); opacity: .75; } 100% { transform: scale(1.75); opacity: 0; } }
  .ring { animation: ringPulse 2.2s ease-out infinite; border-radius: 50%; }
  .ring.r2 { animation-delay: 1.1s; }
  /* Bullet card · clean white card with emerald icon tile · one short line each */
  .perm-bullet { display:flex; align-items:center; gap:12px; padding:14px; background:#FFFFFF; border:1px solid #E5E7EB; border-radius:14px; box-shadow:0 1px 3px rgba(15,23,42,0.04); }
  .perm-ic { width:40px; height:40px; border-radius:10px; background:#ECFDF5; color:#047857; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:17px; }
  .perm-label { font-size:13.5px; font-weight:700; color:#0F172A; line-height:1.25; }
</style>
</head>
<body class="min-h-screen pb-32 relative">

  <!-- Status bar -->
  <div class="flex items-center justify-between px-6 pt-3 text-[11px] font-bold text-[#0F172A]">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#0F172A" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#0F172A"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#0F172A"/></svg>
    </div>
  </div>

  <!-- Back -->
  <div class="px-6 pt-4">
    <button onclick="history.back()" class="w-10 h-10 rounded-full border border-[#E5E7EB] flex items-center justify-center bg-white">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
  </div>

  <!-- Hero · animated map pin · radar rings repainted with saturated emerald · drop ripple uses an emerald-tinted layer instead of barely-visible 15%-alpha -->
  <div class="px-6 mt-4">
    <div class="relative mx-auto pin-hero flex items-center justify-center" style="width:172px;height:172px">
      <span class="absolute ring" style="inset:0;background:rgba(5,150,105,0.30)"></span>
      <span class="absolute ring r2" style="inset:0;background:rgba(5,150,105,0.22)"></span>
      <div class="relative w-[112px] h-[112px] rounded-full flex items-center justify-center" style="background:linear-gradient(135deg,#047857 0%,#10B981 100%);box-shadow:0 18px 32px -8px rgba(4,120,87,0.5)">
        <svg width="58" height="58" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-7 8-13a8 8 0 1 0-16 0c0 6 8 13 8 13z"/><circle cx="12" cy="9" r="3"/></svg>
      </div>
    </div>
  </div>

  <!-- Heading + clear "why" intro · the bullets below now read as the real reasons, not just labels -->
  <div class="px-6 mt-3 text-center">
    <h1 class="text-[24px] font-extrabold leading-tight text-[#0F172A]">Share your location</h1>
    <p class="text-[13px] mt-1.5" style="color:#64748B">We use your location to:</p>
  </div>

  <!-- Why · 3 reason bullets · each starts with the action, so the user sees WHY we need it -->
  <div class="px-6 mt-5 space-y-2.5">
    <div class="perm-bullet">
      <div class="perm-ic"><i class="fa-solid fa-truck-fast"></i></div>
      <div class="perm-label">Deliver to your exact village</div>
    </div>
    <div class="perm-bullet">
      <div class="perm-ic"><i class="fa-solid fa-seedling"></i></div>
      <div class="perm-label">Show products for your area &amp; soil</div>
    </div>
    <div class="perm-bullet">
      <div class="perm-ic"><i class="fa-solid fa-cloud-sun"></i></div>
      <div class="perm-label">Alert you about weather changes</div>
    </div>
  </div>

  <!-- Sticky CTA · single Allow Location · design-system primary -->
  <div class="fixed bottom-0 left-0 right-0 bg-white px-6 py-4" style="border-top:0">
    <button onclick="location.href='locating.html'" class="w-full h-[52px] rounded-[12px] bg-[#059669] text-white text-[15px] font-extrabold flex items-center justify-center gap-2" style="box-shadow:0 8px 20px -6px rgba(5,150,105,0.45)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-7 8-13a8 8 0 1 0-16 0c0 6 8 13 8 13z"/><circle cx="12" cy="9" r="3"/></svg>
      Allow Location
    </button>
  </div>

</body>
</html>
