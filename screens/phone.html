<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>KKD · Phone</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .hi { font-family: 'Noto Sans Devanagari', sans-serif; }
  html, body { margin: 0; padding: 0; }
  body { min-height: 100vh; background: #FAF7F2; color: #1C1C1C; }
  @keyframes shimmer { 0% { background-position: -200px 0; } 100% { background-position: 200px 0; } }
  .auto-pill { background: linear-gradient(90deg, #F0FDF5 0%, #E8F8EE 50%, #F0FDF5 100%); background-size: 400px 100%; animation: shimmer 2s linear infinite; }
  .tnum { font-variant-numeric: tabular-nums; letter-spacing: 0.05em; }
</style>
</head>
<body class="min-h-screen pb-32 relative">

  <!-- Status bar -->
  <div class="flex items-center justify-between px-6 pt-3 text-[11px] font-bold text-[#1C1C1C]">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#1C1C1C" stroke-width="2.5" stroke-linecap="round"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#1C1C1C" stroke-width="2" stroke-linecap="round"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#1C1C1C" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#1C1C1C"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#1C1C1C"/></svg>
    </div>
  </div>

  <!-- Back -->
  <div class="px-6 pt-4">
    <button onclick="history.back()" class="w-10 h-10 rounded-full border border-[#EEE5D8] flex items-center justify-center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
  </div>

  <!-- Heading -->
  <div class="px-6 mt-6">
    <div class="hi text-[26px] font-extrabold leading-tight">अपना मोबाइल नंबर डालें</div>
    <div class="text-[14px] text-[#606060] mt-1">Enter your mobile number</div>
  </div>

  <!-- Input -->
  <div class="px-6 mt-8">
    <label class="hi text-[12px] font-bold text-[#606060] uppercase tracking-wide">मोबाइल नंबर · Mobile</label>
    <div class="mt-2 flex items-center gap-3 h-[60px] px-4 rounded-[10px] border-2 border-[#0E7A4E] bg-white">
      <span class="text-[18px] font-bold text-[#1C1C1C]">+91</span>
      <span class="w-px h-7 bg-[#EDEDED]"></span>
      <input type="tel" maxlength="10" value="98765 43210" class="flex-1 outline-none text-[22px] font-bold tnum bg-transparent"/>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0C831F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-5"/></svg>
    </div>
    <!-- Auto-fetched pill -->
    <div class="auto-pill mt-2.5 inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full border border-[#0E7A4E]/30">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#0C831F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v10M9 6l3-4 3 4M5 11v9a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-9M2 11h20"/></svg>
      <span class="text-[10.5px] font-bold text-[#0C831F]">Auto-fetched from SIM</span>
    </div>
  </div>

  <!-- Trust note -->
  <div class="px-6 mt-7">
    <div class="bg-white border border-[#EEE5D8] rounded-[14px] p-3.5 flex items-start gap-3">
      <svg class="flex-shrink-0 mt-0.5" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1565C0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L4 6v6c0 5 3.5 9.5 8 10 4.5-.5 8-5 8-10V6l-8-4z"/><path d="M9 12l2 2 4-4"/></svg>
      <div>
        <div class="hi text-[12.5px] font-bold text-[#1C1C1C]">आपका नंबर सुरक्षित है</div>
        <p class="text-[11.5px] text-[#606060] mt-0.5">Your number is safe. We'll send an OTP to verify. No spam, no calls.</p>
      </div>
    </div>
  </div>

  <!-- Footnote on Terms -->
  <div class="px-6 mt-6 text-center">
    <p class="text-[11px] text-[#9E9E9E] leading-relaxed">By continuing you agree to our <span class="text-[#0E7A4E] font-bold">Terms</span> &amp; <span class="text-[#0E7A4E] font-bold">Privacy Policy</span></p>
  </div>

  <!-- Sticky CTA -->
  <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-[#EEE5D8] px-6 py-4">
    <button onclick="location.href='otp.html'" class="w-full h-[54px] rounded-[10px] bg-[#0C831F] text-white text-[16px] font-extrabold flex items-center justify-center gap-2">
      <span class="hi">OTP भेजें</span>
      <span class="opacity-70">·</span>
      <span>Send OTP</span>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    </button>
  </div>

</body>
</html>
