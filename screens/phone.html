<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>KKD · Mobile</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .hi { font-family: 'Noto Sans Devanagari', sans-serif; }
  html, body { margin: 0; padding: 0; overflow-x: hidden; }
  body { min-height: 100vh; background: #F8F8F8; color: #0F172A; }
  .tnum { font-variant-numeric: tabular-nums; letter-spacing: 0.05em; }
  .num-input { transition: border-color .15s ease, box-shadow .15s ease; }
  .num-input:focus-within { border-color: #258046; box-shadow: 0 0 0 3px rgba(4,120,87,0.10); }

  /* White top bar ABOVE the emerald hero · KKD logo is the image directly with border-radius + object-fit:cover (matches the home page address-bar treatment) — no wrapper square around it */
  .topbar { padding: 10px 16px 8px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .brand-img { width: 40px; height: 40px; border-radius: 10px; object-fit: cover; display: block; }
  /* Language chip · clean white pill · text + chevron centred via line-height:1 on every child so the Devanagari "shirorekha" doesn't push the label off the chevron baseline · pill padding bumped to feel less cramped */
  .lang-chip { display: inline-flex; align-items: center; gap: 8px; padding: 9px 14px; border-radius: 9999px; background: #FFFFFF; border: 1px solid #E5E7EB; color: #0F172A; font-size: 13px; font-weight: 700; cursor: pointer; line-height: 1; transition: border-color .15s ease, transform .12s ease; }
  .lang-chip:active { transform: scale(.97); border-color: #258046; }
  .lang-chip > span { display: inline-flex; align-items: center; line-height: 1; }
  .lang-chip .chev { font-size: 10px; color: #94A3B8; line-height: 1; display: inline-flex; align-items: center; }

  /* First-order offer banner · crystal-water glass layer · translucent white with backdrop-blur, faint inner highlight + droplet shimmer · sits on the emerald hero so the glass reads as a soft liquid sheen instead of a hard gold strip */
  .hero-offer {
    position:relative; z-index:3;
    display:flex; align-items:center; justify-content:center; gap:8px;
    padding:9px 14px;
    background: linear-gradient(135deg, rgba(255,255,255,0.28) 0%, rgba(255,255,255,0.10) 55%, rgba(255,255,255,0.22) 100%);
    backdrop-filter: blur(14px) saturate(1.3);
    -webkit-backdrop-filter: blur(14px) saturate(1.3);
    color:#FFFFFF; font-size:11.5px; font-weight:800; letter-spacing:0.04em;
    border-radius:14px 14px 0 0;
    margin:-18px -18px 14px;
    border-bottom:1px solid rgba(255,255,255,0.22);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.45), inset 0 -1px 0 rgba(255,255,255,0.08);
    overflow:hidden;
  }
  /* Shimmer animation removed per spec · the glass layer remains as a static frosted look */
  .hero-offer i { font-size:11px; color:#FCD34D; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.25)); }
  .hero-offer b { color:#FCD34D; font-weight:900; text-shadow:0 1px 2px rgba(0,0,0,0.18); }

  /* Language modal · in-page bottom sheet with a 2-col language grid */
  .modal-bd { position:fixed; inset:0; background:rgba(15,23,42,0.55); opacity:0; pointer-events:none; transition:opacity .25s ease; z-index:80; }
  .modal-bd.open { opacity:1; pointer-events:auto; }
  .modal-sheet { position:fixed; left:0; right:0; bottom:0; background:#FFFFFF; border-radius:24px 24px 0 0; box-shadow:0 -8px 32px rgba(0,0,0,0.18); transform:translateY(100%); transition:transform .3s cubic-bezier(.32,.72,0,1); z-index:90; max-height:78vh; display:flex; flex-direction:column; }
  .modal-sheet.open { transform:translateY(0); }
  .lang-tile { background:#FFFFFF; border:1px solid #E5E7EB; border-radius:12px; padding:14px; text-align:left; cursor:pointer; transition:transform .12s ease, border-color .15s ease, background .15s ease; }
  .lang-tile:active, .lang-tile.on { background:#ECFDF5; border-color:#258046; transform:scale(.98); }

  /* Emerald hero · product line-up + tagline + 2-cell stat banner · no top-bar items inside */
  .hero-card {
    position: relative; overflow: hidden;
    background: linear-gradient(165deg, #022C22 0%, #258046 38%, #258046 72%, #10B981 100%);
    border-radius: 22px;
    margin: 4px 14px 0;
    padding: 18px 18px 22px;
    box-shadow: 0 12px 30px -12px rgba(4,120,87,0.5);
  }
  .hero-card::before {
    content: ""; position: absolute; pointer-events: none;
    top: -30px; right: -30px; width: 200px; height: 200px; border-radius: 50%;
    background: radial-gradient(circle, rgba(251,191,36,0.35) 0%, transparent 65%);
  }
  .hero-card::after {
    content: ""; position: absolute; pointer-events: none;
    bottom: -40px; left: -40px; width: 180px; height: 180px; border-radius: 50%;
    background: radial-gradient(circle, rgba(16,185,129,0.6) 0%, transparent 70%);
  }
  .hero-row {
    display: flex; align-items: flex-end; justify-content: center;
    height: 124px; position: relative; z-index: 2;
  }
  .hero-row img {
    height: 124px; object-fit: contain;
    filter: drop-shadow(0 14px 24px rgba(0,0,0,0.45));
    transition: transform .6s cubic-bezier(.34,1.56,.64,1);
  }
  .hero-row img:nth-child(1) { transform: translateY(8px) rotate(-6deg); margin-right: -18px; height: 112px; }
  .hero-row img:nth-child(2) { z-index: 3; height: 134px; }
  .hero-row img:nth-child(3) { transform: translateY(8px) rotate(6deg); margin-left: -18px; height: 112px; }
  .hero-tagline { position: relative; z-index: 2; text-align: center; }

  /* 2-cell stat banner · 10 lakh+ farmers on the left, 500+ products on the right · clean white pill with an internal divider */
  .hero-stats {
    position: relative; z-index: 2;
    display: flex; align-items: stretch;
    margin: 14px auto 0; max-width: 92%;
    background: rgba(255,255,255,0.96);
    border-radius: 14px;
    box-shadow: 0 8px 22px -8px rgba(4,120,87,0.45);
    overflow: hidden;
  }
  .hero-stat-cell {
    flex: 1; padding: 10px 10px; text-align: center; line-height: 1;
  }
  .hero-stat-cell + .hero-stat-cell {
    border-left: 1px solid #E5E7EB;
  }
  .hero-stat-num { font-size: 17px; font-weight: 900; color: #258046; letter-spacing: -0.01em; }
  .hero-stat-lbl { font-size: 10.5px; font-weight: 600; color: #475569; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
</style>
</head>
<body class="min-h-screen pb-28 relative">

  <!-- Status bar · sits over white page bg · dark icons -->
  <div class="flex items-center justify-between px-6 pt-3 text-[11px] font-bold text-[#0F172A]">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#0F172A" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#0F172A"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#0F172A"/></svg>
    </div>
  </div>

  <!-- White top bar · KKD logo as plain image with rounded corners (no wrapper square) + language chip (no icon, opens in-page bottom modal) -->
  <div class="topbar">
    <img src="../assets/kkd-logo.png" alt="KKD" class="brand-img" onerror="this.onerror=null;this.src='https://www.katyayaniorganics.com/wp-content/uploads/2022/06/cropped-logo-3.webp'"/>
    <button id="langChipBtn" class="lang-chip">
      <span class="hi" id="langCurrent">हिंदी</span>
      <i class="fa-solid fa-chevron-down chev"></i>
    </button>
  </div>

  <!-- Emerald hero · top gold offer banner · product line-up · tagline · 2-cell stat banner · redesigned for cleaner hierarchy -->
  <section class="hero-card">
    <div class="hero-offer">
      <i class="fa-solid fa-gift"></i>
      <span>FIRST ORDER &middot; <b>&#8377;100 OFF</b></span>
    </div>
    <div class="hero-row">
      <img src="../assets/Humic_nobg.png" alt=""/>
      <img src="../assets/Chakrawarti_nobg.png" alt=""/>
      <img src="../assets/AntiVirus_nobg.png" alt=""/>
    </div>
    <div class="hero-tagline" style="margin-top:8px">
      <div class="text-[18px] font-bold leading-tight" style="color:#FFFFFF">Save up to <span style="color:#FBBF24">40%</span> on every spray</div>
    </div>
    <div class="hero-stats">
      <div class="hero-stat-cell">
        <div class="hero-stat-num">10 L+</div>
        <div class="hero-stat-lbl">Farmers</div>
      </div>
      <div class="hero-stat-cell">
        <div class="hero-stat-num">500+</div>
        <div class="hero-stat-lbl">Products</div>
      </div>
    </div>
  </section>

  <!-- Language picker bottom modal · 12-language 2-col grid · opens in place when the language chip is tapped (no full-page nav) -->
  <div id="langBd" class="modal-bd"></div>
  <div id="langSheet" class="modal-sheet">
    <div style="width:40px;height:4px;border-radius:9999px;background:#E2E8F0;margin:10px auto 0"></div>
    <div class="px-5 pt-3 pb-3 flex items-center justify-between" style="flex-shrink:0">
      <div class="text-[18px] font-bold">Choose language</div>
      <button id="langClose" class="w-9 h-9 rounded-full flex items-center justify-center" style="background:#F1F5F9;border:0"><i class="fa-solid fa-xmark text-[13px]" style="color:#475569"></i></button>
    </div>
    <div class="px-5 pb-5 overflow-y-auto" style="flex:1">
      <div class="grid grid-cols-2 gap-2.5">
        <button class="lang-tile" data-code="hi"><div class="hi text-[18px] font-bold">हिंदी</div><div class="text-[11.5px] mt-0.5" style="color:#64748B">Hindi</div></button>
        <button class="lang-tile" data-code="en"><div class="text-[18px] font-bold">English</div><div class="text-[11.5px] mt-0.5" style="color:#64748B">English</div></button>
        <button class="lang-tile" data-code="hien"><div class="text-[18px] font-bold">Hinglish</div><div class="text-[11.5px] mt-0.5" style="color:#64748B">Hindi + English</div></button>
        <button class="lang-tile" data-code="mr"><div class="hi text-[18px] font-bold">मराठी</div><div class="text-[11.5px] mt-0.5" style="color:#64748B">Marathi</div></button>
        <button class="lang-tile" data-code="gu"><div class="text-[18px] font-bold">ગુજરાતી</div><div class="text-[11.5px] mt-0.5" style="color:#64748B">Gujarati</div></button>
        <button class="lang-tile" data-code="pa"><div class="text-[18px] font-bold">ਪੰਜਾਬੀ</div><div class="text-[11.5px] mt-0.5" style="color:#64748B">Punjabi</div></button>
        <button class="lang-tile" data-code="te"><div class="text-[18px] font-bold">తెలుగు</div><div class="text-[11.5px] mt-0.5" style="color:#64748B">Telugu</div></button>
        <button class="lang-tile" data-code="ta"><div class="text-[18px] font-bold">தமிழ்</div><div class="text-[11.5px] mt-0.5" style="color:#64748B">Tamil</div></button>
        <button class="lang-tile" data-code="kn"><div class="text-[18px] font-bold">ಕನ್ನಡ</div><div class="text-[11.5px] mt-0.5" style="color:#64748B">Kannada</div></button>
        <button class="lang-tile" data-code="ml"><div class="text-[18px] font-bold">മലയാളം</div><div class="text-[11.5px] mt-0.5" style="color:#64748B">Malayalam</div></button>
        <button class="lang-tile" data-code="od"><div class="text-[18px] font-bold">ଓଡ଼ିଆ</div><div class="text-[11.5px] mt-0.5" style="color:#64748B">Odia</div></button>
        <button class="lang-tile" data-code="bn"><div class="text-[18px] font-bold">বাংলা</div><div class="text-[11.5px] mt-0.5" style="color:#64748B">Bengali</div></button>
      </div>
    </div>
  </div>

  <!-- Heading -->
  <div class="px-6 mt-8">
    <h1 class="text-[24px] font-extrabold leading-tight text-[#0F172A]">Enter your mobile number</h1>
  </div>

  <!-- Input · pure white, no slate border · soft shadow for elevation, emerald focus ring -->
  <div class="px-6 mt-5">
    <div class="num-input flex items-center gap-3 h-[58px] px-4 rounded-[12px] bg-white" style="box-shadow:0 1px 3px rgba(15,23,42,0.04);border:1px solid #E5E7EB">
      <span class="text-[17px] font-bold text-[#0F172A]">+91</span>
      <span class="w-px h-7" style="background:#F1F5F9"></span>
      <input id="mobInput" type="tel" maxlength="10" placeholder="Mobile number" class="flex-1 min-w-0 outline-none text-[17px] font-bold tnum bg-transparent placeholder:font-medium placeholder:text-[#94A3B8]"/>
    </div>
  </div>

  <!-- Refer code · centred toggle link · expands to a full-width input row that spans the SAME width as the mobile-number input (px-6 outer padding), with a clear gap between the input and the Apply link -->
  <div class="mt-3 text-center">
    <button id="referToggle" class="text-[11.5px] font-bold" style="color:#258046;background:transparent;border:0;cursor:pointer">Have a referral code?</button>
  </div>
  <div id="referBox" class="px-6 mt-3 hidden">
    <div class="flex items-center gap-3 h-[44px] px-4 rounded-[10px] bg-white" style="border:1px solid #E5E7EB">
      <input id="referCode" type="text" placeholder="Enter referral code" class="flex-1 outline-none text-[14px] font-semibold bg-transparent placeholder:text-[#94A3B8] placeholder:font-medium" style="text-transform:uppercase;letter-spacing:0.06em"/>
      <button id="referApply" class="text-[12px] font-extrabold flex-shrink-0" style="color:#258046">Apply</button>
    </div>
  </div>

  <!-- Custom polished checkbox -->
  <style>
    .cbx{position:relative;width:20px;height:20px;flex-shrink:0;margin-top:1px}
    .cbx input{position:absolute;inset:0;opacity:0;margin:0;cursor:pointer}
    .cbx .box{width:20px;height:20px;border-radius:6px;border:2px solid #CBD5E1;background:#fff;display:flex;align-items:center;justify-content:center;transition:background .15s ease,border-color .15s ease}
    .cbx .box i{font-size:10px;color:#fff;opacity:0;transform:scale(.6);transition:opacity .15s ease,transform .15s ease}
    .cbx input:checked + .box{background:#258046;border-color:#258046}
    .cbx input:checked + .box i{opacity:1;transform:scale(1)}
  </style>

  <!-- Sticky CTA · consent sits directly above Send OTP (both mandatory, checked by default) · when the keyboard opens, the consent collapses so ONLY the CTA lifts -->
  <div id="stickyCta" class="fixed bottom-0 left-0 right-0 px-6 pt-3 pb-4" style="background:#F8F8F8;border-top:0;transition:transform .15s ease;will-change:transform">
    <div id="consentWrap" class="space-y-3 mb-3.5">
      <label class="flex items-start gap-3 cursor-pointer">
        <span class="cbx"><input type="checkbox" id="consentTerms" checked/><span class="box"><i class="fa-solid fa-check"></i></span></span>
        <span class="text-[11.5px] leading-snug text-[#475569]">By continuing you agree that you have read and accept our <span class="font-bold" style="color:#258046">terms &amp; conditions</span> and <span class="font-bold" style="color:#258046">privacy policy</span>.</span>
      </label>
      <label class="flex items-start gap-3 cursor-pointer">
        <span class="cbx"><input type="checkbox" id="consentSms" checked/><span class="box"><i class="fa-solid fa-check"></i></span></span>
        <span class="text-[11.5px] leading-snug text-[#475569]">I hereby authorize KKD to send notifications on SMS / Promotional / Information messages.</span>
      </label>
    </div>
    <button id="sendOtpBtn" class="w-full h-[52px] rounded-[12px] text-white text-[15px] font-semibold flex items-center justify-center gap-2" style="background:#258046;box-shadow:0 8px 20px -6px rgba(5,150,105,0.45)">
      Send OTP
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    </button>
  </div>

  <script>
    // Both consent boxes are mandatory · Send OTP stays disabled until both are ticked
    (function(){
      const t = document.getElementById('consentTerms');
      const s = document.getElementById('consentSms');
      const btn = document.getElementById('sendOtpBtn');
      function sync(){
        const ok = t.checked && s.checked;
        btn.style.opacity = ok ? '1' : '.5';
        btn.style.pointerEvents = ok ? 'auto' : 'none';
      }
      t.addEventListener('change', sync); s.addEventListener('change', sync); sync();
    })();
  </script>

  <script>
    // Language modal · chip taps open the bottom sheet, tile taps persist + close + update the chip
    (function(){
      const map = { hi:'हिंदी', en:'English', hien:'Hinglish', mr:'मराठी', gu:'ગુજરાતી', pa:'ਪੰਜਾਬੀ', te:'తెలుగు', ta:'தமிழ்', kn:'ಕನ್ನಡ', ml:'മലയാളം', od:'ଓଡ଼ିଆ', bn:'বাংলা' };
      const chip = document.getElementById('langChipBtn');
      const lbl  = document.getElementById('langCurrent');
      const bd   = document.getElementById('langBd');
      const sht  = document.getElementById('langSheet');
      const cls  = document.getElementById('langClose');
      function paint(code){
        if (lbl && map[code]) lbl.textContent = map[code];
        document.querySelectorAll('.lang-tile').forEach(t => t.classList.toggle('on', t.dataset.code === code));
      }
      let code = 'hi';
      try { code = localStorage.getItem('kkd.lang') || 'hi'; } catch (e) {}
      paint(code);
      function open(){ bd.classList.add('open'); sht.classList.add('open'); }
      function close(){ bd.classList.remove('open'); sht.classList.remove('open'); }
      chip.addEventListener('click', open);
      cls.addEventListener('click', close);
      bd.addEventListener('click', close);
      document.querySelectorAll('.lang-tile').forEach(t => {
        t.addEventListener('click', () => {
          const c = t.dataset.code;
          try { localStorage.setItem('kkd.lang', c); } catch (e) {}
          paint(c);
          setTimeout(close, 180);
        });
      });
    })();

    // Send OTP · persist the mobile number so OTP can route by prefix (12345... = returning user, 1234... = new user)
    (function(){
      const btn = document.getElementById('sendOtpBtn');
      const mob = document.getElementById('mobInput');
      if (!btn || !mob) return;
      btn.addEventListener('click', () => {
        const v = (mob.value || '').replace(/\D/g,'').trim();
        try { localStorage.setItem('kkd.mobile', v); } catch (e) {}
        window.location.href = 'otp.html';
      });
    })();

    // Refer-code toggle · "Have a referral code?" expands the input row + persists the code so OTP / name screens can pre-fill it
    (function(){
      const tog = document.getElementById('referToggle');
      const box = document.getElementById('referBox');
      const apply = document.getElementById('referApply');
      const input = document.getElementById('referCode');
      if (!tog || !box) return;
      try { const saved = localStorage.getItem('kkd.referCode'); if (saved && input) { input.value = saved; box.classList.remove('hidden'); } } catch (e) {}
      tog.addEventListener('click', () => { box.classList.toggle('hidden'); if (!box.classList.contains('hidden') && input) input.focus(); });
      apply && apply.addEventListener('click', () => {
        const v = (input.value || '').trim().toUpperCase();
        if (!v) return;
        try { localStorage.setItem('kkd.referCode', v); } catch (e) {}
        tog.innerHTML = '<i class="fa-solid fa-circle-check text-[10px]"></i> Code ' + v + ' applied';
        box.classList.add('hidden');
      });
    })();

    // Keyboard-aware sticky CTA · when the on-screen keyboard opens, visualViewport shrinks · lift the CTA by that delta so it sits above the keyboard
    (function(){
      if (!window.visualViewport) return;
      const cta = document.getElementById('stickyCta');
      if (!cta) return;
      const consentWrap = document.getElementById('consentWrap');
      function reposition(){
        const offset = Math.max(0, window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop);
        cta.style.transform = offset > 0 ? 'translateY(-' + offset + 'px)' : '';
        // Keyboard open · collapse the consent so only the CTA lifts above the keyboard
        if (consentWrap) consentWrap.style.display = offset > 0 ? 'none' : '';
      }
      window.visualViewport.addEventListener('resize', reposition);
      window.visualViewport.addEventListener('scroll', reposition);
    })();
  </script>
</body>
</html>
