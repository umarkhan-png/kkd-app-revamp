<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>KKD · Mobile</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .hi { font-family: 'Noto Sans Devanagari', sans-serif; }
  html, body { margin: 0; padding: 0; overflow-x: hidden; }
  body { min-height: 100vh; background: #FFFFFF; color: #0F172A; }
  .tnum { font-variant-numeric: tabular-nums; letter-spacing: 0.05em; }
  .num-input { transition: border-color .15s ease, box-shadow .15s ease; }
  .num-input:focus-within { border-color: #047857; box-shadow: 0 0 0 3px rgba(4,120,87,0.10); }

  /* Premium hero · emerald-tinted card that holds the product line-up + a curiosity stat · curated, single image of products with floating chips */
  .hero-card {
    position: relative;
    overflow: hidden;
    background: linear-gradient(165deg, #022C22 0%, #047857 38%, #059669 72%, #10B981 100%);
    border-radius: 0 0 28px 28px;
    padding: 16px 20px 22px;
    box-shadow: 0 12px 30px -12px rgba(4,120,87,0.5);
  }
  /* Soft glow blobs to give the band depth · pure CSS so nothing loads from network */
  .hero-card::before {
    content: ""; position: absolute; pointer-events: none;
    top: -30px; right: -30px; width: 200px; height: 200px; border-radius: 50%;
    background: radial-gradient(circle, rgba(251,191,36,0.35) 0%, transparent 65%);
  }
  .hero-card::after {
    content: ""; position: absolute; pointer-events: none;
    bottom: -40px; left: -40px; width: 180px; height: 180px; border-radius: 50%;
    background: radial-gradient(circle, rgba(16,185,129,0.6) 0%, transparent 70%);
  }
  /* Product line-up · three transparent bottles overlaid · subtle drop-shadow so they sit on the gradient cleanly */
  .hero-row {
    display: flex; align-items: flex-end; justify-content: center;
    height: 130px; position: relative; z-index: 2; margin-top: 8px;
  }
  .hero-row img {
    height: 130px; object-fit: contain;
    filter: drop-shadow(0 14px 24px rgba(0,0,0,0.45));
    transition: transform .6s cubic-bezier(.34,1.56,.64,1);
  }
  .hero-row img:nth-child(1) { transform: translateY(8px) rotate(-6deg); margin-right: -18px; height: 118px; }
  .hero-row img:nth-child(2) { z-index: 3; height: 140px; }
  .hero-row img:nth-child(3) { transform: translateY(8px) rotate(6deg); margin-left: -18px; height: 118px; }

  .hero-tagline { position: relative; z-index: 2; text-align: center; }

  /* Single prominent farmer-count stat callout · centred white pill with a coloured icon · replaces the pair of small chips, reads as a confident social-proof anchor */
  .hero-stat {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 14px 8px 8px; border-radius: 9999px;
    background: rgba(255,255,255,0.96);
    border: 1px solid rgba(255,255,255,0.7);
    box-shadow: 0 6px 18px -6px rgba(4,120,87,0.4);
  }
  .hero-stat-ic {
    width: 26px; height: 26px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg,#047857 0%,#10B981 100%);
    color: #FFFFFF; flex-shrink: 0;
  }
  .hero-stat-ic i { font-size: 11px; }
  .hero-stat-text { font-size: 12.5px; color: #064E3B; font-weight: 700; }
  .hero-stat-text b { font-weight: 900; color: #047857; }
</style>
</head>
<body class="min-h-screen pb-28 relative">

  <!-- Status bar · white text since the hero band sits at the very top -->
  <div class="flex items-center justify-between px-6 pt-3 text-[11px] font-bold" style="color:#FFFFFF;position:absolute;top:0;left:0;right:0;z-index:5">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#FFFFFF" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#FFFFFF"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#FFFFFF"/></svg>
    </div>
  </div>

  <!-- Premium hero · subtle KKD logo top-left (brand cue without shouting) · curated product line-up · curiosity tagline · one prominent farmer-count stat callout -->
  <section class="hero-card" style="padding-top:48px">
    <!-- Back · sits over the gradient, white-tinted -->
    <button onclick="history.back()" class="w-10 h-10 rounded-full flex items-center justify-center" style="background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.3);backdrop-filter:blur(6px);position:absolute;top:36px;left:16px;z-index:4" aria-label="Back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>

    <!-- Subtle KKD brand mark · small white tile, top-right · brand cue without dominating -->
    <div style="position:absolute;top:36px;right:16px;z-index:4">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:#FFFFFF;box-shadow:0 6px 14px rgba(4,120,87,0.25)">
        <img src="../assets/kkd-logo.png" alt="KKD" class="w-8 h-8 object-contain" onerror="this.style.display='none'"/>
      </div>
    </div>

    <!-- Product line-up · three bottles, slightly fanned, soft drop-shadow -->
    <div class="hero-row">
      <img src="../assets/Humic_nobg.png" alt=""/>
      <img src="../assets/Chakrawarti_nobg.png" alt=""/>
      <img src="../assets/AntiVirus_nobg.png" alt=""/>
    </div>

    <!-- Curiosity tagline + single prominent farmer-count stat (replaces the pair of small trust chips) -->
    <div class="hero-tagline" style="margin-top:10px">
      <div class="text-[18px] font-extrabold leading-tight" style="color:#FFFFFF">Save up to <span style="color:#FBBF24">40%</span> on every spray</div>
      <div class="hi text-[12.5px] mt-1" style="color:rgba(255,255,255,0.85)">सीधा फैक्ट्री से &middot; Direct from factory, no middleman</div>
      <div class="hero-stat" style="margin-top:14px">
        <span class="hero-stat-ic"><i class="fa-solid fa-users"></i></span>
        <span class="hero-stat-text"><b>10+ लाख</b> farmers already trust KKD</span>
      </div>
    </div>
  </section>

  <!-- Heading · English only · no Hindi duplicate -->
  <div class="px-6 mt-7">
    <h1 class="text-[24px] font-extrabold leading-tight text-[#0F172A]">Enter your mobile number</h1>
    <p class="text-[13.5px] text-[#64748B] mt-1.5">We'll send a one-time code to verify it's you.</p>
  </div>

  <!-- Input · neutral E5E7EB border, clean placeholder · no label, no auto-fetch pill -->
  <div class="px-6 mt-5">
    <div class="num-input flex items-center gap-3 h-[58px] px-4 rounded-lg border-2 border-[#E5E7EB] bg-white">
      <span class="text-[17px] font-bold text-[#0F172A]">+91</span>
      <span class="w-px h-7 bg-[#E5E7EB]"></span>
      <input type="tel" maxlength="10" placeholder="Mobile number" class="flex-1 min-w-0 outline-none text-[17px] font-semibold tnum bg-transparent placeholder:font-medium placeholder:text-[#94A3B8]"/>
    </div>
  </div>

  <!-- Terms -->
  <div class="px-6 mt-5 text-center">
    <p class="text-[11.5px] text-[#94A3B8] leading-relaxed">By continuing you agree to our <span class="font-bold" style="color:#047857">Terms</span> &amp; <span class="font-bold" style="color:#047857">Privacy Policy</span></p>
  </div>

  <!-- Sticky CTA · matches design-system primary spec (52px, 12px radius, 15px font-extrabold, soft emerald glow) -->
  <div class="fixed bottom-0 left-0 right-0 bg-white px-6 py-4" style="border-top:0">
    <button onclick="location.href='otp.html'" class="w-full h-[52px] rounded-[12px] text-white text-[15px] font-extrabold flex items-center justify-center gap-2" style="background:#059669;box-shadow:0 8px 20px -6px rgba(5,150,105,0.45)">
      Send OTP
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    </button>
  </div>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</body>
</html>
