<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>KKD · Mobile</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Outfit:wght@900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .wordmark { font-family: 'Outfit', sans-serif; font-style: italic; font-weight: 900; letter-spacing: -0.04em; }
  html, body { margin: 0; padding: 0; }
  body { min-height: 100vh; background: #FFFFFF; color: #0F172A; }
  .tnum { font-variant-numeric: tabular-nums; letter-spacing: 0.05em; }
  .num-input { transition: border-color .15s ease, box-shadow .15s ease; }
  .num-input:focus-within { border-color: #047857; box-shadow: 0 0 0 3px rgba(4,120,87,0.10); }
</style>
</head>
<body class="min-h-screen pb-32 relative">

  <!-- Status bar -->
  <div class="flex items-center justify-between px-6 pt-3 text-[11px] font-bold text-[#0F172A]">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#0F172A" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#0F172A"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#0F172A"/></svg>
    </div>
  </div>

  <!-- Top bar · back + minimal KKD brand wordmark · no hero image -->
  <div class="px-6 pt-4 flex items-center justify-between">
    <button onclick="history.back()" class="w-10 h-10 rounded-full border border-[#E5E7EB] flex items-center justify-center bg-white" aria-label="Back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <div class="wordmark text-[16px]" style="color:#047857">Katyayani</div>
    <div class="w-10"></div>
  </div>

  <!-- Heading · English only · no Hindi duplicate -->
  <div class="px-6 mt-10">
    <h1 class="text-[26px] font-extrabold leading-tight text-[#0F172A]">Enter your mobile number</h1>
    <p class="text-[13.5px] text-[#64748B] mt-1.5">We'll send a one-time code to verify it's you.</p>
  </div>

  <!-- Input · no label above, no auto-fetch pill · clean +91 prefix + 10-digit input -->
  <div class="px-6 mt-8">
    <div class="num-input flex items-center gap-3 h-[60px] px-4 rounded-lg border-2 border-[#E5E7EB] bg-white">
      <span class="text-[18px] font-bold text-[#0F172A]">+91</span>
      <span class="w-px h-7 bg-[#E5E7EB]"></span>
      <input type="tel" maxlength="10" placeholder="98765 43210" class="flex-1 outline-none text-[22px] font-bold tnum bg-transparent placeholder:font-medium placeholder:text-[#CBD5E1]"/>
    </div>
  </div>

  <!-- Terms · single small line -->
  <div class="px-6 mt-7 text-center">
    <p class="text-[11.5px] text-[#94A3B8] leading-relaxed">By continuing you agree to our <span class="font-bold" style="color:#047857">Terms</span> &amp; <span class="font-bold" style="color:#047857">Privacy Policy</span></p>
  </div>

  <!-- Sticky CTA · English only -->
  <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-[#F1F5F9] px-6 py-4">
    <button onclick="location.href='otp.html'" class="w-full h-[54px] rounded-lg text-white text-[16px] font-extrabold flex items-center justify-center gap-2" style="background:#059669;box-shadow:0 8px 20px -6px rgba(5,150,105,0.45)">
      Send OTP
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    </button>
  </div>

</body>
</html>
