<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/><title>KKD · Sign out</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  *{font-family:'Poppins',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  html,body{margin:0;padding:0;height:100vh}
  body{background:rgba(15,23,42,0.55);color:#0F172A;display:flex;align-items:flex-end}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .sheet{animation:slideUp .3s cubic-bezier(.4,0,.2,1) both}
</style></head>
<body class="min-h-screen">

  <!-- Simple confirmation sheet · just asks for confirmation, no other warnings -->
  <div class="sheet w-full bg-white rounded-t-[24px] px-5 pt-3 pb-6" style="box-shadow:0 -8px 32px rgba(0,0,0,0.18)">
    <div class="mx-auto w-10 h-1 rounded-full bg-[#E2E8F0] mb-5"></div>

    <div class="w-14 h-14 mx-auto rounded-full flex items-center justify-center mb-3" style="background:#FEE2E2;border:1.5px solid #FECACA">
      <i class="fa-solid fa-right-from-bracket text-[22px]" style="color:#DC2626"></i>
    </div>

    <div class="text-[20px] font-extrabold text-center leading-tight" style="color:#0F172A">Sign out?</div>
    <p class="text-[13px] text-center mt-1.5" style="color:#64748B">You can sign back in with the same number any time.</p>

    <button onclick="location.href='splash.html'" class="w-full mt-6 h-[52px] rounded-[12px] text-[15px] font-extrabold" style="background:#DC2626;color:#FFFFFF;border:0">Yes, sign out</button>
    <button onclick="history.back()" class="w-full mt-2.5 h-[52px] rounded-[12px] text-[15px] font-bold" style="background:#FFFFFF;border:1.5px solid #E5E7EB;color:#0F172A">Cancel</button>
  </div>

</body></html>
