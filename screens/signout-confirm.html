<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/><title>KKD · Sign out</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>*{font-family:'Poppins',system-ui,sans-serif;-webkit-font-smoothing:antialiased}.hi{font-family:'Noto Sans Devanagari',sans-serif}html,body{margin:0;padding:0;height:100vh}body{background:rgba(0,0,0,0.5);color:#0F172A;display:flex;align-items:flex-end}@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}.sheet{animation:slideUp .3s cubic-bezier(.4,0,.2,1)}</style></head>
<body class="min-h-screen">

<div class="sheet w-full bg-white rounded-t-[24px] p-5 pb-7">
  <div class="mx-auto w-10 h-1 rounded-full bg-[#E8E3D6] mb-5"></div>

  <div class="w-14 h-14 mx-auto rounded-full bg-[#FFE3DC] flex items-center justify-center mb-4">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#E23744" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
  </div>

  <div class="hi text-[22px] font-extrabold text-center leading-tight">Sign out karें?</div>
  <p class="text-[13px] text-[#64748B] text-center mt-2 leading-relaxed">Aapke cart (3 items) aur saved address dobara login karne par milenge.</p>

  <div class="mt-5 bg-[#FEF3C7] border border-[#FBBF24]/30 rounded-lg p-3 flex items-start gap-2">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#78350F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="flex-shrink-0 mt-0.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
    <div class="text-[11.5px] text-[#78350F] leading-snug"><strong>120 coins</strong> aur <strong>2 in-transit orders</strong> safe rahenge — same number se wapas login karein.</div>
  </div>

  <button onclick="location.href='home-loggedout.html'" class="w-full mt-5 h-[52px] rounded-lg bg-[#E23744] text-white text-[15px] font-extrabold">Yes, sign out</button>
  <button onclick="history.back()" class="w-full mt-2.5 h-[52px] rounded-lg bg-white border border-[#EEE5D8] text-[#0F172A] text-[15px] font-extrabold">Cancel</button>
</div>

</body></html>
