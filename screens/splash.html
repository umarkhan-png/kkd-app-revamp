<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>KKD · Splash</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800;900&family=Noto+Sans+Devanagari:wght@600;700;800&family=Outfit:wght@900&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Poppins', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .hi { font-family: 'Noto Sans Devanagari', sans-serif; }
  .wordmark { font-family: 'Outfit', sans-serif; font-style: italic; font-weight: 900; letter-spacing: -0.04em; }
  html, body { margin: 0; padding: 0; }
  /* Premium minimal background · soft warm white at top → faint emerald wash at bottom · single subtle vignette anchors the centre · no busy elements */
  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse 110% 70% at 50% 35%, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 65%),
      linear-gradient(180deg, #FAF7F2 0%, #F5F1E8 40%, #ECFDF5 100%);
    color: #064E3B;
    overflow: hidden;
    position: relative;
  }

  /* Subtle decorative element · a single thin emerald arc at the very bottom · reads as a ground line, no field illustration clutter */
  .ground-arc {
    position: absolute; left: 0; right: 0; bottom: 0; height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(4,120,87,0.18) 25%, rgba(4,120,87,0.32) 50%, rgba(4,120,87,0.18) 75%, transparent 100%);
  }

  /* Logo card · refined · single soft shadow + a hairline emerald ring · gentle breath, not a heartbeat */
  @keyframes softBreath {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.018); }
  }
  .logo-card {
    width: 116px; height: 116px;
    border-radius: 28px;
    background: #FFFFFF;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 24px 60px -20px rgba(4,120,87,0.22), 0 6px 18px -6px rgba(15,23,42,0.06);
    position: relative;
    animation: softBreath 4s ease-in-out infinite;
  }
  .logo-card::after {
    content: ""; position: absolute; inset: -1px;
    border-radius: 29px;
    border: 1px solid rgba(4,120,87,0.10);
    pointer-events: none;
  }

  /* Typography fade-in · staggered, slow, premium · no bounce */
  @keyframes fadeRise {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-1 { animation: fadeRise 1s ease-out .2s both; }
  .fade-2 { animation: fadeRise 1s ease-out .65s both; }
  .fade-3 { animation: fadeRise 1s ease-out 1.05s both; }

  /* Progress · minimal dot-trio at the bottom · loop softly · no caption underneath */
  @keyframes dotPulse {
    0%, 100% { transform: scale(.7); opacity: .35; }
    50%      { transform: scale(1);  opacity: 1; }
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #047857; animation: dotPulse 1.4s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
</style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen relative">

  <!-- Centred logo + minimal wordmark · just three elements · everything else stripped per premium spec -->
  <div class="flex flex-col items-center" style="margin-top:-40px">
    <div class="logo-card fade-1">
      <img src="https://www.katyayaniorganics.com/wp-content/uploads/2022/06/cropped-logo-3.webp" alt="Katyayani" style="width:86px;height:86px;object-fit:contain" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
      <div style="display:none;width:86px;height:86px;border-radius:18px;align-items:center;justify-content:center;font-weight:900;color:#FFFFFF;font-size:42px;background:linear-gradient(135deg,#047857 0%,#10B981 100%)">K</div>
    </div>

    <!-- Wordmark · single line · refined italic Outfit -->
    <div class="wordmark fade-2" style="font-size:42px;line-height:1;margin-top:30px;color:#064E3B">Katyayani</div>

    <!-- Subtle Hindi tagline · one line only, no English duplicate -->
    <div class="hi fade-3" style="font-size:14px;font-weight:700;margin-top:10px;color:#047857;letter-spacing:0.02em">कृषि डायरेक्ट</div>
  </div>

  <!-- Loading indicator · three breathing dots, no progress bar, no copy -->
  <div class="absolute flex items-center gap-2 fade-3" style="bottom:64px;left:50%;transform:translateX(-50%)">
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
  </div>

  <!-- Ground line · single hairline accent at the very bottom -->
  <div class="ground-arc"></div>

  <!-- Auto-advance -->
  <script>setTimeout(()=>{ window.location.href='language.html'; }, 2500);</script>
</body>
</html>
