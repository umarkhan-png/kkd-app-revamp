<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>KKD · Splash</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800;900&family=Noto+Sans+Devanagari:wght@600;700;800&family=Outfit:wght@900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .hi { font-family: 'Noto Sans Devanagari', sans-serif; }
  .wordmark { font-family: 'Outfit', sans-serif; font-style: italic; font-weight: 900; letter-spacing: -0.04em; }
  html, body { margin: 0; padding: 0; overflow: hidden; }
  /* Deep-emerald app background (matches the Partner-app splash mood) */
  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse 90% 55% at 50% 22%, rgba(251,191,36,0.16) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 32%, #0B5138 0%, #083D28 38%, #052A1C 72%, #021710 100%);
    color: #FFFFFF; position: relative;
  }
  /* Subtle dot field + corner glows */
  .dots { position:absolute; inset:0; pointer-events:none; opacity:.06; background-image:radial-gradient(#fff 1.2px,transparent 1.2px); background-size:26px 26px; }
  .glow { position:absolute; inset:0; pointer-events:none; background-image:radial-gradient(circle at 18% 18%, rgba(255,255,255,0.06) 0, transparent 42%), radial-gradient(circle at 82% 82%, rgba(251,191,36,0.10) 0, transparent 42%); }

  @keyframes softBreath { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }
  .logo-card {
    width: 128px; height: 128px; border-radius: 30px; background: #FFFFFF;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 24px 60px -14px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06), 0 0 40px rgba(16,185,129,0.25);
    position: relative; animation: softBreath 4s ease-in-out infinite;
  }
  .logo-card::after { content:""; position:absolute; inset:-4px; border-radius:34px; border:2px solid rgba(251,191,36,0.5); pointer-events:none; }
  .logo-card img { width: 92px; height: 92px; object-fit: contain; }

  @keyframes fadeRise { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
  .fade-1 { animation: fadeRise 1s ease-out .15s both; }
  .fade-2 { animation: fadeRise 1s ease-out .5s both; }
  .fade-3 { animation: fadeRise 1s ease-out .85s both; }
  .fade-4 { animation: fadeRise 1s ease-out 1.2s both; }

  .trust-line {
    display:inline-flex; align-items:center; gap:8px; padding:8px 16px; border-radius:9999px;
    background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.22);
    color:#FFFFFF; font-size:11.5px; font-weight:800; backdrop-filter:blur(6px);
  }
  .trust-line i { font-size:11px; color:#FBBF24; }

  .progress-bar { height:3px; background:rgba(255,255,255,0.14); border-radius:999px; overflow:hidden; }
  .progress-fill { height:100%; border-radius:999px; background:linear-gradient(90deg,#10B981 0%,#34D399 50%,#FBBF24 100%); animation: fillIt 2.4s linear forwards; }
  @keyframes fillIt { from { width:0; } to { width:100%; } }
</style>
</head>
<body class="flex flex-col items-center justify-between min-h-screen relative">

  <div class="dots"></div>
  <div class="glow"></div>

  <!-- Status bar -->
  <div class="absolute top-0 left-0 right-0 flex items-center justify-between px-6 pt-3 text-[11px] font-bold" style="color:#FFFFFF">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#FFFFFF" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#FFFFFF"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#FFFFFF"/></svg>
    </div>
  </div>

  <div class="h-20"></div>

  <!-- Logo only · white KKD mark on the emerald background (no white card, no text) -->
  <div class="relative z-10 flex flex-col items-center">
    <img src="../assets/kd-logo-white.png" class="fade-1" style="width:172px;height:auto;filter:drop-shadow(0 8px 24px rgba(0,0,0,0.25))" alt="KKD"/>
  </div>

  <!-- Spacer (progress-bar loader removed) -->
  <div class="h-20"></div>

  <script>setTimeout(()=>{ window.location.href='language.html'; }, 2500);</script>
</body>
</html>
