<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>KKD · Splash</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800;900&family=Noto+Sans+Devanagari:wght@600;700;800&family=Outfit:wght@900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .hi { font-family: 'Noto Sans Devanagari', sans-serif; }
  .wordmark { font-family: 'Outfit', sans-serif; font-style: italic; font-weight: 900; letter-spacing: -0.04em; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at center, #094030 0%, #083D28 25%, #062A1B 55%, #042118 80%, #021710 100%);
    color: #fff;
    overflow: hidden;
  }
  .status-bar { color: #fff; }
  .logo-glow { box-shadow: 0 0 80px rgba(212,165,55,0.25), 0 0 40px rgba(14,122,78,0.4); }
  @keyframes pulseGlow { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.04); opacity: 0.92; } }
  .pulse { animation: pulseGlow 2.2s ease-in-out infinite; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fade-1 { animation: fadeUp .8s ease-out .3s both; }
  .fade-2 { animation: fadeUp .8s ease-out .7s both; }
  .fade-3 { animation: fadeUp .8s ease-out 1.1s both; }
  .progress-bar { height: 3px; background: rgba(255,255,255,0.1); border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg,#D4A537,#0E7A4E); border-radius: 999px; animation: fillIt 2.5s linear forwards; }
  @keyframes fillIt { from { width: 0; } to { width: 100%; } }
</style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen relative">

  <!-- Status bar -->
  <div class="status-bar absolute top-0 left-0 right-0 flex items-center justify-between px-6 pt-3 text-[11px] font-bold">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#fff" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#fff"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#fff"/></svg>
    </div>
  </div>

  <!-- Logo -->
  <div class="relative pulse fade-1">
    <div class="w-[120px] h-[120px] rounded-[28px] bg-white flex items-center justify-center logo-glow">
      <img src="https://www.katyayaniorganics.com/wp-content/uploads/2022/06/cropped-logo-3.webp" alt="Katyayani" class="w-[90px] h-[90px] object-contain" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
      <div class="hidden w-[90px] h-[90px] rounded-[20px] items-center justify-center font-extrabold text-white text-[44px]" style="background:linear-gradient(135deg,#0E7A4E 0%,#D4A537 100%)">K</div>
    </div>
  </div>

  <!-- Wordmark -->
  <div class="text-center mt-7 fade-2">
    <div class="wordmark text-[36px] leading-none">Katyayani</div>
    <div class="hi text-[17px] font-bold text-white/90 mt-2 tracking-wide">कृषि डायरेक्ट</div>
    <div class="text-[10px] uppercase tracking-[0.3em] text-[#D4A537] font-bold mt-2">Direct from Factory</div>
  </div>

  <!-- Trust strip -->
  <div class="fade-3 mt-10 flex items-center gap-2">
    <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-[10px] font-bold bg-white/10 backdrop-blur border border-white/15">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#D4A537" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 4v6c0 5-3.5 9.5-8 10-4.5-.5-8-5-8-10V6l8-4z"/></svg>
      <span class="text-white">CIB-CR Licensed</span>
    </span>
    <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-[10px] font-bold bg-white/10 backdrop-blur border border-white/15">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#D4A537" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 12l3 3 5-5"/></svg>
      <span class="text-white">Lab Tested</span>
    </span>
  </div>

  <!-- Progress -->
  <div class="absolute bottom-14 left-10 right-10">
    <div class="progress-bar mb-3">
      <div class="progress-fill"></div>
    </div>
    <div class="text-center hi text-[12px] text-white/70">किसान का अपना ऐप</div>
  </div>

  <!-- Auto-advance -->
  <script>setTimeout(()=>{ window.location.href='language.html'; }, 2500);</script>
</body>
</html>
