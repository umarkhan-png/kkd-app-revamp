<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/><title>KKD · Voice Search</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>*{font-family:'Poppins',system-ui,sans-serif;-webkit-font-smoothing:antialiased}.hi{font-family:'Noto Sans Devanagari',sans-serif}html,body{margin:0;padding:0}body{min-height:100vh;background:#000;color:#fff;overflow:hidden}.tnum{font-variant-numeric:tabular-nums}@keyframes wave{0%,100%{transform:scaleY(0.4)}50%{transform:scaleY(1)}}.bar{display:inline-block;width:4px;height:48px;margin:0 2px;background:#F4A93C;border-radius:2px;transform-origin:bottom;animation:wave 1.1s ease-in-out infinite}.bar:nth-child(1){animation-delay:0s;height:24px}.bar:nth-child(2){animation-delay:.1s;height:48px}.bar:nth-child(3){animation-delay:.2s;height:64px}.bar:nth-child(4){animation-delay:.15s;height:38px}.bar:nth-child(5){animation-delay:.05s;height:54px}.bar:nth-child(6){animation-delay:.25s;height:32px}.bar:nth-child(7){animation-delay:.1s;height:48px}.bar:nth-child(8){animation-delay:0s;height:28px}@keyframes ring{0%{transform:scale(1);opacity:1}100%{transform:scale(1.6);opacity:0}}.ring{position:absolute;inset:0;border:2px solid #F4A93C;border-radius:999px;animation:ring 1.8s ease-out infinite}.ring:nth-child(2){animation-delay:.6s}.ring:nth-child(3){animation-delay:1.2s}</style></head>
<body class="min-h-screen relative">

<!-- Status bar -->
<div class="flex items-center justify-between px-4 pt-3 text-[11px] font-bold text-white"><span>9:41</span><div class="flex items-center gap-1.5"><svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#fff" stroke-width="2.5"/></svg><svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#fff" stroke-width="2"/></svg><svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#fff" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#fff"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#fff"/></svg></div></div>

<!-- Close -->
<div class="flex items-center justify-between px-4 mt-3">
  <button onclick="history.back()" class="w-10 h-10 rounded-full bg-white/10 backdrop-blur flex items-center justify-center"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6l-12 12"/></svg></button>
  <button class="h-9 px-3 rounded-full bg-white/10 backdrop-blur text-[11px] font-bold">हिंदी ▾</button>
</div>

<!-- Listening label -->
<div class="text-center mt-12">
  <div class="text-[11px] font-bold uppercase tracking-[0.3em] text-[#F4A93C]">Listening…</div>
  <div class="hi text-[26px] font-extrabold mt-3 leading-tight">मेरी मिर्च में पीला रोग…</div>
</div>

<!-- Mic + waveform -->
<div class="flex flex-col items-center mt-16">
  <div class="relative w-[140px] h-[140px] flex items-center justify-center">
    <div class="ring"></div><div class="ring"></div><div class="ring"></div>
    <div class="w-[120px] h-[120px] rounded-full flex items-center justify-center relative" style="background:linear-gradient(135deg,#F4A93C 0%,#047857 100%)">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v4"/></svg>
    </div>
  </div>
  <div class="mt-8 h-[64px] flex items-center"><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
</div>

<!-- Hint -->
<div class="px-6 mt-12 text-center">
  <div class="hi text-[12px] text-white/60 leading-relaxed">कोशिश करें · Try saying:</div>
  <div class="mt-3 space-y-2">
    <div class="hi text-[13px] text-white/85">"मिर्च के लिए दवा"</div>
    <div class="hi text-[13px] text-white/85">"NPK 19-19-19 खरीदना है"</div>
    <div class="hi text-[13px] text-white/85">"टमाटर में फंगस"</div>
  </div>
</div>

<!-- Bottom action -->
<div class="absolute bottom-6 left-0 right-0 px-6">
  <button onclick="location.href='shop.html'" class="w-full h-12 rounded-full bg-white text-[#0F172A] text-[14px] font-extrabold">Tap to Stop</button>
</div>

</body></html>
