<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/><title>KKD · Wallet</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  *{font-family:'Poppins',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  html,body{margin:0;padding:0;overflow-x:hidden}
  body{min-height:100vh;background:#F8F8F8;color:#0F172A;padding-bottom:30px}
  .tnum{font-variant-numeric:tabular-nums}
  .sec-title{margin:18px 16px 8px;font-size:11.5px;font-weight:800;color:#64748B;text-transform:uppercase;letter-spacing:0.06em}

  /* Balance hero · available balance + lifetime received */
  .wallet-hero{margin:6px 16px 0;border-radius:18px;padding:20px;color:#FFFFFF;background:linear-gradient(135deg,#0F172A 0%,#1E293B 55%,#334155 120%);position:relative;overflow:hidden;box-shadow:0 14px 30px -14px rgba(15,23,42,0.5)}
  .wallet-hero::before{content:"";position:absolute;top:-30px;right:-30px;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(16,185,129,0.3) 0%,transparent 65%)}
  .wallet-hero .lbl{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:rgba(255,255,255,0.7)}
  .wallet-hero .bal{font-size:36px;font-weight:900;line-height:1.05;margin-top:4px}
  .wallet-hero .recv{margin-top:14px;display:inline-flex;align-items:center;gap:8px;padding:7px 13px;border-radius:11px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);font-size:12px;font-weight:700;color:rgba(255,255,255,0.9)}
  .wallet-hero .recv b{color:#34D399;font-variant-numeric:tabular-nums}
  .wallet-hero .recv i{color:#34D399;font-size:12px}

  .card{margin:0 16px;background:#FFFFFF;border:1px solid #E5E7EB;border-radius:14px;box-shadow:0 1px 3px rgba(15,23,42,0.04);overflow:hidden}
  .txn{display:flex;align-items:center;gap:12px;padding:13px 14px;border-bottom:1px solid #F1F5F9;width:100%;background:transparent;border-left:0;border-right:0;border-top:0;cursor:pointer;text-align:left}
  .txn:last-child{border-bottom:0}
  .txn:active{background:#F8FAFC}
  .txn .ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;background:#EFF6FF;color:#2563EB}
  .txn .body{flex:1;min-width:0;line-height:1.3}
  .txn .a{font-size:13.5px;font-weight:800;color:#0F172A;font-variant-numeric:tabular-nums}
  .txn .b{font-size:11px;color:#94A3B8;margin-top:1px}
  .txn .amt{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;color:#047857;flex-shrink:0}
  .txn .chev{font-size:11px;color:#94A3B8;flex-shrink:0;margin-left:2px}

  /* Refund detail sheet */
  .modal-bd{position:fixed;inset:0;background:rgba(15,23,42,0.55);opacity:0;pointer-events:none;transition:opacity .25s ease;z-index:80}
  .modal-bd.open{opacity:1;pointer-events:auto}
  .modal-sheet{position:fixed;left:0;right:0;bottom:0;background:#fff;border-radius:24px 24px 0 0;box-shadow:0 -8px 32px rgba(0,0,0,0.18);transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);z-index:90;padding:0 0 22px;max-height:88vh;display:flex;flex-direction:column}
  .modal-sheet.open{transform:translateY(0)}
  .rd-prod{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid #F1F5F9}
  .rd-prod:last-child{border-bottom:0}
  .rd-img{width:44px;height:44px;border-radius:10px;background:#F8FAFC;border:1px solid #E5E7EB;display:flex;align-items:center;justify-content:center;padding:5px;flex-shrink:0}
  .rd-img img{max-width:100%;max-height:100%;object-fit:contain;mix-blend-mode:multiply}
  .rd-prod .pn{font-size:13.5px;font-weight:700;color:#0F172A;line-height:1.2}
  .rd-prod .pq{font-size:11px;color:#94A3B8;margin-top:1px}
  .rd-prod .pr{font-size:14px;font-weight:800;color:#0F172A;font-variant-numeric:tabular-nums;flex-shrink:0}
  .rd-row{display:flex;align-items:center;justify-content:space-between;font-size:13px;padding:4px 0}
  .rd-row .l{color:#64748B}.rd-row .v{font-weight:700;color:#0F172A;font-variant-numeric:tabular-nums}
  .rd-row .v.neg{color:#DC2626}
  .rd-total{display:flex;align-items:center;justify-content:space-between;border-top:1px dashed #CBD5E1;margin-top:8px;padding-top:10px}
  .rd-total .l{font-size:14px;font-weight:800;color:#0F172A}
  .rd-total .v{font-size:16px;font-weight:900;color:#047857;font-variant-numeric:tabular-nums}
</style></head>
<body>

  <div class="flex items-center justify-between px-4 pt-3 text-[11px] font-bold">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#0F172A" stroke-width="2.5"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#0F172A" stroke-width="2"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#0F172A" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#0F172A"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#0F172A"/></svg>
    </div>
  </div>

  <div class="px-4 pt-4 pb-3 flex items-center gap-3 bg-white">
    <button onclick="if(history.length>1){history.back()}else{location.href='account.html'}" class="w-10 h-10 rounded-full flex items-center justify-center" style="background:#FFFFFF;border:1px solid #E5E7EB">
      <i class="fa-solid fa-arrow-left text-[14px]" style="color:#0F172A"></i>
    </button>
    <h1 class="flex-1 text-[22px] font-extrabold leading-tight" style="color:#0F172A">Wallet</h1>
  </div>

  <!-- Balance hero · available + total received -->
  <div class="wallet-hero">
    <div class="lbl"><i class="fa-solid fa-wallet"></i> Available balance</div>
    <div class="bal tnum">₹540</div>
    <div class="recv"><i class="fa-solid fa-arrow-down-long"></i> Total received till date · <b>₹3,180</b></div>
  </div>

  <!-- Refunds · only refund transactions · tile shows the order ID; tap for the breakdown -->
  <div class="sec-title">Refunds</div>
  <div class="card" id="refundList"></div>

  <!-- Refund detail sheet -->
  <div id="rdBd" class="modal-bd"></div>
  <div id="rdSheet" class="modal-sheet">
    <div style="width:40px;height:4px;border-radius:9999px;background:#E2E8F0;margin:10px auto 0;flex-shrink:0"></div>
    <div class="px-5 pt-3 pb-2 flex items-center justify-between" style="flex-shrink:0">
      <div class="leading-tight">
        <div class="text-[18px] font-extrabold text-[#0F172A]">Refund details</div>
        <div class="text-[11.5px] font-semibold" style="color:#64748B" id="rdOrder">Order #—</div>
      </div>
      <button id="rdClose" class="w-9 h-9 rounded-full flex items-center justify-center" style="background:#F1F5F9;border:0"><i class="fa-solid fa-xmark text-[13px]" style="color:#475569"></i></button>
    </div>
    <div class="px-5 pb-5 overflow-y-auto" style="flex:1">
      <div class="text-[11px] font-extrabold uppercase tracking-wider mb-1" style="color:#64748B">Returned items</div>
      <div id="rdProds"></div>
      <div class="mt-4" id="rdSummary"></div>
    </div>
  </div>

  <script>
    const REFUNDS = [
      { id:'KAT-2026-05-1284', date:'Today · 11:20 AM', items:[
          { name:'NPK 19-19-19', qty:1, refund:330, img:'https://katyayanikrishidirect.com/cdn/shop/files/NPK_19-19-19_Front.webp' }
        ], penalty:0 },
      { id:'KAT-2026-04-1198', date:'12 Apr · 3:40 PM', items:[
          { name:'Humic + Fulvic', qty:2, refund:552, img:'../assets/Humic_nobg.png' }
        ], penalty:40, penaltyNote:'Opened-pack restocking fee' },
      { id:'KAT-2026-04-1102', date:'5 Apr · 1:10 PM', items:[
          { name:'Bhumiraja', qty:1, refund:245, img:'https://katyayanikrishidirect.com/cdn/shop/files/Bhumiraja_2_1.webp' },
          { name:'Antivirus', qty:1, refund:160, img:'../assets/AntiVirus_nobg.png' }
        ], penalty:0 }
    ];
    function net(r){ return r.items.reduce((s,i) => s + i.refund, 0) - (r.penalty || 0); }

    const list = document.getElementById('refundList');
    list.innerHTML = REFUNDS.map((r, i) =>
      '<button class="txn" data-i="' + i + '">'
      + '<span class="ic"><i class="fa-solid fa-rotate-left"></i></span>'
      + '<div class="body"><div class="a">Order #' + r.id + '</div><div class="b">' + r.date + '</div></div>'
      + '<span class="amt">+ ₹' + net(r).toLocaleString('en-IN') + '</span>'
      + '<i class="fa-solid fa-chevron-right chev"></i></button>'
    ).join('');

    const bd = document.getElementById('rdBd'), sh = document.getElementById('rdSheet');
    function openDetail(r){
      document.getElementById('rdOrder').textContent = 'Order #' + r.id + ' · ' + r.date;
      document.getElementById('rdProds').innerHTML = r.items.map(it =>
        '<div class="rd-prod"><div class="rd-img"><img src="' + it.img + '"/></div>'
        + '<div class="flex-1 min-w-0"><div class="pn">' + it.name + '</div><div class="pq">Qty ' + it.qty + ' · refunded</div></div>'
        + '<div class="pr">₹' + it.refund.toLocaleString('en-IN') + '</div></div>'
      ).join('');
      const itemsTotal = r.items.reduce((s,i) => s + i.refund, 0);
      let html = '<div class="rd-row"><span class="l">Items refund</span><span class="v">₹' + itemsTotal.toLocaleString('en-IN') + '</span></div>';
      if (r.penalty > 0) html += '<div class="rd-row"><span class="l"><i class="fa-solid fa-circle-exclamation text-[10px]" style="color:#DC2626"></i> Penalty · ' + (r.penaltyNote || 'Deduction') + '</span><span class="v neg">− ₹' + r.penalty + '</span></div>';
      html += '<div class="rd-total"><span class="l">Refunded to wallet</span><span class="v">₹' + net(r).toLocaleString('en-IN') + '</span></div>';
      document.getElementById('rdSummary').innerHTML = html;
      bd.classList.add('open'); sh.classList.add('open');
    }
    function close(){ bd.classList.remove('open'); sh.classList.remove('open'); }
    list.querySelectorAll('.txn').forEach(b => b.addEventListener('click', () => openDetail(REFUNDS[+b.dataset.i])));
    document.getElementById('rdClose').addEventListener('click', close);
    bd.addEventListener('click', close);
  </script>
</body></html>
