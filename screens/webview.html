<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/><title>KKD · Web</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  *{font-family:'Poppins',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  html,body{margin:0;padding:0;overflow:hidden}
  body{display:flex;flex-direction:column;height:100vh;background:#FFFFFF;color:#0F172A}
  /* thin indeterminate loading bar under the top bar */
  .loadbar{height:2.5px;background:#E8F5EE;overflow:hidden;transition:opacity .3s ease}
  .loadbar::before{content:'';display:block;height:100%;width:40%;background:#258046;border-radius:2px;animation:slide 1.1s ease-in-out infinite}
  @keyframes slide{0%{margin-left:-40%}50%{margin-left:60%}100%{margin-left:110%}}
  iframe{flex:1;width:100%;border:0;background:#FFFFFF}
</style></head>
<body>

  <!-- status bar -->
  <div class="flex items-center justify-between px-4 pt-3 text-[11px] font-semibold flex-shrink-0">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#0F172A" stroke-width="2.5"/></svg>
      <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#0F172A" stroke-width="2"/></svg>
      <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#0F172A" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#0F172A"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#0F172A"/></svg>
    </div>
  </div>

  <!-- in-app browser top bar: back · title+host · open-external -->
  <div class="px-3 py-2.5 flex items-center gap-2.5 bg-white flex-shrink-0" style="border-bottom:1px solid #EEF2F6">
    <button onclick="if(history.length>1){history.back()}else{location.href='settings.html'}" class="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0" style="background:#FFFFFF;border:1px solid #E5E7EB">
      <i class="fa-solid fa-arrow-left text-[14px]" style="color:#0F172A"></i>
    </button>
    <div class="flex-1 min-w-0 leading-tight">
      <div id="pgTitle" class="text-[15px] font-semibold truncate" style="color:#0F172A">Web page</div>
      <div class="flex items-center gap-1 mt-0.5">
        <i class="fa-solid fa-lock text-[8px]" style="color:#94A3B8"></i>
        <span id="pgHost" class="text-[11px] font-semibold truncate" style="color:#94A3B8"></span>
      </div>
    </div>
    <button id="extBtn" class="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0" style="background:#F8FAFC;border:1px solid #E5E7EB" aria-label="Open in browser">
      <i class="fa-solid fa-arrow-up-right-from-square text-[12px]" style="color:#475569"></i>
    </button>
  </div>

  <div id="loadBar" class="loadbar flex-shrink-0"></div>

  <iframe id="frame" referrerpolicy="no-referrer-when-downgrade" allow="fullscreen"></iframe>

  <!-- fallback shown if the site refuses to be embedded -->
  <div id="fallback" class="flex-1 flex-col items-center justify-center text-center px-8" style="display:none">
    <div class="w-16 h-16 rounded-full flex items-center justify-center mb-4" style="background:#F1F5F9">
      <i class="fa-solid fa-globe text-[26px]" style="color:#94A3B8"></i>
    </div>
    <div class="text-[15px] font-semibold" style="color:#0F172A">Page can’t open inside the app</div>
    <p class="text-[12.5px] mt-1.5 leading-snug" style="color:#64748B">This website doesn’t allow embedding. Open it in your browser instead.</p>
    <button id="fbOpen" class="mt-5 h-11 px-6 rounded-lg text-white text-[13px] font-semibold" style="background:#258046">Open in browser</button>
  </div>

  <script>
    (function(){
      var p = new URLSearchParams(location.search);
      var url = p.get('url') || '';
      var title = p.get('title') || 'Web page';
      document.getElementById('pgTitle').textContent = title;
      document.title = 'KKD · ' + title;
      try { document.getElementById('pgHost').textContent = new URL(url).host.replace(/^www\./,''); } catch(e){}

      var frame = document.getElementById('frame');
      var bar = document.getElementById('loadBar');
      var fb = document.getElementById('fallback');
      var done = false;

      function openExt(){ if(url) window.open(url, '_blank', 'noopener'); }
      function showFallback(){ bar.style.opacity = '0'; frame.style.display = 'none'; fb.style.display = 'flex'; }

      document.getElementById('extBtn').addEventListener('click', openExt);
      document.getElementById('fbOpen').addEventListener('click', openExt);

      frame.addEventListener('load', function(){ done = true; bar.style.opacity = '0'; });
      frame.addEventListener('error', showFallback);
      // if nothing loaded within 8s, assume the site blocked embedding
      setTimeout(function(){ if(!done) showFallback(); }, 8000);

      if (url) { frame.src = url; } else { showFallback(); }
    })();
  </script>
</body></html>
