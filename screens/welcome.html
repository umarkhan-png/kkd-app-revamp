<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>KKD · Welcome</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .hi { font-family: 'Noto Sans Devanagari', sans-serif; }
  html, body { margin: 0; padding: 0; }
  body { min-height: 100vh; background: #fff; color: #1C1C1C; }
  .hero { background: linear-gradient(180deg, #021710 0%, #062A1B 40%, #083D28 80%, #0A4A30 100%); border-radius: 0 0 32px 32px; color: #fff; }
  .dot { width: 8px; height: 8px; border-radius: 999px; background: #EDEDED; }
  .dot.active { width: 24px; background: #0C831F; border-radius: 999px; }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  .floaty { animation: float 3s ease-in-out infinite; }
</style>
</head>
<body class="min-h-screen pb-32">

  <!-- Hero gradient block -->
  <div class="hero relative pt-3 pb-10">
    <!-- Status bar -->
    <div class="flex items-center justify-between px-6 text-[11px] font-bold text-white">
      <span>9:41</span>
      <div class="flex items-center gap-1.5">
        <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 16h2M6 13h2M10 10h2M14 7h2M18 4h2" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>
        <svg width="14" height="10" viewBox="0 0 24 18" fill="none"><path d="M2 9c5-7 15-7 20 0M6 12c3-4 9-4 12 0M10 15c1-2 3-2 4 0" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
        <svg width="20" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="20" height="11" rx="2" stroke="#fff" stroke-width="1.5"/><rect x="3" y="3" width="14" height="7" rx="1" fill="#fff"/><rect x="22" y="4" width="2" height="5" rx="1" fill="#fff"/></svg>
      </div>
    </div>

    <!-- Logo + brand -->
    <div class="flex flex-col items-center mt-6">
      <div class="w-[72px] h-[72px] rounded-[18px] bg-white flex items-center justify-center floaty">
        <img src="https://www.katyayaniorganics.com/wp-content/uploads/2022/06/cropped-logo-3.webp" alt="K" class="w-[56px] h-[56px] object-contain" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
        <div class="hidden w-[56px] h-[56px] rounded-[14px] items-center justify-center font-extrabold text-white text-[28px]" style="background:linear-gradient(135deg,#0E7A4E 0%,#D4A537 100%)">K</div>
      </div>
      <div class="text-[10px] uppercase tracking-[0.3em] text-[#D4A537] font-bold mt-4">Katyayani Krishi Direct</div>
      <h1 class="hi text-[28px] font-extrabold leading-tight text-center mt-2 px-8">किसान का अपना ऐप</h1>
      <p class="text-[13px] text-white/70 mt-1">Farmer's own app</p>
    </div>
  </div>

  <!-- 3 value cards -->
  <div class="px-6 -mt-4">
    <div class="space-y-3">

      <div class="bg-white border border-[#EDEDED] rounded-[10px] p-4 flex items-start gap-3 shadow-sm">
        <div class="w-12 h-12 rounded-[10px] bg-[#F0FDF5] flex-shrink-0 flex items-center justify-center">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0C831F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v10M9 6l3-4 3 4M5 11v9a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-9M2 11h20"/></svg>
        </div>
        <div class="flex-1">
          <div class="hi text-[16px] font-extrabold">बोल कर खोजें</div>
          <p class="text-[12px] text-[#606060] mt-0.5">Search by voice — Hindi me bolo, product mile</p>
        </div>
      </div>

      <div class="bg-white border border-[#EDEDED] rounded-[10px] p-4 flex items-start gap-3 shadow-sm">
        <div class="w-12 h-12 rounded-[10px] bg-[#FFF8E6] flex-shrink-0 flex items-center justify-center">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#8B6914" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="14" rx="2"/><circle cx="12" cy="13" r="4"/><path d="M9 6l2-3h2l2 3"/></svg>
        </div>
        <div class="flex-1">
          <div class="hi text-[16px] font-extrabold">फोटो से पहचानें</div>
          <p class="text-[12px] text-[#606060] mt-0.5">Photo of pest → diagnosis → exact medicine</p>
        </div>
      </div>

      <div class="bg-white border border-[#EDEDED] rounded-[10px] p-4 flex items-start gap-3 shadow-sm">
        <div class="w-12 h-12 rounded-[10px] bg-[#E8F2FB] flex-shrink-0 flex items-center justify-center">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#1565C0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21V8l9-5 9 5v13M9 21v-6h6v6M7 11h2M15 11h2"/></svg>
        </div>
        <div class="flex-1">
          <div class="hi text-[16px] font-extrabold">सीधे फैक्ट्री से</div>
          <p class="text-[12px] text-[#606060] mt-0.5">Direct from Katyayani factory — no middleman, no fake</p>
        </div>
      </div>

    </div>
  </div>

  <!-- Trust strip -->
  <div class="px-6 mt-6 flex items-center justify-center gap-2">
    <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-[10px] font-bold" style="background:#E8F2FB;color:#1565C0">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 4v6c0 5-3.5 9.5-8 10-4.5-.5-8-5-8-10V6l8-4z"/></svg>
      CIB-CR Licensed
    </span>
    <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-[10px] font-bold" style="background:#FFF8E6;color:#8B6914">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 12l3 3 5-5"/></svg>
      90,000+ farmers
    </span>
  </div>

  <!-- Pagination dots -->
  <div class="flex items-center justify-center gap-1.5 mt-8">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <!-- Sticky CTA -->
  <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-[#EDEDED] px-6 py-4">
    <button onclick="location.href='phone.html'" class="w-full h-[54px] rounded-[10px] bg-[#0C831F] text-white text-[16px] font-extrabold flex items-center justify-center gap-2">
      <span class="hi">शुरू करें</span>
      <span class="opacity-70">·</span>
      <span>Get Started</span>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    </button>
  </div>

</body>
</html>
