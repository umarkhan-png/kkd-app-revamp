<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>KKD · Screen Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #1a1a1a;
    min-height: 100vh;
    font-family: 'Poppins', system-ui, sans-serif;
    color: #fff;
    display: flex;
    flex-direction: column;
  }
  .topbar {
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid #0e0e0e;
    background: #0d0d0d;
  }
  .topbar a { color: #aaa; text-decoration: none; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }
  .topbar a:hover { color: #fff; }
  .topbar .sep { color: #444; }
  .topbar .label { color: #888; font-size: 12px; font-family: ui-monospace, monospace; }
  .nav-btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 6px 10px; border-radius: 6px;
    border: 1px solid #2a2a2a; color: #ccc;
    font-size: 11px; font-weight: 600;
    cursor: pointer; background: transparent;
    text-decoration: none;
  }
  .nav-btn:hover { background: #1f1f1f; color: #fff; border-color: #3a3a3a; }
  .nav-spacer { flex: 1; }
  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px 20px;
  }
  .phone {
    width: 390px;
    height: 858px;
    background: #000;
    border-radius: 44px;
    box-shadow:
      0 0 0 2px #2a2a2a,
      0 0 0 10px #0a0a0a,
      0 30px 80px rgba(0,0,0,0.6);
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }
  .phone::before {
    content: '';
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 10px;
    height: 10px;
    border-radius: 999px;
    background: #050505;
    box-shadow: inset 0 0 0 1px #1f1f1f;
    z-index: 30;
  }
  iframe {
    width: 100%; height: 100%;
    border: 0;
    display: block;
    background: #fff;
  }
  /* Hide scrollbars inside the phone preview while keeping scroll functional */
  iframe { scrollbar-width: none; -ms-overflow-style: none; }
  iframe::-webkit-scrollbar { display: none; width: 0; height: 0; }
  @media (max-width: 480px) {
    body { height: 100vh; height: 100dvh; }
    .topbar { padding: 8px 14px; flex-shrink: 0; }
    .topbar .sep, .topbar .label, .nav-spacer, .nav-btn { display: none; }
    .stage { padding: 0; align-items: stretch; flex: 1; min-height: 0; overflow: hidden; }
    .phone {
      width: 100%; height: 100%;
      border-radius: 0;
      box-shadow: none;
      flex-shrink: 0;
    }
    .phone::before { display: none; }
  }
  /* Loading screen · shown while a screen loads (slow network / navigation) */
  .vload {
    position: absolute; inset: 0; z-index: 50;
    background: #FFFFFF;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    opacity: 1; transition: opacity .35s ease;
  }
  .vload.hide { opacity: 0; pointer-events: none; }
  .vload-logo {
    width: 64px; height: 64px; border-radius: 18px;
    background: linear-gradient(135deg,#047857,#10B981);
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; box-shadow: 0 10px 24px -6px rgba(5,150,105,0.5);
    animation: vloadPulse 1.4s ease-in-out infinite;
  }
  @keyframes vloadPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.09)} }
  .vload-spin {
    width: 28px; height: 28px; border-radius: 50%;
    border: 3px solid #D1FAE5; border-top-color: #059669;
    animation: vspin .8s linear infinite;
  }
  @keyframes vspin { to { transform: rotate(360deg); } }
  .vload-txt { font-size: 13px; font-weight: 700; color: #0F172A; font-family: 'Poppins', system-ui, sans-serif; }
</style>
</head>
<body>

  <div class="topbar">
    <a href="index.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Gallery
    </a>
    <span class="sep">·</span>
    <span class="label" id="title">—</span>
    <div class="nav-spacer"></div>
    <button class="nav-btn" onclick="prevScreen()" title="Previous">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      Prev
    </button>
    <button class="nav-btn" onclick="nextScreen()" title="Next">
      Next
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>
    <button class="nav-btn" onclick="reload()" title="Reload">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    </button>
  </div>

  <div class="stage">
    <div class="phone">
      <iframe id="frame" src="" onload="onFrameLoad(this)"></iframe>
      <div class="vload" id="vload">
        <div class="vload-logo">🌱</div>
        <div class="vload-spin"></div>
        <div class="vload-txt" id="vloadTxt">Loading…</div>
      </div>
    </div>
  </div>

  <script>
    // Onboarding + home flow order — used by Prev/Next
    const ORDER = [
      'splash.html','language.html',
      'phone.html','otp.html','name.html','tell-us.html','permissions.html','locating.html',
      'home.html',
      'shop.html','pdp.html','voice-search.html','photo-diagnosis.html','categories.html',
      'cart.html','empty-cart.html','checkout.html','error-payment.html','order-success.html',
      'orders.html','empty-orders.html','order-details.html','track-order.html','refund-status.html',
      'my-crop.html','crop-calendar.html','advisory.html','doctor-call.html',
      'account.html','wishlist.html','saved-payments.html','about.html',
      'settings.html','signout-confirm.html',
      'addresses.html','add-address.html','notifications.html','help.html',
      'error-network.html',
      'design-system.html','philosophy.html'
    ];
    const params = new URLSearchParams(location.search);
    const screen = params.get('s') || 'splash.html';
    document.getElementById('frame').src = 'screens/' + screen;
    document.getElementById('title').textContent = screen;
    document.title = 'KKD · ' + screen.replace('.html','');

    function go(target) {
      const url = new URL(location.href);
      url.searchParams.set('s', target);
      location.href = url.toString();
    }
    function nextScreen() {
      const i = ORDER.indexOf(screen);
      const n = i >= 0 && i < ORDER.length - 1 ? ORDER[i + 1] : ORDER[0];
      go(n);
    }
    function prevScreen() {
      const i = ORDER.indexOf(screen);
      const p = i > 0 ? ORDER[i - 1] : ORDER[ORDER.length - 1];
      go(p);
    }
    function reload() {
      document.getElementById('frame').src = document.getElementById('frame').src;
    }
    // Loading screen · rotating Krishi-themed copy · stays up at least 650ms so it reads as a real loader, re-shows when the iframe navigates to another screen
    const LOAD_MSGS = ['Taking you to your fields…','Loading fresh prices…','Getting the best deals…','Warming up the mandi…','Almost there…'];
    const vload = document.getElementById('vload');
    const vloadTxt = document.getElementById('vloadTxt');
    let loadStart = Date.now();
    function showLoad() {
      if (vloadTxt) vloadTxt.textContent = LOAD_MSGS[Math.floor(Math.random() * LOAD_MSGS.length)];
      if (vload) vload.classList.remove('hide');
      loadStart = Date.now();
    }
    function hideLoad() {
      const wait = Math.max(0, 650 - (Date.now() - loadStart));
      setTimeout(() => { if (vload) vload.classList.add('hide'); }, wait);
    }
    showLoad();

    // Fired on every iframe load · hides the loader + re-arms it for the next in-app navigation
    function onFrameLoad(frame) {
      hideInnerScrollbars(frame);
      hideLoad();
      try {
        // Re-show the loader the moment the user navigates to another screen inside the app
        frame.contentWindow.addEventListener('beforeunload', showLoad);
        frame.contentWindow.addEventListener('pagehide', showLoad);
      } catch (e) { /* cross-origin — ignore */ }
    }

    // Inject scrollbar-hiding CSS into each loaded screen (same-origin iframes)
    function hideInnerScrollbars(frame) {
      try {
        const doc = frame.contentDocument;
        if (!doc) return;
        const style = doc.createElement('style');
        style.textContent = 'html,body{scrollbar-width:none!important;-ms-overflow-style:none!important}html::-webkit-scrollbar,body::-webkit-scrollbar,*::-webkit-scrollbar{display:none!important;width:0!important;height:0!important}';
        doc.head.appendChild(style);
      } catch (e) { /* cross-origin — ignore */ }
    }
    // Keyboard shortcuts
    window.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'ArrowRight') nextScreen();
      if (e.key === 'ArrowLeft') prevScreen();
      if (e.key === 'r' || e.key === 'R') reload();
    });
  </script>
</body>
</html>
